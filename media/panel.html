<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data: blob:; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}' {{cspSource}};">
<script src="{{plotlyUri}}"></script>
<script src="{{errorMathUri}}"></script>
<script src="{{insetLayoutUri}}"></script>
<script src="{{plotNavUri}}"></script>
<script src="{{measureMathUri}}"></script>
<script src="{{csvExportUri}}"></script>
<script src="{{compareUtilUri}}"></script>
<script src="{{bundleMetaUri}}"></script>
<script src="{{figureFilterUri}}"></script>
<script src="{{pdfExportUri}}"></script>
<script src="{{legendEditUri}}"></script>
<script src="{{autoscaleUri}}"></script>
<style>
  :root{
    color-scheme: light dark;
    --sp-plot-bg: #ffffff;
    /* surfaces & texte derives du theme */
    --sp-surface:    var(--vscode-editorWidget-background, #252526);
    --sp-surface-2:  var(--vscode-sideBar-background, #252526);
    --sp-border:     var(--vscode-panel-border, #3c3c3c);
    --sp-text:       var(--vscode-foreground, #cccccc);
    --sp-text-dim:   color-mix(in srgb, var(--vscode-foreground, #cccccc) 62%, transparent);
    /* accent unique */
    --sp-accent:     var(--vscode-focusBorder, var(--vscode-charts-blue, #3794ff));
    --sp-accent-soft: color-mix(in srgb, var(--sp-accent) 18%, transparent);
    /* elevation, espace, rayon */
    --sp-shadow-1: 0 1px 2px rgba(0,0,0,.16);
    --sp-shadow-2: 0 4px 12px rgba(0,0,0,.22);
    --sp-pad: 16px;
    --sp-gap: 20px;
    --sp-radius: 10px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: var(--vscode-font-family, sans-serif);
    font-size: 13px;
    color: var(--vscode-foreground, #cccccc);
    background: var(--vscode-editor-background, #1e1e1e);
  }

  /* ----- Barre d'outils ----- */
  .toolbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:10px 16px;
    background: var(--sp-surface-2);
    border-bottom:1px solid var(--sp-border);
  }
  .toolbar .brand{ font-weight:600; letter-spacing:.2px; display:flex; align-items:center; gap:8px; }
  .toolbar .brand .dot{ width:9px; height:9px; border-radius:50%;
    background: var(--sp-accent); box-shadow:0 0 0 3px var(--sp-accent-soft); }
  .toolbar .count{ font-size:12px; opacity:.7; }
  .toolbar .compare-status{ font-size:12px; opacity:.78; white-space:nowrap; }
  .toolbar .search{ min-width:180px; width:20vw; max-width:320px; padding:5px 9px; border-radius:6px;
    border:1px solid var(--vscode-input-border, var(--sp-border)); background: var(--vscode-input-background);
    color: var(--vscode-input-foreground); font-family:inherit; font-size:12px;
    transition: border-color .13s ease, box-shadow .13s ease; }
  .toolbar .search:focus-visible{ outline:none; border-color: var(--sp-accent);
    box-shadow:0 0 0 2px var(--sp-accent-soft); }
  .toolbar .spacer{ flex:1; }
  label.fit{ font-size:12px; display:flex; align-items:center; gap:6px; opacity:.85; user-select:none; cursor:pointer; }

  button{
    font-family:inherit; font-size:12px; cursor:pointer;
    border:1px solid var(--vscode-button-border, transparent);
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
    border-radius:6px; padding:5px 11px;
    transition: background .13s ease, transform .06s ease, box-shadow .13s ease;
  }
  button:hover{ background: var(--vscode-button-secondaryHoverBackground); }
  button:active{ transform: translateY(1px); }
  button:focus-visible{ outline:2px solid var(--sp-accent); outline-offset:1px; }
  button.primary{ background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
  button.primary:hover{ background: var(--vscode-button-hoverBackground); }
  button:disabled{ opacity:.4; cursor:default; }
  button.compact{ padding:4px 9px; }

  /* groupe segmente (boutons de comparaison) */
  .segmented{ display:inline-flex; }
  .segmented button{ border-radius:0; }
  .segmented button + button{ border-left:none; }
  .segmented button:first-child{ border-top-left-radius:6px; border-bottom-left-radius:6px; }
  .segmented button:last-child{ border-top-right-radius:6px; border-bottom-right-radius:6px; }

  /* boutons icones */
  .iconbtn{
    display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; padding:0; border-radius:6px;
    border:1px solid transparent; background:transparent;
    color: var(--sp-text); opacity:.75;
    transition: background .13s ease, opacity .13s ease, border-color .13s ease;
  }
  .iconbtn:hover{ background: var(--vscode-toolbar-hoverBackground, rgba(127,127,127,.18)); opacity:1; }
  .iconbtn:focus-visible{ outline:2px solid var(--sp-accent); outline-offset:1px; }
  .iconbtn.active{ background: var(--sp-accent-soft); border-color: var(--sp-accent); opacity:1; }
  .iconbtn.has-inset{ color: var(--sp-accent); opacity:1; }
  .iconbtn svg{ width:16px; height:16px; fill:none; stroke: currentColor;
    stroke-width:1.3; stroke-linecap:round; stroke-linejoin:round; }
  .textbtn{
    min-width:34px; height:28px; padding:0 8px; border-radius:6px;
    font-weight:700; letter-spacing:.3px;
  }

  /* ----- Liste de cartes ----- */
  #list{ padding: var(--sp-pad); display:flex; flex-direction:column; gap: var(--sp-gap); }
  .card{
    border:1px solid var(--sp-border);
    border-radius: var(--sp-radius);
    overflow:hidden;
    background: var(--sp-surface);
    box-shadow: var(--sp-shadow-1);
    transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease;
  }
  .card:hover{
    box-shadow: var(--sp-shadow-2);
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--sp-accent) 35%, var(--sp-border));
  }
  .card-head{
    display:flex; align-items:center; gap:9px;
    padding:10px 12px 10px 14px;
    border-bottom:1px solid var(--sp-border);
  }
  .compare-check{ margin:0 2px 0 0; accent-color: var(--sp-accent); cursor:pointer; }
  .card-head .title{ font-size:14px; font-weight:600; color: var(--sp-text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-head .ts{ font-size:11px; color: var(--sp-text-dim); font-variant-numeric: tabular-nums; }
  .coords{
    font-family: var(--vscode-editor-font-family, monospace);
    font-size:11px; opacity:1; white-space:nowrap;
    padding:2px 8px; margin-right:2px; border-radius:6px;
    color: var(--sp-text);
    background: var(--sp-surface-2);
    border:1px solid var(--sp-border);
    box-shadow: var(--sp-shadow-1);
    min-width:0;
  }
  .coords:empty{ background:transparent; border-color:transparent; box-shadow:none; }
  .card-head .badge{
    font-size:10px; font-weight:700; letter-spacing:.4px;
    padding:2px 7px; border-radius:999px;
    background: var(--sp-accent-soft);
    color: var(--sp-text);
  }
  /* Diagnostic de rendu : vert = interactif, ambre = repli SVG, gris = repli PNG */
  .card-head .badge.render{ cursor: default; border:1px solid transparent; }
  .card-head .badge.render-plotly{
    background: color-mix(in srgb, var(--vscode-charts-green, #2ea043) 22%, transparent);
    border-color: color-mix(in srgb, var(--vscode-charts-green, #2ea043) 45%, transparent);
  }
  .card-head .badge.render-svg{
    background: color-mix(in srgb, var(--vscode-charts-yellow, #d7a318) 24%, transparent);
    border-color: color-mix(in srgb, var(--vscode-charts-yellow, #d7a318) 50%, transparent);
  }
  .card-head .badge.render-png{
    background: color-mix(in srgb, var(--vscode-charts-orange, #cc6633) 22%, transparent);
    border-color: color-mix(in srgb, var(--vscode-charts-orange, #cc6633) 48%, transparent);
  }
  .card-head .spacer{ flex:1; }
  .prov{
    font-family: var(--vscode-editor-font-family, monospace);
    font-size:11px; color: var(--sp-text-dim);
    padding:3px 10px 4px 34px; cursor:help;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .tagrow{ display:none; gap:5px; flex-wrap:wrap; padding:6px 10px 7px 34px; border-bottom:1px solid var(--sp-border); }
  .tagrow.show{ display:flex; }
  .tag{ font-size:10.5px; padding:2px 7px; border-radius:999px; color: var(--sp-text); background: var(--sp-accent-soft); border:1px solid var(--sp-border); }
  .tag-click{ cursor:pointer; }
  .tag-click:hover{ border-color: var(--sp-accent); }
  .card.filtered{ display:none; }

  .imgwrap{ background: var(--sp-plot-bg); text-align:center; padding:14px; }
  .imgwrap img{ max-width:100%; height:auto; display:inline-block; border-radius:2px; }
  .imgwrap img.vector{ width:100%; }
  body.no-fit .imgwrap img{ max-width:none; }
  body.no-fit .imgwrap img.vector{ width:auto; }
  body.no-fit .imgwrap{ overflow-x:auto; }
  .plotwrap{ padding:6px; background: var(--sp-plot-bg); width:100%; overflow:hidden; }
  .plotwrap > div{ max-width:100%; }
  body.no-fit .plotwrap{ overflow-x:auto; }
  body.no-fit .plotwrap > div{ max-width:none; }
  .sp-inset-armed{ outline:2px dashed var(--sp-accent); outline-offset:-2px; }
  .sp-measure-armed{ outline:2px dashed #ff5db1; outline-offset:-2px; }
  .sp-legend-armed{ outline:2px dashed var(--vscode-charts-purple, #b180d7); outline-offset:-2px; }
  /* Panneau de lecture des mesures (dx/dy/pente, aire, stats) */
  .measure-readout{
    font-family: var(--vscode-editor-font-family, monospace);
    font-size:12px; line-height:1.55;
    margin:0 8px 10px; padding:7px 10px;
    border:1px solid var(--sp-border); border-radius:8px;
    background: var(--sp-surface-2); color: var(--sp-text);
    box-shadow: var(--sp-shadow-1);
  }
  .measure-readout .measure-row{ white-space:nowrap; font-variant-numeric: tabular-nums; }
  .measure-readout .measure-row b{ color:#ff5db1; }
  .measure-readout .measure-hint{ color: var(--sp-text-dim); font-style:italic; }

  .legend-editor{
    position:fixed; right:16px; bottom:16px; z-index:120;   /* au-dessus de l'overlay comparaison (z-index:100) */
    display:none; align-items:flex-end; gap:8px; flex-wrap:wrap;
    max-width:calc(100vw - 32px); padding:10px;
    border:1px solid var(--sp-border); border-radius:8px;
    background: var(--sp-surface); color: var(--sp-text);
    box-shadow: var(--sp-shadow-2);
  }
  .legend-editor label{ display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--sp-text-dim); }
  .legend-editor input, .legend-editor select{
    min-width:76px; height:26px; padding:2px 6px;
    border:1px solid var(--vscode-input-border, var(--sp-border)); border-radius:6px;
    background: var(--vscode-input-background); color: var(--vscode-input-foreground);
    font-family:inherit; font-size:12px;
  }
  .legend-editor input[type=color]{ min-width:44px; width:44px; padding:1px 3px; }
  .legend-editor input[type=number]{ width:64px; min-width:64px; }
  .legend-editor .le-name{ min-width:150px; }
  .legend-editor .le-text{ min-width:230px; }
  .legend-editor[data-mode="trace"] .le-text-field{ display:none; }
  .legend-editor[data-mode="text"] .le-trace-field{ display:none; }
  .legend-editor .le-inline{ flex-direction:row; align-items:center; gap:6px; height:26px; }
  .legend-editor .le-inline input{ min-width:0; width:auto; height:auto; }
  .publication-editor{
    position:fixed; right:16px; bottom:16px; z-index:121;
    display:none; align-items:flex-end; gap:8px; flex-wrap:wrap;
    max-width:calc(100vw - 32px); padding:10px;
    border:1px solid var(--sp-border); border-radius:8px;
    background:var(--sp-surface); color:var(--sp-text);
    box-shadow:var(--sp-shadow-2);
  }
  .publication-editor label{ display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--sp-text-dim); }
  .publication-editor select{
    min-width:170px; height:28px; padding:2px 8px;
    border:1px solid var(--vscode-input-border, var(--sp-border)); border-radius:6px;
    background:var(--vscode-input-background); color:var(--vscode-input-foreground);
    font-family:inherit; font-size:12px;
  }
  .publication-editor .pub-actions{ display:flex; gap:6px; align-items:flex-end; }
  .publication-editor .pub-hint{ width:100%; font-size:11px; color:var(--sp-text-dim); }
  .le-color-tools{ display:flex; align-items:flex-end; gap:8px; flex-wrap:wrap; }
  .le-swatches{ display:flex; gap:4px; flex-wrap:wrap; max-width:190px; }
  .le-swatch{
    width:22px; height:22px; padding:0; min-width:0; border-radius:4px;
    border:1px solid color-mix(in srgb, var(--sp-border) 70%, #ffffff);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .le-swatch:hover{ transform:none; border-color:var(--sp-accent); }
  .le-advanced{ min-width:230px; color:var(--sp-text); }
  .le-advanced summary{ cursor:pointer; font-size:11px; color:var(--sp-text-dim); margin-bottom:6px; }
  .le-advanced-body{ display:flex; align-items:flex-end; gap:8px; flex-wrap:wrap; }
  .le-picker { display: flex; gap: 8px; margin: 6px 0; }
  .le-sv {
    position: relative; width: 160px; height: 110px; border-radius: 6px;
    background-image:
      linear-gradient(to top, #000, rgba(0, 0, 0, 0)),
      linear-gradient(to right, #fff, rgba(255, 255, 255, 0));
    background-color: #ff0000; cursor: crosshair; touch-action: none;
  }
  .le-sv-thumb {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
    transform: translate(-50%, -50%); pointer-events: none;
  }
  .le-hue {
    position: relative; width: 16px; height: 110px; border-radius: 6px;
    background: linear-gradient(to bottom,
      #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%);
    cursor: ns-resize; touch-action: none;
  }
  .le-hue-thumb {
    position: absolute; left: -2px; right: -2px; height: 4px;
    border: 1px solid #fff; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
    transform: translateY(-50%); pointer-events: none;
  }

  /* ----- Lecteur d'animation ----- */
  .player{ background: var(--sp-plot-bg); }
  .player .stage{ text-align:center; padding:10px; }
  .player .stage img{ max-width:100%; height:auto; display:inline-block; }
  body.no-fit .player .stage img{ max-width:none; }
  .player.large .stage{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding:14px; }
  .player.large .stage img{ max-width:100%; max-height:100%; object-fit:contain; }

  .controls{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:8px 12px;
    background: var(--vscode-sideBar-background, #252526);
    border-top:1px solid var(--vscode-panel-border, #3c3c3c);
    color: var(--vscode-foreground, #cccccc);
  }
  .controls .transport{ display:flex; align-items:center; gap:2px; }
  .controls .scrub{ flex:1; display:flex; align-items:center; }
  .controls input[type=range]{
    width:100%; margin:0; cursor:pointer;
    accent-color: var(--vscode-charts-blue, #3794ff);
  }
  .controls .framelabel{ font-size:11.5px; opacity:.8; min-width:78px; text-align:right; font-variant-numeric: tabular-nums; }
  .controls select{
    font-family:inherit; font-size:11.5px; padding:3px 5px; border-radius:5px;
    background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground);
    border:1px solid var(--vscode-dropdown-border, transparent);
  }

  /* ----- Etat vide ----- */
  .empty{ padding:64px 24px; text-align:center; opacity:.6; font-size:13px; line-height:1.6; }
  .empty code{ background: var(--vscode-textCodeBlock-background, rgba(127,127,127,.15)); padding:1px 6px; border-radius:4px; }

  /* ----- Overlay « agrandir » ----- */
  .overlay{
    position:fixed; inset:0; z-index:100;
    display:none; flex-direction:column;
    background: var(--vscode-editor-background, #1e1e1e);
  }
  .overlay.show{ display:flex; }
  .overlay .obar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:10px 16px; border-bottom:1px solid var(--sp-border);
    background: var(--sp-surface-2);
  }
  .overlay .obar .otitle{ font-weight:600; font-size:13px; }
  .overlay .obar .spacer{ flex:1; }
  .overlay .obody{ flex:1; display:flex; min-height:0; }
  .overlay .obody > *{ flex:1; min-height:0; }
  .overlay .ov-plot{ width:100%; height:100%; background: var(--sp-plot-bg); }
  .overlay .ov-img{ width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background: var(--sp-plot-bg); padding:16px; }
  .overlay .ov-img img{ max-width:100%; max-height:100%; object-fit:contain; }
  .overlay .player{ width:100%; height:100%; display:flex; flex-direction:column; }

  /* ----- Comparaison ----- */
  .compare-body{ flex:1; min-height:0; display:flex; background: var(--sp-plot-bg); }
  .compare-grid{
    flex:1; min-width:0; min-height:0;
    display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    grid-auto-rows:minmax(280px, 1fr);
    gap:1px; background: var(--sp-border);
    overflow:auto; align-content:start;
  }
  .compare-pane{ min-width:0; min-height:0; display:flex; flex-direction:column; background: var(--sp-plot-bg); }
  .compare-pane-title{
    flex:0 0 auto; padding:7px 11px;
    color: var(--sp-text); background: var(--sp-surface-2);
    border-bottom:1px solid var(--sp-border);
    font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .compare-slot{
    flex:1; min-height:0; min-width:0;
    display:flex; align-items:center; justify-content:center;
    overflow:auto; padding:12px; background: var(--sp-plot-bg);
  }
  .compare-slot img{ max-width:100%; max-height:100%; object-fit:contain; }
  .compare-slot .compare-plot{ width:100%; height:100%; min-height:320px; }
  .compare-slot .player{ width:100%; height:100%; display:flex; flex-direction:column; }
  .compare-stack{
    position:relative; flex:1; min-height:0; min-width:0;
    background: var(--sp-plot-bg); overflow:hidden;
  }
  .compare-layer{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:18px; overflow:auto; background: transparent;
  }
  .compare-layer img{ max-width:100%; max-height:100%; object-fit:contain; }
  .compare-layer.secondary{ opacity:.55; mix-blend-mode:multiply; pointer-events:none; }
  .compare-stack .compare-plot{ width:100%; height:100%; }
  .opacity-control{ display:none; align-items:center; gap:8px; font-size:12px; color: var(--sp-text); }
  .opacity-control input{ width:150px; accent-color: var(--sp-accent); }
  .error-panel{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:8px 16px; font-size:12px;
    background: var(--sp-surface-2);
    border-bottom:1px solid var(--sp-border);
  }
  .error-panel .error-types{ display:flex; gap:8px; flex-wrap:wrap; }
  .error-panel .error-types label{
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 9px; border-radius:999px;
    border:1px solid var(--sp-border); background: var(--sp-surface);
    cursor:pointer;
  }
  .error-panel .error-types input{ accent-color: var(--sp-accent); margin:0; }
  .error-warn{ color: var(--vscode-charts-yellow, #cca700); font-size:11px; }
  .error-summary{ font-size:11px; opacity:0.85; }
    .inset-overlay {
      position: absolute; box-sizing: border-box; z-index: 5;
      cursor: move; background: transparent; touch-action: none;
    }
    .inset-handle {
      position: absolute; width: 11px; height: 11px; box-sizing: border-box;
      background: #fff; border: 2px solid var(--sp-accent);
      border-radius: 3px; box-shadow: var(--sp-shadow-1); touch-action: none;
    }
    .inset-handle-nw { left: -6px; top: -6px; cursor: nwse-resize; }
    .inset-handle-ne { right: -6px; top: -6px; cursor: nesw-resize; }
    .inset-handle-sw { left: -6px; bottom: -6px; cursor: nesw-resize; }
    .inset-handle-se { right: -6px; bottom: -6px; cursor: nwse-resize; }
</style>
</head>
<body class="fit">
  <div class="toolbar">
    <span class="brand"><span class="dot"></span>Graphes</span>
    <span class="count" id="count">0 graphe</span>
    <input class="search" id="searchInput" type="search" placeholder="Filtrer titre, tag, script, commit…" title="Filtrer par titre, tag ou provenance (script, fonction, branche/commit git)">
    <select class="compact" id="sortSelect" title="Trier les graphes">
      <option value="arrival">Ordre d'arrivée</option>
      <option value="title">Titre (A→Z)</option>
      <option value="type">Type</option>
      <option value="script">Script</option>
      <option value="date">Date (récent)</option>
    </select>
    <span class="spacer"></span>
    <span class="compare-status" id="compareStatus">0 selectionne</span>
    <span class="segmented">
      <button class="compact" id="compareSide" disabled>Cote a cote</button>
      <button class="compact" id="compareStack" disabled>Superposer</button>
    </span>
    <label class="fit" title="Conserver la sélection de figures quand de nouvelles figures arrivent (sinon elle se vide à chaque nouvelle figure)"><input type="checkbox" id="keepSelToggle"> Garder la sélection</label>
    <label class="fit"><input type="checkbox" id="fitToggle" checked> Ajuster à la largeur</label>
    <button class="primary" id="saveAll">Tout enregistrer</button>
    <button id="deleteAll">Tout supprimer</button>
  </div>

  <div id="list"></div>
