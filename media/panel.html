    const bTags = document.createElement("button");
    bTags.className = "textbtn";
    bTags.textContent = "Tags";
    bTags.title = "Modifier les tags";
    bTags.addEventListener("click", function(){ editTags(fig); });

    const bExpand = iconBtn("expand", "Agrandir");
    bExpand.addEventListener("click", function(){ openOverlay(fig.id); });
    if (fig.pgf) {
      const bPgf = document.createElement("button");
      bPgf.className = "textbtn";
      bPgf.textContent = "LaTeX";
      bPgf.title = "Copier le code LaTeX PGF/TikZ - clic droit pour enregistrer";
      bPgf.addEventListener("click", function(){
        vscodeApi.postMessage({ type: "copyPgf", id: fig.id });

      bPgf.addEventListener("contextmenu", function(e){

    const bSave = iconBtn("save", "Enregistrer");
    bSave.addEventListener("click", function(){

        frameIndex: player ? player.getIndex() : undefined
      });
    });
    const bCopy = document.createElement("button");
    bCopy.className = "textbtn";
    bCopy.textContent = "Copier";
    bCopy.title = "Copier l'image dans le presse-papiers";
    bCopy.addEventListener("click", function(){
      const player = card._player;
      copyFig(fig, player ? player.getIndex() : 0);
    });
    const bDel = iconBtn("trash", "Supprimer");
    bDel.addEventListener("click", function(){ vscodeApi.postMessage({ type: "delete", id: fig.id }); });
    const buttons = [bTags, bCopy];
    if (fig.plotly && !fig.frames){
      const bCsv = document.createElement("button");
      bCsv.className = "textbtn";
      bCsv.textContent = "CSV";

      bCsv.addEventListener("click", function(){
        exportCsv(document.getElementById("plot-" + fig.id), fig);

    if (!fig.frames){
      const bBundle = document.createElement("button");
      bBundle.className = "textbtn";
      bBundle.textContent = "Bundle";
      bBundle.title = "Exporter un dossier publication (png + svg + metadata.json + figure.tex)";
      bBundle.addEventListener("click", function(){
        exportBundle(document.getElementById("plot-" + fig.id), fig);

    tagRow.className = "tagrow";
    card.appendChild(tagRow);
    fig.tags = normalizeTags(fig.tags);
    renderTags(card, fig);

    if (fig.frames){
      const player = createPlayer(fig, false);
      card._player = player;
      card.appendChild(player.root);
    } else if (fig.plotly){
      const wrap = document.createElement("div");
      wrap.className = "plotwrap";
      const plotDiv = document.createElement("div");
      plotDiv.id = "plot-" + fig.id;
      wrap.appendChild(plotDiv);
      card.appendChild(wrap);
    } else {
      const wrap = document.createElement("div");
      wrap.className = "imgwrap";

        img.src = "data:image/svg+xml;base64," + fig.svg;
        img.classList.add("vector");
      } else {
        img.src = "data:image/png;base64," + fig.png;
      }
      img.alt = fig.title;
      wrap.appendChild(img);
      card.appendChild(wrap);
    }
    return card;
  }

  function afterAttach(fig){
    if (fig.plotly){
      renderPlotly(document.getElementById("plot-" + fig.id), fig, false,
                   document.getElementById("coords-" + fig.id));
    }

  // ----------------------------------------------------------
  // Comparaison de deux figures
  // ----------------------------------------------------------
  function clone(value){
    return JSON.parse(JSON.stringify(value || {}));
  }

  function figureImageSrc(fig){
    if (fig.frames && fig.frames.length > 0){
      return "data:image/png;base64," + fig.frames[0];
    }
    if (fig.svg){
      return "data:image/svg+xml;base64," + fig.svg;
    }
    if (fig.png){
      return "data:image/png;base64," + fig.png;
    }
    return null;
  }

  function appendFigureContent(slot, fig, pendingPlots){
    if (fig.frames){
      const player = createPlayer(fig, true);
      comparePlayers.push(player);
      slot.appendChild(player.root);
      return;
    }
    if (fig.plotly){
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      slot.appendChild(plot);
      pendingPlots.push(function(){ renderPlotly(plot, fig, true, null); });
      return;
    }
    const src = figureImageSrc(fig);
    if (src){
      const img = document.createElement("img");
      img.src = src;
      img.alt = fig.title;
      slot.appendChild(img);
    }
  }

  function makeComparePane(fig, pendingPlots){
    const pane = document.createElement("section");
    pane.className = "compare-pane";
    const title = document.createElement("div");
    title.className = "compare-pane-title";
    title.textContent = fig.title;
    const slot = document.createElement("div");
    slot.className = "compare-slot";
    pane.append(title, slot);
    appendFigureContent(slot, fig, pendingPlots);
    return pane;
  }

  function canMergePlotly(fig){
    const data = fig.plotly && Array.isArray(fig.plotly.data) ? fig.plotly.data : [];
    if (data.length === 0){ return false; }
    return data.every(function(trace){
      const type = trace.type || "scatter";
      const axesOk = (!trace.xaxis || trace.xaxis === "x") && (!trace.yaxis || trace.yaxis === "y");
      return axesOk && (type === "scatter" || type === "bar");
    });
  }

  function compareLabel(index){
    if (index < 26){ return String.fromCharCode(65 + index); }
    return "#" + String(index + 1);
  }

  // Figures superposables EN PRESERVANT leurs sous-graphes : meme structure
  // (CompareUtil.figuresShareSubplots) et uniquement des traces empilables
  // (scatter/bar). Sinon on retombe sur la superposition simple ou l'image.
  function subplotsOverlayable(figs){
    if (!CompareUtil.figuresShareSubplots(figs)){ return false; }
    return figs.every(function(fig){
      return (fig.plotly && fig.plotly.data ? fig.plotly.data : []).every(function(t){
        const ty = t.type || "scatter";
        return ty === "scatter" || ty === "bar";
      });
    });
  }

  // Synchronisation des zooms en mode cote a cote : un zoom/pan/reset sur un
  // graphe applique la meme plage d'axes aux autres (CompareUtil.peerRangeUpdates).
  // Le drapeau _spSyncing casse la boucle d'evenements.
  function bindSideZoomSync(){
    const els = Array.prototype.slice.call(compareBody.querySelectorAll(".compare-plot"));
    if (els.length < 2){ return; }
    els.forEach(function(el){
      if (!el.on || el._spSyncBound){ return; }
      el._spSyncBound = true;
      el.on("plotly_relayout", function(ev){
        if (el._spSyncing){ return; }
        const upd = CompareUtil.peerRangeUpdates(ev);
        if (Object.keys(upd).length === 0){ return; }
        els.forEach(function(peer){
          if (peer === el){ return; }
          peer._spSyncing = true;
          Promise.resolve(Plotly.relayout(peer, upd))
            .then(function(){ peer._spSyncing = false; })
            .catch(function(){ peer._spSyncing = false; });
        });
      });
    });
  }

  // ----- Helpers d'aplatissement des courbes (pour le calcul d'erreur) -----

  function numericX(values){
    return values.map(function(v){
      if (typeof v === "number"){ return v; }
      const t = Date.parse(v);
      return isNaN(t) ? Number(v) : t;
    });
  }

  // Une trace compte comme "courbe" pour le calcul d'erreur si c'est un scatter
  // avec un X interpolable (>= 2 x distincts) : exclut les barres et les lignes
  // de reference verticales (axvline). Predicat partage par flattenCurves et le
  // marquage des cles dans mergedPlotlyFigure (pour la reference au clic).
  function isFlattenCurve(trace){
    if ((trace.type || "scatter") !== "scatter"){ return false; }
    return ErrorMath.isInterpolableX(numericX(trace.x || []));
  }

  // Aplati les courbes scatter des figures comparees en une liste
  // { key:"c0","c1"..., label, x[], y[] } pour ErrorMath. Exclut les barres et
  // les lignes de reference verticales (axvline). L'ORDRE fixe les cles c0,c1...
  // -> rappeler flattenCurves sur le MEME jeu que populateErrorRef pour que
  // refKey corresponde.
  function flattenCurves(figs){
    const curves = [];
    let idx = 0;
    figs.forEach(function(fig){
      (fig.plotly && fig.plotly.data ? fig.plotly.data : []).forEach(function(trace){
        if (!isFlattenCurve(trace)){ return; }
        const x = numericX(trace.x || []);
        const color = (trace.line && trace.line.color) ||
                      (trace.marker && trace.marker.color) || null;
        curves.push({
          key: "c" + idx,
          letter: compareLabel(idx),
          name: trace.name || ("courbe " + (idx + 1)),
          color: color,
          x: x,
          y: (trace.y || []).map(Number)
        });
        idx++;
      });
    });
    return curves;
  }

  function updateErrorButton(figs){
    const mergeable = figs.length >= 2 && figs.every(canMergePlotly);
    const enough = mergeable && flattenCurves(figs).length >= 2;
    errorToggle.disabled = !enough;
  }

  function populateErrorRef(curves){
    errorRef.innerHTML = "";
    curves.forEach(function(c){
      const opt = document.createElement("option");
      opt.value = c.key;
      opt.textContent = c.letter + " - " + c.name;
      errorRef.appendChild(opt);
    });
    if (curves.length){ errorRef.value = curves[0].key; }
  }

  function openErrorPanel(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    populateErrorRef(flattenCurves(figs));
    errorWarn.textContent = "";
    errorPanel.style.display = "flex";
  }

  errorToggle.addEventListener("click", function(){
    if (errorPanel.style.display === "none"){ openErrorPanel(); }
    else { errorPanel.style.display = "none"; }
  });

  function currentComparePlotEl(){
    return compareBody.querySelector(".compare-plot");
  }

  // Rend la superposition + sous-graphe d'erreur pour une reference donnee, et
  // (re)branche le clic-sur-courbe qui change la reference. Centralise pour que
  // l'application initiale (errorApply) et le changement au clic partagent le
  // meme chemin (le graphe est re-cree a chaque fois -> on rebranche le clic).
  function applyError(figs, refKey, types){
    const el = currentComparePlotEl();
    if (!el){ return; }
    errorState = { active: true, refKey: refKey, types: types };
    const merged = mergedPlotlyFigureWithErrors(figs, refKey, types);
    // Replie la barre de config AVANT de dimensionner : le graphe (et le
    // panneau d'erreur) prend toute la hauteur. Bouton « Erreur » pour rouvrir.
    errorPanel.style.display = "none";
    Plotly.purge(el);
    renderPlotly(el, merged, true, null);
    Plotly.Plots.resize(el);
    errorWarn.textContent = (merged._ignored && merged._ignored.length)
      ? "Sans recouvrement X, ignorees : " + merged._ignored.join(", ")
      : "";
    bindRefClick(el, figs);
  }

  // Clic sur une courbe du panneau du haut -> elle devient la reference.
  function bindRefClick(el, figs){
    if (!el || !el.on){ return; }
    el.on("plotly_click", function(ev){
      if (!errorState.active){ return; }
      const pt = ev && ev.points && ev.points[0];
      const key = pt && pt.data && pt.data._curveKey;
      if (!key || key === errorState.refKey){ return; }
      errorRef.value = key;
      applyError(figs, key, errorState.types);
    });
  }

  errorApply.addEventListener("click", function(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const types = Array.prototype.slice
      .call(document.querySelectorAll(".error-type:checked"))
      .map(function(cb){ return cb.value; });
    if (types.length === 0){ errorWarn.textContent = "Cochez au moins un type d'erreur."; return; }
    if (!currentComparePlotEl()){ return; }
    applyError(figs, errorRef.value, types);
  });

  errorHide.addEventListener("click", function(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const el = currentComparePlotEl();
    if (!el){ return; }
    errorState = { active: false, refKey: null, types: [] };
    errorWarn.textContent = "";
    const merged = mergedPlotlyFigure(figs);
    errorPanel.style.display = "none";
    Plotly.purge(el);
    renderPlotly(el, merged, true, null);
    Plotly.Plots.resize(el);
  });

  // Prepare une trace pour la superposition : la prefixe du label de sa figure
  // (compareLabel) et, pour les figures secondaires (index>0), la rend plus
  // discrete (opacite + style de ligne pointille) pour distinguer les sources.
  function overlayTrace(trace, label, index){
    const out = clone(trace);
    const secondary = index > 0;
    out.xaxis = "x";
    out.yaxis = "y";
    out.showlegend = true;
    out.name = label + (out.name ? " - " + out.name : "");
    if (secondary){
      out.opacity = Math.min(typeof out.opacity === "number" ? out.opacity : 1, 0.78);
      if (out.line){
        const dashes = ["dash", "dot", "dashdot"];
        out.line = Object.assign({}, out.line, { dash: out.line.dash || dashes[(index - 1) % dashes.length] });
      }
      if (out.marker){
        out.marker = Object.assign({}, out.marker, { opacity: 0.78 });
      }
    }
    return out;
  }

  // Fusionne plusieurs figures en UNE figure Plotly superposee sur un seul
  // couple d'axes (x, y) : repart des axes/annotations de la 1re, empile les
  // traces de toutes via overlayTrace. Base de la vue « Superposer ».
  function mergedPlotlyFigure(figs){
    const first = figs[0];
    const layout = clone((first.plotly && first.plotly.layout) || {});
    Object.keys(layout).forEach(function(key){
      if (/^(xaxis|yaxis)[0-9]+$/.test(key)){ delete layout[key]; }
    });
    layout.autosize = true;
    layout.showlegend = true;
    layout.hovermode = "closest";
    layout.barmode = "overlay";
    layout.annotations = [];
    delete layout.height;
    delete layout.title;
    layout.xaxis = Object.assign({}, layout.xaxis || {});
    layout.yaxis = Object.assign({}, layout.yaxis || {});
    delete layout.xaxis.domain;
    delete layout.yaxis.domain;
    delete layout.xaxis.range;
    delete layout.yaxis.range;

    const data = [];
    let widthIn = first.plotly.width_in || 7;
    let heightIn = first.plotly.height_in || 4;
    let curveKey = 0;   // suit l'ordre des cles c0,c1... de flattenCurves
    figs.forEach(function(fig, index){
      const label = compareLabel(index);
      widthIn = Math.max(widthIn, fig.plotly.width_in || 7);
      heightIn = Math.max(heightIn, fig.plotly.height_in || 4);
      fig.plotly.data.forEach(function(trace){
        const out = overlayTrace(trace, label, index);
        // Cle de courbe (pour designer la reference d'erreur en cliquant la trace).
        if (isFlattenCurve(trace)){ out._curveKey = "c" + curveKey; curveKey++; }
        data.push(out);
      });
    });
    return {
      id: "compare",
      title: "Superposition",
      plotly: { data: data, layout: layout, width_in: widthIn, height_in: heightIn }
    };
  }

  function allRelPct(typeIds){
    return typeIds.length > 0 && typeIds.every(function(t){ return t === "relpct"; });
  }

  // Superposition + sous-graphe d'erreur empile dessous : courbe(s) d'ecart par
  // rapport a la reference refKey, pour les types coches (typeIds : signed/abs/
  // rel/relpct ; calcul dans ErrorMath). Le panneau du haut garde (x, y), le
  // bas reutilise x et ajoute yaxis2. Voir openErrorPanel pour l'orchestration.
  function mergedPlotlyFigureWithErrors(figs, refKey, typeIds){
    const base = mergedPlotlyFigure(figs);      // superposition sur (x, y)
    const layout = base.plotly.layout;
    const curves = flattenCurves(figs);
    const ref = curves.filter(function(c){ return c.key === refKey; })[0] || curves[0];

    // Vrai sous-graphe empile : x partage, repartition ~45 / 48 (panneau
    // d'erreur agrandi) avec un ecart franc entre les deux panneaux. L'axe X
    // est ancre sous le panneau d'erreur (ticks en bas), le haut le partage.
    layout.yaxis = Object.assign({}, layout.yaxis, { domain: [0.55, 1.0] });
    layout.yaxis2 = {
      domain: [0, 0.48], anchor: "x",
      title: { text: allRelPct(typeIds) ? "erreur (%)" : "erreur" },
      zeroline: true, showgrid: true
    };
    layout.xaxis = Object.assign({}, layout.xaxis, { anchor: "y2" });
    layout.shapes = [{
      type: "line", xref: "paper", x0: 0, x1: 1,
      yref: "y2", y0: 0, y1: 0,
      line: { color: "rgba(150,150,150,0.6)", width: 1, dash: "dot" }
    }];

    const data = base.plotly.data;
    const ignored = [];
    curves.forEach(function(c){
      if (c.key === ref.key){ return; }
      // Compte le nombre de types ayant produit une trace pour cette courbe.
      let produced = 0;
      typeIds.forEach(function(typeId){
        const series = ErrorMath.buildErrorSeries(typeId, ref.x, ref.y, c.x, c.y);
        // Aucun recouvrement pour ce type : on passe au suivant sans tracer.
        if (series.y.every(function(v){ return v === null; })){ return; }
        const meta = ErrorMath.ERROR_TYPES[typeId];
        data.push({
          type: "scatter", mode: "lines",
          x: series.x, y: series.y,
          xaxis: "x", yaxis: "y2",
          connectgaps: false,
          line: c.color ? { color: c.color } : {},
          name: c.letter + "−" + ref.letter + " : " + c.name + " (" + meta.abbr + ")"
        });
        produced++;
      });
      // Une courbe est ignoree uniquement si AUCUN type n'a produit de trace.
      if (produced === 0 && ignored.indexOf(c.letter) === -1){ ignored.push(c.letter); }
    });
    base._ignored = ignored;
    return base;
  }

  function appendImageLayer(stack, fig, className){
    const layer = document.createElement("div");
    layer.className = className;
    const src = figureImageSrc(fig);
    if (src){
      const img = document.createElement("img");
      img.src = src;
      img.alt = fig.title;
      layer.appendChild(img);
    }
    stack.appendChild(layer);
    return layer;
  }

  function resizeComparePlots(){
    if (typeof Plotly === "undefined" || !Plotly.Plots){ return; }
    compareBody.querySelectorAll(".compare-plot").forEach(function(el){
      try { Plotly.Plots.resize(el); } catch (e) {}
      if (el._spHasInset){ requestAnimationFrame(function(){ positionInsetOverlay(el); }); }
    });
  }

  function clearCompare(){
    comparePlayers.forEach(function(player){ player.destroy(); });
    comparePlayers = [];
    compareBody.querySelectorAll(".compare-plot").forEach(function(el){
      try { Plotly.purge(el); } catch (e) {}
    });
    compareBody.innerHTML = "";
    compareOpacityWrap.style.display = "none";
  }

  function openCompare(mode){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    if (figs.length < 2){ return; }

    clearCompare();
    const pendingPlots = [];
    const titleText = figs.map(function(fig){ return fig.title; }).join(" / ");
    compareTitle.textContent = (mode === "side" ? "Comparaison cote a cote : " : "Superposition : ") + titleText;

    if (mode === "side"){
      const grid = document.createElement("div");
      grid.className = "compare-grid";
      figs.forEach(function(fig){ grid.appendChild(makeComparePane(fig, pendingPlots)); });
      compareBody.appendChild(grid);
    } else if (figs.every(canMergePlotly)){
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      stack.appendChild(plot);
      compareBody.appendChild(stack);
      const merged = mergedPlotlyFigure(figs);
      pendingPlots.push(function(){ renderPlotly(plot, merged, true, null); });
      updateErrorButton(figs);
    } else if (subplotsOverlayable(figs)){
      // Figures multi-sous-graphes de meme structure : superposition par
      // sous-graphe (la grille est preservee) au lieu du repli image.
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      stack.appendChild(plot);
      compareBody.appendChild(stack);
      const merged = CompareUtil.mergeSubplotFigures(figs);
      pendingPlots.push(function(){ renderPlotly(plot, merged, true, null); });
    } else {
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      figs.forEach(function(fig, index){
        const layer = appendImageLayer(stack, fig, index === 0 ? "compare-layer" : "compare-layer secondary");
        if (index > 0){ layer.style.opacity = "0.55"; }
      });
      compareOpacity.value = "55";
      compareOpacityWrap.style.display = "flex";
      compareBody.appendChild(stack);
    }

    compareOverlay.classList.add("show");
    setTimeout(function(){
      pendingPlots.forEach(function(fn){ fn(); });
      resizeComparePlots();
      if (mode === "side"){ bindSideZoomSync(); }
    }, 30);
  }
  function closeCompare(){
    errorState = { active: false, refKey: null, types: [] };
    errorPanel.style.display = "none";
    errorToggle.disabled = true;
    compareOverlay.classList.remove("show");
    clearCompare();
  }

  // ----------------------------------------------------------
  // Overlay « agrandir »
  // ----------------------------------------------------------
  let ovPlayer = null;
  let ovResizeObserver = null;
  function clearOverlay(){
    const ovCoords = document.getElementById("ovCoords");
    if (ovCoords){ ovCoords.textContent = ""; }
    if (ovResizeObserver){ ovResizeObserver.disconnect(); ovResizeObserver = null; }
    if (ovPlayer){ ovPlayer.destroy(); ovPlayer = null; }
    if (ovBody.firstChild){
      try { Plotly.purge(ovBody.firstChild); } catch (e) {}
    }
    ovBody.innerHTML = "";
  }
  function openOverlay(id){
    const fig = figStore[id];
    if (!fig){ return; }
    clearOverlay();
    ovTitle.textContent = fig.title;

    if (fig.frames){
      ovPlayer = createPlayer(fig, true);
      ovBody.appendChild(ovPlayer.root);
    } else if (fig.plotly){
      const el = document.createElement("div");
      el.className = "ov-plot";
      ovBody.appendChild(el);
      const ovCoords = document.getElementById("ovCoords");
      ovCoords.textContent = "";
      renderPlotly(el, fig, true, ovCoords);
    } else {
      const box = document.createElement("div");
      box.className = "ov-img";
      const img = document.createElement("img");
      img.src = fig.svg ? ("data:image/svg+xml;base64," + fig.svg)
                        : ("data:image/png;base64," + fig.png);
      box.appendChild(img);
      ovBody.appendChild(box);
    }
    overlay.classList.add("show");
    if (fig.plotly){
      const plotEl = ovBody.firstChild;
      // Re-dimensionne des que le conteneur a une taille reelle (l'overlay
      // passe de display:none a flex) et a chaque changement de taille de la
      // fenetre tant qu'il est ouvert. Deterministe, contrairement a un
      // setTimeout fixe qui mesurait parfois une taille pas encore stabilisee.
      if (typeof ResizeObserver !== "undefined"){
        ovResizeObserver = new ResizeObserver(function(){
          try { Plotly.Plots.resize(plotEl); } catch (e) {}
        });
        ovResizeObserver.observe(plotEl);
      } else {
        setTimeout(function(){
          try { Plotly.Plots.resize(plotEl); } catch (e) {}
        }, 30);
      }
    }
  }
  function closeOverlay(){ overlay.classList.remove("show"); clearOverlay(); }

  document.getElementById("ovClose").addEventListener("click", closeOverlay);
  overlay.addEventListener("click", function(e){ if (e.target === overlay){ closeOverlay(); } });
  document.getElementById("compareClose").addEventListener("click", closeCompare);
  compareOverlay.addEventListener("click", function(e){ if (e.target === compareOverlay){ closeCompare(); } });
  compareSide.addEventListener("click", function(){ openCompare("side"); });
  compareStack.addEventListener("click", function(){ openCompare("stack"); });
  compareOpacity.addEventListener("input", function(){
    const value = String(Number(compareOpacity.value) / 100);
    compareBody.querySelectorAll(".compare-layer.secondary").forEach(function(layer){
      layer.style.opacity = value;
    });
  });
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape"){
      closeOverlay();
      closeCompare();
    }
  });

  // ----------------------------------------------------------
  // Export avance Plotly
  // ----------------------------------------------------------
  function postExportResult(requestId, ok, dataUrl, error){
    vscodeApi.postMessage({
      type: "exportResult",
      requestId: requestId,
      ok: ok,
      dataUrl: dataUrl || null,
      error: error || null
    });
  }

  function exportPlotly(msg){
    const fig = figStore[msg.id];
    const el = document.getElementById("plot-" + msg.id);
    if (!fig || !fig.plotly || !el || typeof Plotly === "undefined" || !Plotly.toImage){
      postExportResult(msg.requestId, false, null, "plot introuvable ou Plotly.toImage indisponible");
      return;
    }

    const options = msg.options || {};
    const format = options.format === "svg" ? "svg" : "png";
    const scale = Math.max(0.25, Number(options.scale) || 1);
    const width = Math.max(1, Math.round(el.clientWidth || (el.parentElement && el.parentElement.clientWidth) || 900));
    const height = Math.max(1, Math.round(el.clientHeight || listPlotHeight(el, fig) || 540));
    const layout = el.layout || {};
    const previous = {
      paper_bgcolor: layout.paper_bgcolor,
      plot_bgcolor: layout.plot_bgcolor
    };
    const bg = options.transparent ? "rgba(0,0,0,0)" : "#ffffff";

    Promise.resolve(Plotly.relayout(el, { paper_bgcolor: bg, plot_bgcolor: bg }))
      .then(function(){
        return Plotly.toImage(el, {
          format: format,
          width: width,
          height: height,
          scale: scale
        });
      })
      .then(function(dataUrl){
        return Promise.resolve(Plotly.relayout(el, previous)).then(function(){ return dataUrl; });
      })
      .then(function(dataUrl){
        postExportResult(msg.requestId, true, dataUrl, null);
      })
      .catch(function(err){
        try { Plotly.relayout(el, previous); } catch (e) {}
        postExportResult(msg.requestId, false, null, String(err));
      });
  }
  // ----------------------------------------------------------
  // Messages depuis l'extension
  // ----------------------------------------------------------
  function removeCard(id){
    const card = document.getElementById("fig-" + id);
    if (card){
      if (card._player){ card._player.destroy(); }
      if (figStore[id] && figStore[id].plotly){
        const elToFree = document.getElementById("plot-" + id);
        if (elToFree && elToFree._spListRO){
          try { elToFree._spListRO.disconnect(); } catch (e) {}
          elToFree._spListRO = null;
        }
        try { Plotly.purge(document.getElementById("plot-" + id)); } catch (e) {}
      }
      card.remove();
    }
    removeCompareSelection(id);
    delete figStore[id];
  }

  window.addEventListener("message", function(event){
    const msg = event.data;
    if (msg.type === "exportPlotly"){
      exportPlotly(msg);
    } else if (msg.type === "add"){
      list.appendChild(makeCard(msg.fig));
      afterAttach(msg.fig);
      n = n + 1; refreshCount();
      if (sortMode !== "arrival"){
        applySort();   // insere la nouvelle figure a sa place selon le tri actif
      } else {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }
    } else if (msg.type === "remove"){
      removeCard(msg.id);
      n = Math.max(0, n - 1); refreshCount();
    } else if (msg.type === "tags"){
      const fig = figStore[msg.id];
      if (fig){
        fig.tags = normalizeTags(msg.tags);
        const card = document.getElementById("fig-" + msg.id);
        if (card){ renderTags(card, fig); }
        applySearchFilter();
      }
    } else if (msg.type === "reset"){
      closeOverlay();
      closeCompare();
      Object.keys(figStore).forEach(removeCard);
      list.innerHTML = "";
      n = 0;
      for (let i = 0; i < msg.figs.length; i++){
        list.appendChild(makeCard(msg.figs[i]));
        afterAttach(msg.figs[i]);
        n = n + 1;
      }
      refreshCount();
    }
  });

  document.getElementById("saveAll").addEventListener("click", function(){ vscodeApi.postMessage({ type: "saveAll" }); });
  document.getElementById("deleteAll").addEventListener("click", function(){ vscodeApi.postMessage({ type: "deleteAll" }); });
  if (searchInput){
    searchInput.addEventListener("input", function(e){
      searchQuery = e.target.value || "";
      applySearchFilter();
    });
  }
  const sortSelect = document.getElementById("sortSelect");
  if (sortSelect){
    sortSelect.addEventListener("change", function(e){
      sortMode = e.target.value || "arrival";
      applySort();
    });
  }
  document.getElementById("fitToggle").addEventListener("change", function(e){
    document.body.classList.toggle("no-fit", !e.target.checked);
  });

  refreshCount();
  updateCompareToolbar();
  vscodeApi.postMessage({ type: "ready" });
})();
</script>
