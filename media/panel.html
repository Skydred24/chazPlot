  function plotlyConfig(fig){
    return {
      responsive: true,
      displaylogo: false,
      scrollZoom: false,
      edits: { legendPosition: true, titleText: false, axisTitleText: false },
      modeBarButtonsToRemove: ["select2d", "lasso2d", "zoomIn2d", "zoomOut2d", "toImage"]
    };
  }
  // Dimensionnement liste : le graphe prend toute la largeur disponible de
  // sa carte, et la hauteur suit le ratio matplotlib. Pas de plafond cache.
  function plotAspect(fig){
    const wIn = fig.plotly && fig.plotly.width_in;
    const hIn = fig.plotly && fig.plotly.height_in;
    return (wIn && hIn) ? (hIn / wIn) : 0.58;
  }
  function nativePlotWidth(fig){
    const wIn = fig.plotly && fig.plotly.width_in;
    return Math.round((wIn || 7) * 120);
  }
  function listPlotWidth(el, fig){
    if (document.body.classList.contains("no-fit")){ return Math.max(300, nativePlotWidth(fig)); }
    const wrap = el && el.parentElement;
    const rectW = wrap ? wrap.getBoundingClientRect().width : 0;
    const clientW = wrap ? wrap.clientWidth : 0;
    const fallback = (list && list.clientWidth) || document.documentElement.clientWidth || 700;
    return Math.max(300, Math.floor(rectW || clientW || fallback));
  }
  function listPlotHeight(el, fig){
    const aspect = plotAspect(fig);
    const width = listPlotWidth(el, fig);
    const toolbar = 90;
    const maxHeight = Math.max(300,window.innerHeight - toolbar);
    return Math.min(maxHeight,Math.max(300,Math.round(width*aspect)));
  }
  function applyListPlotSizing(el, fig){
    if (!el || !el.parentElement){ return { width: 0, height: 300 }; }
    const width = listPlotWidth(el, fig);
    const height = listPlotHeight(el, fig);
    el.style.width = width + "px";
    el.style.maxWidth = document.body.classList.contains("no-fit") ? "none" : "100%";
    el.style.height = height + "px";
    return { width: width, height: height };
  }

  // Matplotlib peut exporter des sous-graphes dont les domaines Plotly xaxis
  // n'occupent qu'une fraction du papier. Quand le webview s'elargit, ca laisse
  // un grand blanc a droite et les axes restent ecrases. On remappe donc l'union
  // des domaines X vers [0,1] en conservant les ecarts relatifs entre subplots.
  function stretchHorizontalDomains(layout){
    const keys = Object.keys(layout || {}).filter(function(key){
      return /^xaxis\d*$/.test(key) && layout[key] && Array.isArray(layout[key].domain);
    });
    if (!keys.length){ return; }
    let minD = 1, maxD = 0;
    keys.forEach(function(key){
      const d = layout[key].domain;
      const a = Number(d[0]), b = Number(d[1]);
      if (isFinite(a) && isFinite(b) && b > a){
        minD = Math.min(minD, a);
        maxD = Math.max(maxD, b);
      }
    });
    const span = maxD - minD;
    if (!isFinite(span) || span <= 0.05){ return; }
    if (minD <= 0.005 && maxD >= 0.995){ return; }
    keys.forEach(function(key){
      const d = layout[key].domain;
      const a = Number(d[0]), b = Number(d[1]);
      if (!isFinite(a) || !isFinite(b) || b <= a){ return; }
      layout[key].domain = [Math.max(0, (a - minD) / span), Math.min(1, (b - minD) / span)];
    });
  }
  // Format compact d'un nombre pour l'affichage des coordonnees.
  function fmtNum(v){
    if (typeof v !== "number" || !isFinite(v)){ return String(v); }
    const a = Math.abs(v);
    if (a !== 0 && (a < 1e-3 || a >= 1e5)){ return v.toExponential(3); }
    return String(Math.round(v * 1000) / 1000);
  }
  function hoverText(pt){
    let s = "x " + fmtNum(pt.x) + "   y " + fmtNum(pt.y);
    if (pt.z !== undefined && pt.z !== null){ s += "   z " + fmtNum(pt.z); }
    return s;
  }
  const listPlots = [];   // { el, fig } pour le recalcul de hauteur au resize
  // Retour visuel du mode encart arme : contour sur le graphe (marche meme en
  // comparaison ou il n'y a pas de zone de coordonnees) + texte si dispo.
  function setInsetArmedFeedback(el, coordsEl){
    if (el.parentElement){ el.parentElement.classList.toggle("sp-inset-armed", !!el._spInsetArmed); }
    if (coordsEl){ coordsEl.textContent = el._spInsetArmed ? "Mode encart : trace une zone a agrandir" : ""; }
  }
  // Navigation bonus (zoom molette + pan clic-milieu). Travaille sur tous les
  // axes x/y du graphe via _fullLayout, donc gere subplots, twinx (y2) et le
  // sous-graphe d'erreur. S'appuie sur le module pur PlotNav.
  const PLOT_ZOOM_STEP = 1.15;
  function navAxes(el, letter){
    const fl = el && el._fullLayout, out = [];
    if (!fl){ return out; }
    for (const key in fl){
      if (key.indexOf(letter + "axis") !== 0){ continue; }
      const ax = fl[key];
      if (ax && typeof ax.r2l === "function" && typeof ax.l2r === "function"
          && isFinite(ax._offset) && isFinite(ax._length) && ax.range){
        out.push({ key: key, ax: ax });
      }
    }
    return out;
  }
  function navRangeInto(upd, key, ax, compute){
    const l0 = ax.r2l(ax.range[0]), l1 = ax.r2l(ax.range[1]);
    const nl = compute(l0, l1);
    upd[key + ".range"] = [ax.l2r(nl[0]), ax.l2r(nl[1])];
  }
  function attachPlotNav(el){
    if (!el || el._spNavBound){ return; }
    el._spNavBound = true;

    // Ctrl/Cmd + molette : zoom centre sur le curseur. Molette seule => la page
    // continue de defiler (on ne preventDefault qu'avec le modificateur).
    el.addEventListener("wheel", function(e){
      if (!(e.ctrlKey || e.metaKey)){ return; }
      if (typeof Plotly === "undefined" || !el._fullLayout){ return; }
      e.preventDefault();
      const bb = el.getBoundingClientRect();
      const px = e.clientX - bb.left, py = e.clientY - bb.top;
      const factor = e.deltaY < 0 ? PLOT_ZOOM_STEP : 1 / PLOT_ZOOM_STEP;
      const upd = {};
      navAxes(el, "x").forEach(function(en){
        const a = (px - en.ax._offset) / en.ax._length;
        if (a >= 0 && a <= 1){ navRangeInto(upd, en.key, en.ax, function(l0, l1){ return PlotNav.zoomRange(l0, l1, a, factor); }); }
      });
      navAxes(el, "y").forEach(function(en){
        const a = 1 - (py - en.ax._offset) / en.ax._length;
        if (a >= 0 && a <= 1){ navRangeInto(upd, en.key, en.ax, function(l0, l1){ return PlotNav.zoomRange(l0, l1, a, factor); }); }
      });
      if (Object.keys(upd).length){ Plotly.relayout(el, upd); }
    }, { passive: false });

    // Clic-molette (bouton du milieu) maintenu : pan.
    let panning = false, lastX = 0, lastY = 0;
    el.addEventListener("pointerdown", function(e){
      if (e.button !== 1 || !el._fullLayout){ return; }
      e.preventDefault();
      panning = true; lastX = e.clientX; lastY = e.clientY;
      try { el.setPointerCapture(e.pointerId); } catch (err) {}
      el.style.cursor = "grabbing";
    });
    el.addEventListener("pointermove", function(e){
      if (!panning){ return; }
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      const upd = {};
      navAxes(el, "x").forEach(function(en){
        const f = dx / en.ax._length;   // pointeur a droite => vue vers la gauche
        navRangeInto(upd, en.key, en.ax, function(l0, l1){ return PlotNav.panRange(l0, l1, f); });
      });
      navAxes(el, "y").forEach(function(en){
        const f = -dy / en.ax._length;  // pixel vers le bas => valeurs basses
        navRangeInto(upd, en.key, en.ax, function(l0, l1){ return PlotNav.panRange(l0, l1, f); });
      });
      if (Object.keys(upd).length){ Plotly.relayout(el, upd); }
    });
    function endPan(e){
      if (!panning){ return; }
      panning = false; el.style.cursor = "";
      try { el.releasePointerCapture(e.pointerId); } catch (err) {}
    }
    el.addEventListener("pointerup", endPan);
    el.addEventListener("pointercancel", endPan);
  }

  // Auto-echelle des axes Y sur la plage X visible : evite qu'un pic lointain
  // (ex. 1000 %) ecrase le reste (1 %) quand on zoome sur une zone sans le pic.
  // Recale CHAQUE axe Y independamment sur ses propres traces visibles : l'axe
  // principal (y) ET le sous-graphe d'erreur (y2) — ce dernier, souvent proche
  // de 0, obtient ainsi sa propre echelle precise. L'axe X reste partage (lien
  // entre sous-graphes). Numerique uniquement (axes log/date non recalcules).
  function autoScaleY(el){
    if (!el || !el._fullLayout || !el.data || typeof AutoScale === "undefined"){ return; }
    const xa = el._fullLayout.xaxis;
    if (!xa || !xa.range){ return; }
    const x0 = Math.min(xa.range[0], xa.range[1]);
    const x1 = Math.max(xa.range[0], xa.range[1]);
    // Decrit les axes Y presents (y, y2, ...) et les traces ; la math (etendue
    // visible + marge, par axe) vit dans le module pur AutoScale.
    const axes = [];
    Object.keys(el._fullLayout).forEach(function(axName){
      if (!/^yaxis[0-9]*$/.test(axName)){ return; }
      const ya = el._fullLayout[axName];
      if (!ya){ return; }
      axes.push({ name: axName, letter: "y" + axName.slice(5), log: ya.type === "log" });
    });
    const traces = (el.data || []).map(function(tr){
      return { yaxis: tr.yaxis, x: tr.x, y: tr.y, hidden: tr.visible === "legendonly" };
    });
    const patch = AutoScale.visibleYRanges(axes, traces, x0, x1);
    if (!Object.keys(patch).length){ return; }
    el._spAutoYApplying = true;
    Promise.resolve(Plotly.relayout(el, patch))
      .then(function(){ el._spAutoYApplying = false; })
      .catch(function(){ el._spAutoYApplying = false; });
  }

  function setAutoYFeedback(el, coordsEl){
    if (el.parentElement){ el.parentElement.classList.toggle("sp-autoy-on", !!el._spAutoY); }
    if (coordsEl){ coordsEl.textContent = el._spAutoY ? "Auto-échelle Y activée" : "Auto-échelle Y désactivée"; }

  function renderPlotly(el, fig, fill, coordsEl){
    if (!fig.plotly || !el || typeof Plotly === "undefined"){ return; }
    const layout = JSON.parse(JSON.stringify(fig.plotly.layout || {}));

      icon: { width: 16, height: 16, path: "M2 3 L14 3 L14 13 L2 13 Z M3.4 4.4 L3.4 11.6 L12.6 11.6 L12.6 4.4 Z M8.4 8 L12.2 8 L12.2 11.2 L8.4 11.2 Z" },

        gd._spAutoY = !gd._spAutoY;
        setAutoYFeedback(gd, coordsEl);
        if (gd._spAutoY){ autoScaleY(gd); }
      }
    }];
    el._spFig = fig;
    el._spCoordsEl = coordsEl;
    el._spBaseData = clone(data);
    el._spBaseLayout = clone(layout);
    el._spConfig = config;
    el._spHasInset = false;
    if (el._spAutoY === undefined){ el._spAutoY = true; }   // auto-echelle Y activee par defaut
    Plotly.newPlot(el, data, layout, config);
    attachLegendTextEditor(el);
    attachPlotNav(el);
    attachMeasure(el);
    if (el.on){
      el.on("plotly_relayout", function(update){
        // Auto-echelle Y : si on vient de zoomer/deplacer en X, recaler Y sur
        // les donnees visibles (sauf double-clic = autorange gere par Plotly).
        if (el._spAutoY && !el._spAutoYApplying){
          const xMoved = ("xaxis.range[0]" in update) || ("xaxis.range" in update);
          if (xMoved && !update["xaxis.autorange"]){ autoScaleY(el); }
        }
        // Edition d'un titre / label d'axe (Plotly editable) -> persister.
        persistLayoutEdits(el, update);
        // Mode encart arme par Ctrl+clic sur la loupe : le trace de zoom
        // devient un encart au lieu d'un zoom normal.
        if (!el._spInsetArmed){ return; }
        const selection = parseZoomInsetSelection(update);
        if (!selection){ return; }
        el._spInsetArmed = false;
        setInsetArmedFeedback(el, coordsEl);
        applyZoomInset(el, selection);
      });
      el.on("plotly_legendclick", function(ev){
        if (!el._spLegendEditArmed){ return true; }
        openLegendEditor(el, ev.curveNumber);
        return false;
      });
    }
    if (coordsEl && el.on){
      el.on("plotly_hover", function(ev){
        if (el._spInsetArmed){ return; }   // garde le message du mode encart
        const pt = ev && ev.points && ev.points[0];
        if (pt){ coordsEl.textContent = hoverText(pt); }
      });
      el.on("plotly_unhover", function(){ if (!el._spInsetArmed){ coordsEl.textContent = ""; } });
    }
  }
  function resizeListPlots(){
    if (typeof Plotly === "undefined"){ return; }
    for (let i = listPlots.length - 1; i >= 0; i--){
      const p = listPlots[i];
      if (!document.body.contains(p.el)){ listPlots.splice(i, 1); continue; }
      try {
        const size = applyListPlotSizing(p.el, p.fig);
        Plotly.relayout(p.el, { width: size.width, height: size.height }).then(function(){
          if (p.el._spHasInset){ positionInsetOverlay(p.el); }
        }).catch(function(){});
      } catch (e) {}
    }
  }
  let resizeTimer = null;
  window.addEventListener("resize", function(){
    if (resizeTimer){ clearTimeout(resizeTimer); }
    resizeTimer = setTimeout(function(){
      resizeListPlots();
      if (compareOverlay.classList.contains("show")){ resizeComparePlots(); }
    }, 120);
  });

  // ----------------------------------------------------------
  // Carte
  // ----------------------------------------------------------
  // Badge de diagnostic de rendu : indique si la figure est interactive
  // (Plotly) ou pourquoi elle est retombee en image (SVG/PNG). La raison
  // precise (artiste non gere, trop de points...) est en infobulle.
  const RENDER_BADGES = {
    plotly: { cls: "render-plotly", label: "INTERACTIF", tip: "Rendu Plotly interactif (zoom, survol, export données)" },
    svg:    { cls: "render-svg",    label: "SVG",        tip: "Repli image vectorielle" },
    png:    { cls: "render-png",    label: "PNG",        tip: "Repli image matricielle" },
  };
  function renderBadge(fig){
    // Mode explicite envoye par le backend, sinon deduit des representations
    // disponibles (figures persistees avant l'ajout du diagnostic).
    let mode = fig.render && fig.render.mode;
    if (!mode){ mode = fig.plotly ? "plotly" : (fig.svg ? "svg" : (fig.png ? "png" : null)); }
    const meta = RENDER_BADGES[mode];
    if (!meta){ return null; }
    const badge = document.createElement("span");
    badge.className = "badge render " + meta.cls;
    badge.textContent = meta.label;
    let tip = meta.tip;
    if (fig.render && mode !== "plotly"){
      const r = fig.render;
      if (r.message){ tip = "Repli " + mode.toUpperCase() + " : " + r.message; }
      if (r.detail){ tip += "\n(" + r.detail + ")"; }
    }
    badge.title = tip;
    return badge;
  }

  // Ligne de provenance (compacte) sous l'en-tete : fichier:ligne + branche@commit.
  // Le detail complet (commande, cwd, python, date) est en infobulle.
  function baseName(p){ return String(p).split(/[\\/]/).pop(); }
  function provenanceLine(fig){
    const p = fig.provenance;
    if (!p){ return null; }
    const parts = [];
    if (p.source){ parts.push(baseName(p.source) + (p.line ? ":" + p.line : "")); }
    else if (p.script){ parts.push(baseName(p.script)); }
    if (p.git_commit){ parts.push((p.git_branch ? p.git_branch + "@" : "") + p.git_commit + (p.git_dirty ? "*" : "")); }
    if (parts.length === 0 && p.timestamp){ parts.push(p.timestamp); }
    if (parts.length === 0){ return null; }
    const div = document.createElement("div");
    div.className = "prov";
    div.textContent = parts.join("  ·  ");
    const tip = [];
    if (p.source){ tip.push("Source : " + p.source + (p.line ? ":" + p.line : "") + (p.function ? " (" + p.function + ")" : "")); }
    if (p.command){ tip.push("Commande : " + p.command); }
    if (p.cwd){ tip.push("Dossier : " + p.cwd); }
    if (p.python){ tip.push("Python : " + p.python + (p.python_version ? " (" + p.python_version + ")" : "")); }
    if (p.git_commit){ tip.push("Git : " + (p.git_branch || "?") + " " + p.git_commit + (p.git_dirty ? " (modifie)" : "")); }
    if (p.timestamp){ tip.push("Date : " + p.timestamp); }
    div.title = tip.join("\n");
    return div;
  }

  function makeCard(fig){
    figStore[fig.id] = fig;
    const card = document.createElement("div");

    card.id = "fig-" + fig.id;

    const head = document.createElement("div");

    compareCheck.type = "checkbox";
    compareCheck.className = "compare-check";
    compareCheck.title = "Selectionner pour comparer";
    compareCheck.addEventListener("change", function(){
      setCompareSelection(fig.id, compareCheck.checked);
    });
    compareChecks[fig.id] = compareCheck;
    head.appendChild(compareCheck);

    const title = document.createElement("span");
    title.className = "title";
    title.textContent = fig.title;
    head.appendChild(title);

    } else {
      const rb = renderBadge(fig);
      if (rb){ head.appendChild(rb); }

    const ts = document.createElement("span");

    ts.textContent = fig.ts;
    head.appendChild(ts);
    head.appendChild(Object.assign(document.createElement("span"), { className: "spacer" }));

    if (fig.plotly){

    const bTags = document.createElement("button");

    const bExpand = iconBtn("expand", "Agrandir");

      bPgf.className = "textbtn";
      bPgf.textContent = "LaTeX";

      bPgf.addEventListener("click", function(){

      bPgf.addEventListener("contextmenu", function(e){

    const bSave = iconBtn("save", "Enregistrer");
    bSave.addEventListener("click", function(){

      });

    const bCopy = document.createElement("button");
    bCopy.className = "textbtn";
    bCopy.textContent = "Copier";
    bCopy.title = "Copier l'image dans le presse-papiers";
    bCopy.addEventListener("click", function(){
      const player = card._player;
      copyFig(fig, player ? player.getIndex() : 0);
    });
    const bDel = iconBtn("trash", "Supprimer");
    bDel.addEventListener("click", function(){ vscodeApi.postMessage({ type: "delete", id: fig.id }); });
    const buttons = [bTags, bCopy];
    if (fig.plotly && !fig.frames){
      const bCsv = document.createElement("button");
      bCsv.className = "textbtn";
      bCsv.textContent = "CSV";
      bCsv.title = "Exporter les donnees visibles en CSV (respecte le zoom)";

        exportCsv(document.getElementById("plot-" + fig.id), fig);
      });

    if (!fig.frames){
      const bBundle = document.createElement("button");
      bBundle.className = "textbtn";
      bBundle.textContent = "Bundle";
      bBundle.title = "Exporter un dossier publication (png + svg + metadata.json + figure.tex)";
      bBundle.addEventListener("click", function(){

    card.appendChild(tagRow);
    fig.tags = normalizeTags(fig.tags);
    renderTags(card, fig);

    if (fig.frames){
      const player = createPlayer(fig, false);
      card._player = player;
      card.appendChild(player.root);
    } else if (fig.plotly){
      const wrap = document.createElement("div");
      wrap.className = "plotwrap";

        img.classList.add("vector");
      } else {
        img.src = "data:image/png;base64," + fig.png;

    return card;
  }

  function afterAttach(fig){
    if (fig.plotly){
      renderPlotly(document.getElementById("plot-" + fig.id), fig, false,
                   document.getElementById("coords-" + fig.id));
    }
  }

  // ----------------------------------------------------------
  // Comparaison de deux figures
  // ----------------------------------------------------------
  function clone(value){
    return JSON.parse(JSON.stringify(value || {}));
  }

  function figureImageSrc(fig){
    if (fig.frames && fig.frames.length > 0){
      return "data:image/png;base64," + fig.frames[0];
    }
    if (fig.svg){
      return "data:image/svg+xml;base64," + fig.svg;
    }
    if (fig.png){
      return "data:image/png;base64," + fig.png;
    }
    return null;
  }

  function appendFigureContent(slot, fig, pendingPlots){
    if (fig.frames){
      const player = createPlayer(fig, true);
      comparePlayers.push(player);
      slot.appendChild(player.root);
      return;
    }
    if (fig.plotly){
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      slot.appendChild(plot);
      pendingPlots.push(function(){ renderPlotly(plot, fig, true, null); });
      return;
    }
    const src = figureImageSrc(fig);
    if (src){
      const img = document.createElement("img");
      img.src = src;
      img.alt = fig.title;
      slot.appendChild(img);
    }
  }

  function makeComparePane(fig, pendingPlots){
    const pane = document.createElement("section");
    pane.className = "compare-pane";
    const title = document.createElement("div");
    title.className = "compare-pane-title";
    title.textContent = fig.title;
    const slot = document.createElement("div");
    slot.className = "compare-slot";
    pane.append(title, slot);
    appendFigureContent(slot, fig, pendingPlots);
    return pane;
  }

  function canMergePlotly(fig){
    const data = fig.plotly && Array.isArray(fig.plotly.data) ? fig.plotly.data : [];
    if (data.length === 0){ return false; }
    return data.every(function(trace){
      const type = trace.type || "scatter";
      const axesOk = (!trace.xaxis || trace.xaxis === "x") && (!trace.yaxis || trace.yaxis === "y");
      return axesOk && (type === "scatter" || type === "bar");
    });
  }

  function compareLabel(index){
    if (index < 26){ return String.fromCharCode(65 + index); }
    return "#" + String(index + 1);
  }

  // Figures superposables EN PRESERVANT leurs sous-graphes : meme structure
  // (CompareUtil.figuresShareSubplots) et uniquement des traces empilables
  // (scatter/bar). Sinon on retombe sur la superposition simple ou l'image.
  function subplotsOverlayable(figs){
    if (!CompareUtil.figuresShareSubplots(figs)){ return false; }
    return figs.every(function(fig){
      return (fig.plotly && fig.plotly.data ? fig.plotly.data : []).every(function(t){
        const ty = t.type || "scatter";
        return ty === "scatter" || ty === "bar";
      });
    });
  }

  // Synchronisation des zooms en mode cote a cote : un zoom/pan/reset sur un
  // graphe applique la meme plage d'axes aux autres (CompareUtil.peerRangeUpdates).
  // Le drapeau _spSyncing casse la boucle d'evenements.
  function bindSideZoomSync(){
    const els = Array.prototype.slice.call(compareBody.querySelectorAll(".compare-plot"));
    if (els.length < 2){ return; }
    els.forEach(function(el){
      if (!el.on || el._spSyncBound){ return; }
      el._spSyncBound = true;
      el.on("plotly_relayout", function(ev){
        if (el._spSyncing){ return; }
        const upd = CompareUtil.peerRangeUpdates(ev);
        if (Object.keys(upd).length === 0){ return; }
        els.forEach(function(peer){
          if (peer === el){ return; }
          peer._spSyncing = true;
          Promise.resolve(Plotly.relayout(peer, upd))
            .then(function(){ peer._spSyncing = false; })
            .catch(function(){ peer._spSyncing = false; });
        });
      });
    });
  }

  // ----- Helpers d'aplatissement des courbes (pour le calcul d'erreur) -----

  function numericX(values){
    return values.map(function(v){
      if (typeof v === "number"){ return v; }
      const t = Date.parse(v);
      return isNaN(t) ? Number(v) : t;
    });
  }

  // Une trace compte comme "courbe" pour le calcul d'erreur si c'est un scatter
  // avec un X interpolable (>= 2 x distincts) : exclut les barres et les lignes
  // de reference verticales (axvline). Predicat partage par flattenCurves et le
  // marquage des cles dans mergedPlotlyFigure (pour la reference au clic).
  function isFlattenCurve(trace){
    if ((trace.type || "scatter") !== "scatter"){ return false; }
    return ErrorMath.isInterpolableX(numericX(trace.x || []));
  }

  // Aplati les courbes scatter des figures comparees en une liste
  // { key:"c0","c1"..., label, x[], y[] } pour ErrorMath. Exclut les barres et
  // les lignes de reference verticales (axvline). L'ORDRE fixe les cles c0,c1...
  // -> rappeler flattenCurves sur le MEME jeu pour que refKey corresponde.
  function flattenCurves(figs){
    const curves = [];
    let idx = 0;
    figs.forEach(function(fig){
      (fig.plotly && fig.plotly.data ? fig.plotly.data : []).forEach(function(trace){
        if (!isFlattenCurve(trace)){ return; }
        const x = numericX(trace.x || []);
        const color = (trace.line && trace.line.color) ||
                      (trace.marker && trace.marker.color) || null;
        curves.push({
          key: "c" + idx,
          letter: compareLabel(idx),
          name: trace.name || ("courbe " + (idx + 1)),
          color: color,
          x: x,
          y: (trace.y || []).map(Number)
        });
        idx++;
      });
    });
    return curves;
  }

  function updateErrorButton(figs){
    const mergeable = figs.length >= 2 && figs.every(canMergePlotly);
    const enough = mergeable && flattenCurves(figs).length >= 2;
    errorToggle.disabled = !enough;
  }

  function curveLabelByKey(curves, key){
    const c = curves.filter(function(x){ return x.key === key; })[0];
    return c ? c.letter : key;
  }

  function refreshErrorSummary(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const curves = flattenCurves(figs);
    if (!errorSelect.groups.length){
      errorSummary.textContent = "Cliquez une courbe : 1re = référence, suivantes = à comparer. Ctrl+clic = nouvelle référence.";
      return;
    }
    const parts = errorSelect.groups.map(function(g){
      const ref = curveLabelByKey(curves, g.ref);
      const cmps = g.cmps.map(function(k){ return curveLabelByKey(curves, k); });
      return "[réf " + ref + " → " + (cmps.length ? cmps.join(", ") : "—") + "]";
    });
    errorSummary.textContent = "Couples : " + parts.join(" ");
  }

  // Met en avant la reference (epaisse) et les comparees (pleine opacite),
  // attenue le reste. S'appuie sur le tag _curveKey des traces.
  function highlightErrorSelection(el){
    if (!el || !el.data){ return; }
    // Aucune selection active -> tout en opacite normale (etat initial / apres reset).
    const refs = errorSelect.groups.map(function(g){ return g.ref; });
    const cmps = errorSelect.groups.reduce(function(acc, g){ return acc.concat(g.cmps); }, []);
    const noSel = refs.length === 0;
    el.data.forEach(function(tr, i){
      const key = tr._curveKey;
      if (key === undefined){ return; }
      const isRef = refs.indexOf(key) !== -1;
      const isCmp = cmps.indexOf(key) !== -1;
      const opacity = noSel ? 1 : ((isRef || isCmp) ? 1 : 0.25);
      const width = isRef ? 3.5 : ((tr.line && tr.line.width) || 2);
      Plotly.restyle(el, { opacity: opacity, "line.width": width }, [i]);
    });
  }

  function lastErrorGroup(){
    const g = errorSelect.groups;
    return g.length ? g[g.length - 1] : null;
  }

  // Regle du clic sur une courbe de cle k. newRef = Ctrl/Cmd maintenu :
  // demarre un nouveau groupe (nouvelle reference).
  function toggleErrorSelection(key, newRef){
    const groups = errorSelect.groups;
    if (newRef){
      // Re-Ctrl+clic sur une reference existante : retire ce groupe (toggle).
      for (let i = 0; i < groups.length; i++){
        if (groups[i].ref === key){ groups.splice(i, 1); return; }
      }
      groups.push({ ref: key, cmps: [] });
      return;
    }
    const g = lastErrorGroup();
    if (!g){ groups.push({ ref: key, cmps: [] }); return; }  // 1er clic = 1re reference
    if (key === g.ref){ groups.pop(); return; }              // re-clic sur la ref courante = annule le groupe
    const idx = g.cmps.indexOf(key);
    if (idx !== -1){ g.cmps.splice(idx, 1); return; }         // re-clic sur une comparee = retire
    g.cmps.push(key);
  }

  function bindSelectionClick(el){
    if (!el || !el.on){ return; }
    el.on("plotly_click", function(ev){
      if (errorPanel.style.display === "none"){ return; }  // selection seulement panneau ouvert
      const pt = ev && ev.points && ev.points[0];
      const key = pt && pt.data && pt.data._curveKey;
      if (key === undefined || key === null){ return; }
      const newRef = !!(ev && ev.event && (ev.event.ctrlKey || ev.event.metaKey));
      toggleErrorSelection(key, newRef);
      refreshErrorSummary();
      highlightErrorSelection(el);
    });
  }

  function openErrorPanel(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    // Repart de la superposition simple pour selectionner au clic.
    const el = currentComparePlotEl();
    if (el){
      errorState = { active: false, groups: [], types: [] };
      errorSelect = { groups: [] };
      const merged = mergedPlotlyFigure(figs);
      Plotly.purge(el);
      renderPlotly(el, merged, true, null);
      Plotly.Plots.resize(el);
      bindSelectionClick(el);
    }
    errorWarn.textContent = "";
    refreshErrorSummary();
    errorPanel.style.display = "flex";
  }

  errorToggle.addEventListener("click", function(){
    if (errorPanel.style.display === "none"){ openErrorPanel(); }
    else { errorPanel.style.display = "none"; }
  });

  function currentComparePlotEl(){
    return compareBody.querySelector(".compare-plot");
  }

  // Descripteur leger "pseudo-figure" pour la vue comparaison : permet de
  // reutiliser saveOne/saveCsv/saveBundle/copie sur l'element vivant fusionne.
  // pdf = sentinelle truthy pour que le menu d'export propose le PDF (rendu raster).
  function comparePseudoFig(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const provenance = figs.map(function(f){ return f.provenance || null; }).filter(Boolean);
    return {
      id: "compare",
      title: compareCurrentTitle,
      plotly: true,
      frames: null,
      png: null, svg: null, pdf: "__webview__",
      tags: [],
      provenance: provenance.length ? { sources: provenance } : null
    };
  }

  function applyError(figs, groups, types){
    const el = currentComparePlotEl();
    if (!el){ return; }
    errorState = { active: true, groups: groups, types: types };
    const merged = mergedPlotlyFigureWithErrors(figs, groups, types);
    errorPanel.style.display = "none";
    Plotly.purge(el);
    renderPlotly(el, merged, true, null);
    Plotly.Plots.resize(el);
    errorWarn.textContent = (merged._ignored && merged._ignored.length)
      ? "Sans recouvrement X, ignorees : " + merged._ignored.join(", ")
      : "";
  }

  errorApply.addEventListener("click", function(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const types = Array.prototype.slice
      .call(document.querySelectorAll(".error-type:checked"))
      .map(function(cb){ return cb.value; });
    const usable = errorSelect.groups.filter(function(g){ return g.cmps.length > 0; });
    if (!usable.length){ errorWarn.textContent = "Formez au moins un couple (réf puis courbe à comparer)."; return; }
    if (types.length === 0){ errorWarn.textContent = "Cochez au moins un type d'erreur."; return; }
    if (!currentComparePlotEl()){ return; }
    applyError(figs, usable, types);
  });

  errorReset.addEventListener("click", function(){
    errorSelect = { groups: [] };
    errorWarn.textContent = "";
    refreshErrorSummary();
    const el = currentComparePlotEl();
    if (el){ highlightErrorSelection(el); }
  });

  errorHide.addEventListener("click", function(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const el = currentComparePlotEl();
    if (!el){ return; }
    errorState = { active: false, groups: [], types: [] };
    errorWarn.textContent = "";
    const merged = mergedPlotlyFigure(figs);
    errorPanel.style.display = "none";
    Plotly.purge(el);
    renderPlotly(el, merged, true, null);
    Plotly.Plots.resize(el);
  });

  // Prepare une trace pour la superposition : la prefixe du label de sa figure
  // (compareLabel) et, pour les figures secondaires (index>0), la rend plus
  // discrete (opacite + style de ligne pointille) pour distinguer les sources.
  function overlayTrace(trace, title, index){
    const out = clone(trace);
    const secondary = index > 0;
    out.xaxis = "x";
    out.yaxis = "y";
    out.showlegend = true;
    const prefix = LegendEdit.compareLegendPrefix(title, compareLabel(index));
    out.name = prefix + (out.name ? " : " + out.name : "");
    if (secondary){
      out.opacity = Math.min(typeof out.opacity === "number" ? out.opacity : 1, 0.78);
      if (out.line){
        const dashes = ["dash", "dot", "dashdot"];
        out.line = Object.assign({}, out.line, { dash: out.line.dash || dashes[(index - 1) % dashes.length] });
      }
      if (out.marker){
        out.marker = Object.assign({}, out.marker, { opacity: 0.78 });
      }
    }
    return out;
  }

  // Fusionne plusieurs figures en UNE figure Plotly superposee sur un seul
  // couple d'axes (x, y) : repart des axes/annotations de la 1re, empile les
  // traces de toutes via overlayTrace. Base de la vue « Superposer ».
  function mergedPlotlyFigure(figs){
    const first = figs[0];
    const layout = clone((first.plotly && first.plotly.layout) || {});
    Object.keys(layout).forEach(function(key){
      if (/^(xaxis|yaxis)[0-9]+$/.test(key)){ delete layout[key]; }
    });
    layout.autosize = true;
    layout.showlegend = true;
    layout.hovermode = "closest";
    layout.barmode = "overlay";
    layout.annotations = [];
    delete layout.height;
    delete layout.title;
    layout.xaxis = Object.assign({}, layout.xaxis || {});
    layout.yaxis = Object.assign({}, layout.yaxis || {});
    delete layout.xaxis.domain;
    delete layout.yaxis.domain;
    delete layout.xaxis.range;
    delete layout.yaxis.range;

    const data = [];
    let widthIn = first.plotly.width_in || 7;
    let heightIn = first.plotly.height_in || 4;
    let curveKey = 0;   // suit l'ordre des cles c0,c1... de flattenCurves
    figs.forEach(function(fig, index){
      widthIn = Math.max(widthIn, fig.plotly.width_in || 7);
      heightIn = Math.max(heightIn, fig.plotly.height_in || 4);
      fig.plotly.data.forEach(function(trace, tIdx){
        const out = overlayTrace(trace, fig.title, index);
        // Cle de courbe (pour designer la reference d'erreur en cliquant la trace).
        if (isFlattenCurve(trace)){ out._curveKey = "c" + curveKey; curveKey++; }
        // Back-mapping vers la figure source : permet a persistLegendPatch
        // d'ecrire une edition de legende (couleur...) dans la bonne figure
        // depuis la vue comparaison/erreur (parite avec le mode normal).
        out._srcFigId = fig.id;
        out._srcTraceIndex = tIdx;
        data.push(out);
      });
    });
    return {
      id: "compare",
      title: "Superposition",
      plotly: { data: data, layout: layout, width_in: widthIn, height_in: heightIn }
    };
  }

  function allRelPct(typeIds){
    return typeIds.length > 0 && typeIds.every(function(t){ return t === "relpct"; });
  }

  // Superposition + sous-graphe d'erreur empile dessous. groups = liste de
  // { ref, cmps:[...] } : pour chaque groupe, on trace l'ecart de chaque courbe
  // comparee vs SA reference, pour les types coches (typeIds : signed/abs/rel/
  // relpct ; calcul dans ErrorMath). Le panneau du haut garde (x, y), le bas
  // reutilise x et ajoute yaxis2. Voir openErrorPanel pour l'orchestration.
  function mergedPlotlyFigureWithErrors(figs, groups, typeIds){
    const base = mergedPlotlyFigure(figs);
    const layout = base.plotly.layout;
    const curves = flattenCurves(figs);
    const byKey = {};
    curves.forEach(function(c){ byKey[c.key] = c; });

    // Vrai sous-graphe empile : x partage, repartition ~45 / 48 (panneau
    // d'erreur agrandi) avec un ecart franc entre les deux panneaux. L'axe X
    // est ancre sous le panneau d'erreur (ticks en bas), le haut le partage.
    layout.yaxis = Object.assign({}, layout.yaxis, { domain: [0.55, 1.0] });
    layout.yaxis2 = {
      domain: [0, 0.48], anchor: "x",
      title: { text: allRelPct(typeIds) ? "erreur (%)" : "erreur" },
      zeroline: true, showgrid: true
    };
    layout.xaxis = Object.assign({}, layout.xaxis, { anchor: "y2" });
    layout.shapes = [{
      type: "line", xref: "paper", x0: 0, x1: 1,
      yref: "y2", y0: 0, y1: 0,
      line: { color: "rgba(150,150,150,0.6)", width: 1, dash: "dot" }
    }];

    const data = base.plotly.data;
    const ignored = [];
    // Pour chaque groupe (une reference), tracer l'ecart de chaque courbe
    // comparee vs CETTE reference, pour chaque type coche.
    groups.forEach(function(g){
      const ref = byKey[g.ref];
      if (!ref){ return; }
      g.cmps.forEach(function(cmpKey){
        const c = byKey[cmpKey];
        if (!c || c.key === ref.key){ return; }
        let produced = 0;
        typeIds.forEach(function(typeId){
          const series = ErrorMath.buildErrorSeries(typeId, ref.x, ref.y, c.x, c.y);
          if (series.y.every(function(v){ return v === null; })){ return; }
          const meta = ErrorMath.ERROR_TYPES[typeId];
          data.push({
            type: "scatter", mode: "lines",
            x: series.x, y: series.y,
            xaxis: "x", yaxis: "y2",
            connectgaps: false,
            line: c.color ? { color: c.color } : {},
            name: c.letter + "−" + ref.letter + " : " + c.name + " (" + meta.abbr + ")"
          });
          produced++;
        });
        if (produced === 0 && ignored.indexOf(c.letter) === -1){ ignored.push(c.letter); }
      });
    });
    base._ignored = ignored;
    return base;
  }

  function appendImageLayer(stack, fig, className){
    const layer = document.createElement("div");
    layer.className = className;
    const src = figureImageSrc(fig);
    if (src){
      const img = document.createElement("img");
      img.src = src;
      img.alt = fig.title;
      layer.appendChild(img);
    }
    stack.appendChild(layer);
    return layer;
  }

  function resizeComparePlots(){
    if (typeof Plotly === "undefined" || !Plotly.Plots){ return; }
    compareBody.querySelectorAll(".compare-plot").forEach(function(el){
      try { Plotly.Plots.resize(el); } catch (e) {}
      if (el._spHasInset){ requestAnimationFrame(function(){ positionInsetOverlay(el); }); }
    });
  }

  function clearCompare(){
    comparePlayers.forEach(function(player){ player.destroy(); });
    comparePlayers = [];
    compareBody.querySelectorAll(".compare-plot").forEach(function(el){
      try { Plotly.purge(el); } catch (e) {}
    });
    compareBody.innerHTML = "";
    compareOpacityWrap.style.display = "none";
  }

  function openCompare(mode){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    if (figs.length < 2){ return; }

    clearCompare();
    const pendingPlots = [];
    const titleText = figs.map(function(fig){ return fig.title; }).join(" / ");
    compareTitle.textContent = (mode === "side" ? "Comparaison cote a cote : " : "Superposition : ") + titleText;
    compareCurrentTitle = compareTitle.textContent || "comparaison";

    if (mode === "side"){
      const grid = document.createElement("div");
      grid.className = "compare-grid";
      figs.forEach(function(fig){ grid.appendChild(makeComparePane(fig, pendingPlots)); });
      compareBody.appendChild(grid);
    } else if (figs.every(canMergePlotly)){
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      stack.appendChild(plot);
      compareBody.appendChild(stack);
      const merged = mergedPlotlyFigure(figs);
      pendingPlots.push(function(){ renderPlotly(plot, merged, true, null); });
      updateErrorButton(figs);
    } else if (subplotsOverlayable(figs)){
      // Figures multi-sous-graphes de meme structure : superposition par
      // sous-graphe (la grille est preservee) au lieu du repli image.
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      stack.appendChild(plot);
      compareBody.appendChild(stack);
      const merged = CompareUtil.mergeSubplotFigures(figs, function(fig, index){
        return LegendEdit.compareLegendPrefix(fig.title, compareLabel(index));
      });
      pendingPlots.push(function(){ renderPlotly(plot, merged, true, null); });
    } else {
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      figs.forEach(function(fig, index){
        const layer = appendImageLayer(stack, fig, index === 0 ? "compare-layer" : "compare-layer secondary");
        if (index > 0){ layer.style.opacity = "0.55"; }
      });
      compareOpacity.value = "55";
      compareOpacityWrap.style.display = "flex";
      compareBody.appendChild(stack);
    }

    compareOverlay.classList.add("show");
    setTimeout(function(){
      pendingPlots.forEach(function(fn){ fn(); });
      resizeComparePlots();
      if (mode === "side"){ bindSideZoomSync(); }
    }, 30);
  }
  function closeCompare(){
    errorState = { active: false, groups: [], types: [] };
    errorPanel.style.display = "none";
    errorToggle.disabled = true;
    compareOverlay.classList.remove("show");
    clearCompare();
  }

  // ----------------------------------------------------------
  // Overlay « agrandir »
  // ----------------------------------------------------------
  let ovPlayer = null;
  let ovResizeObserver = null;
  function clearOverlay(){
    const ovCoords = document.getElementById("ovCoords");
    if (ovCoords){ ovCoords.textContent = ""; }
    if (ovResizeObserver){ ovResizeObserver.disconnect(); ovResizeObserver = null; }
    if (ovPlayer){ ovPlayer.destroy(); ovPlayer = null; }
    if (ovBody.firstChild){
      try { Plotly.purge(ovBody.firstChild); } catch (e) {}
    }
    ovBody.innerHTML = "";
  }
  function openOverlay(id){
    const fig = figStore[id];
    if (!fig){ return; }
    clearOverlay();
    ovTitle.textContent = fig.title;

    if (fig.frames){
      ovPlayer = createPlayer(fig, true);
      ovBody.appendChild(ovPlayer.root);
    } else if (fig.plotly){
      const el = document.createElement("div");
      el.className = "ov-plot";
      ovBody.appendChild(el);
      const ovCoords = document.getElementById("ovCoords");
      ovCoords.textContent = "";
      renderPlotly(el, fig, true, ovCoords);
    } else {
      const box = document.createElement("div");
      box.className = "ov-img";
      const img = document.createElement("img");
      img.src = fig.svg ? ("data:image/svg+xml;base64," + fig.svg)
                        : ("data:image/png;base64," + fig.png);
      box.appendChild(img);
      ovBody.appendChild(box);
    }
    overlay.classList.add("show");
    if (fig.plotly){
      const plotEl = ovBody.firstChild;
      // Re-dimensionne des que le conteneur a une taille reelle (l'overlay
      // passe de display:none a flex) et a chaque changement de taille de la
      // fenetre tant qu'il est ouvert. Deterministe, contrairement a un
      // setTimeout fixe qui mesurait parfois une taille pas encore stabilisee.
      if (typeof ResizeObserver !== "undefined"){
        ovResizeObserver = new ResizeObserver(function(){
          try { Plotly.Plots.resize(plotEl); } catch (e) {}
        });
        ovResizeObserver.observe(plotEl);
      } else {
        setTimeout(function(){
          try { Plotly.Plots.resize(plotEl); } catch (e) {}
        }, 30);
      }
    }
  }
  function closeOverlay(){ overlay.classList.remove("show"); clearOverlay(); }

  document.getElementById("ovClose").addEventListener("click", closeOverlay);
  overlay.addEventListener("click", function(e){ if (e.target === overlay){ closeOverlay(); } });
  document.getElementById("compareClose").addEventListener("click", closeCompare);
  compareOverlay.addEventListener("click", function(e){ if (e.target === compareOverlay){ closeCompare(); } });
  document.getElementById("compareSave").addEventListener("click", function(){
    if (!currentComparePlotEl()){ return; }
    vscodeApi.postMessage({ type: "save", id: "compare" });
  });
  document.getElementById("compareCopy").addEventListener("click", function(){
    const el = currentComparePlotEl();
    if (!el){ return; }
    Plotly.toImage(el, { format: "png", scale: 2 })
      .then(function(url){ return dataUrlToBlob(url); })
      .then(function(blob){ return navigator.clipboard.write([ new ClipboardItem({ "image/png": blob }) ]); })
      .then(function(){ vscodeApi.postMessage({ type: "copied" }); })
      .catch(function(err){ vscodeApi.postMessage({ type: "copyFailed", error: String(err) }); });
  });
  document.getElementById("compareCsv").addEventListener("click", function(){
    exportCsv(currentComparePlotEl(), comparePseudoFig());
  });
  document.getElementById("compareBundle").addEventListener("click", function(){
    exportBundle(currentComparePlotEl(), comparePseudoFig());
  });
  compareSide.addEventListener("click", function(){ openCompare("side"); });
  compareStack.addEventListener("click", function(){ openCompare("stack"); });
  compareOpacity.addEventListener("input", function(){
    const value = String(Number(compareOpacity.value) / 100);
    compareBody.querySelectorAll(".compare-layer.secondary").forEach(function(layer){
      layer.style.opacity = value;
    });
  });
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape"){
      closeOverlay();
      closeCompare();
      closeLegendEditor();
    }
  });

  // ----------------------------------------------------------
  // Export avance Plotly
  // ----------------------------------------------------------
  function postExportResult(requestId, ok, dataUrl, error, useNative){
    vscodeApi.postMessage({
      type: "exportResult",
      requestId: requestId,
      ok: ok,
      dataUrl: dataUrl || null,
      error: error || null,
      useNative: !!useNative
    });
  }

  // Charge un data URL image dans un <canvas> et renvoie ses pixels RGBA.
  function pixelsFromImageUrl(url){
    return new Promise(function(resolve, reject){
      const im = new Image();
      im.onload = function(){
        const cv = document.createElement("canvas");
        cv.width = im.naturalWidth; cv.height = im.naturalHeight;
        const ctx = cv.getContext("2d");
        ctx.drawImage(im, 0, 0);
        resolve({ data: ctx.getImageData(0, 0, cv.width, cv.height).data,
                  width: cv.width, height: cv.height });
      };
      im.onerror = function(){ reject(new Error("image illisible")); };
      im.src = url;
    });
  }

  // RGBA (premultiplie sur blanc) -> RGB compact, pour un flux image PDF.
  function rgbaToRgbOnWhite(rgba){
    const n = rgba.length / 4;
    const out = new Uint8Array(n * 3);
    for (let i = 0, j = 0; i < rgba.length; i += 4, j += 3){
      const a = rgba[i + 3] / 255;
      out[j]     = Math.round(rgba[i]     * a + 255 * (1 - a));
      out[j + 1] = Math.round(rgba[i + 1] * a + 255 * (1 - a));
      out[j + 2] = Math.round(rgba[i + 2] * a + 255 * (1 - a));
    }
    return out;
  }

  // Compresse en zlib (FlateDecode) via l'API plateforme CompressionStream.
  function deflateZlib(bytes){
    const cs = new CompressionStream("deflate");   // "deflate" = zlib (RFC1950)
    const writer = cs.writable.getWriter();
    writer.write(bytes); writer.close();
    return new Response(cs.readable).arrayBuffer().then(function(buf){
      return new Uint8Array(buf);
    });
  }

  // Extrait les octets bruts d'un data URL base64 (ex. JPEG).
  function bytesFromBase64DataUrl(url){
    const b64 = url.slice(url.indexOf(",") + 1);
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++){ out[i] = bin.charCodeAt(i); }
    return out;
  }

  function bytesToPdfDataUrl(bytes){
    let bin = "";
    for (let i = 0; i < bytes.length; i++){ bin += String.fromCharCode(bytes[i]); }
    return "data:application/pdf;base64," + btoa(bin);
  }

  // Construit un data URL PDF raster a partir d'un element Plotly vivant
  // (inclut encart / sous-graphe d'erreur / superposition). FlateDecode
  // (sans perte) si CompressionStream dispo, sinon repli JPEG/DCTDecode.
  function buildRasterPdfDataUrl(el){
    const cssW = Math.max(1, Math.round(el.clientWidth ||
      (el.parentElement && el.parentElement.clientWidth) || 900));
    const cssH = Math.max(1, Math.round(el.clientHeight || 540));
    const pageW = Number((cssW * 0.75).toFixed(2));   // px CSS @96dpi -> points
    const pageH = Number((cssH * 0.75).toFixed(2));
    const SCALE = 3;
    if (typeof CompressionStream !== "undefined"){
      return Plotly.toImage(el, { format: "png", width: cssW, height: cssH, scale: SCALE })
        .then(pixelsFromImageUrl)
        .then(function(px){
          const rgb = rgbaToRgbOnWhite(px.data);
          return deflateZlib(rgb).then(function(deflated){
            return bytesToPdfDataUrl(PdfExport.buildPdf({
              imageBytes: deflated, pixelWidth: px.width, pixelHeight: px.height,
              pageWidth: pageW, pageHeight: pageH, filter: "FlateDecode", colorComponents: 3
            }));
          });
        });
    }
    return Plotly.toImage(el, { format: "jpeg", width: cssW, height: cssH, scale: SCALE })
      .then(function(url){
        return pixelsFromImageUrl(url).then(function(px){
          return bytesToPdfDataUrl(PdfExport.buildPdf({
            imageBytes: bytesFromBase64DataUrl(url), pixelWidth: px.width, pixelHeight: px.height,
            pageWidth: pageW, pageHeight: pageH, filter: "DCTDecode", colorComponents: 3
          }));
        });
      });
  }

  function exportPlotly(msg){
    const isCompare = msg.id === "compare";
    const el = isCompare ? currentComparePlotEl() : document.getElementById("plot-" + msg.id);
    const fig = isCompare ? null : figStore[msg.id];
    if (!el || typeof Plotly === "undefined" || !Plotly.toImage){
      postExportResult(msg.requestId, false, null, "plot introuvable ou Plotly.toImage indisponible");
      return;
    }
    // Figure sans spec Plotly (cas non-comparaison) : export Plotly inapplicable.
    if (!isCompare && fig && !fig.plotly){
      postExportResult(msg.requestId, false, null, "figure non Plotly");
      return;
    }
    const options = msg.options || {};

    // PDF : figure sans encart et hors comparaison -> PDF matplotlib natif
    // (signal useNative). Sinon -> PDF raster genere ici (encart/erreurs inclus).
    if (options.format === "pdf"){
      // PDF natif vectoriel seulement si l'extension l'autorise (figure non
      // editee) et sans encart. Sinon -> PDF raster de l'element vivant (edite).
      if (!isCompare && !el._spHasInset && options.allowNative !== false){
        postExportResult(msg.requestId, true, null, null, true);
        return;
      }
      buildRasterPdfDataUrl(el)
        .then(function(dataUrl){ postExportResult(msg.requestId, true, dataUrl, null); })
        .catch(function(err){ postExportResult(msg.requestId, false, null, String(err)); });
      return;
    }

    const format = options.format === "svg" ? "svg" : "png";
    const scale = Math.max(0.25, Number(options.scale) || 1);
    const width = Math.max(1, Math.round(el.clientWidth || (el.parentElement && el.parentElement.clientWidth) || 900));
    const height = Math.max(1, Math.round(el.clientHeight || listPlotHeight(el, fig || {}) || 540));
    const layout = el.layout || {};
    const previous = {
      paper_bgcolor: layout.paper_bgcolor,
      plot_bgcolor: layout.plot_bgcolor
    };
    const bg = options.transparent ? "rgba(0,0,0,0)" : "#ffffff";

    Promise.resolve(Plotly.relayout(el, { paper_bgcolor: bg, plot_bgcolor: bg }))
      .then(function(){
        return Plotly.toImage(el, { format: format, width: width, height: height, scale: scale });
      })
      .then(function(dataUrl){
        return Promise.resolve(Plotly.relayout(el, previous)).then(function(){ return dataUrl; });
      })
      .then(function(dataUrl){ postExportResult(msg.requestId, true, dataUrl, null); })
      .catch(function(err){
        try { Plotly.relayout(el, previous); } catch (e) {}
        postExportResult(msg.requestId, false, null, String(err));
      });
  }
  // ----------------------------------------------------------
  // Messages depuis l'extension
  // ----------------------------------------------------------
  function removeCard(id){
    const card = document.getElementById("fig-" + id);
    if (card){
      if (card._player){ card._player.destroy(); }
      if (figStore[id] && figStore[id].plotly){
        const elToFree = document.getElementById("plot-" + id);
        if (elToFree && elToFree._spListRO){
          try { elToFree._spListRO.disconnect(); } catch (e) {}
          elToFree._spListRO = null;
        }
        try { Plotly.purge(document.getElementById("plot-" + id)); } catch (e) {}
      }
      card.remove();
    }
    removeCompareSelection(id);
    delete figStore[id];
  }

  window.addEventListener("message", function(event){
    const msg = event.data;
    if (msg.type === "exportPlotly"){
      exportPlotly(msg);
    } else if (msg.type === "add"){
      clearCompareSelectionUnlessKept();   // nouvelle figure -> vide la selection (sauf mode "Garder")
      list.appendChild(makeCard(msg.fig));
      afterAttach(msg.fig);
      n = n + 1; refreshCount();
      if (sortMode !== "arrival"){
        applySort();   // insere la nouvelle figure a sa place selon le tri actif
      } else {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }
    } else if (msg.type === "remove"){
      removeCard(msg.id);
      n = Math.max(0, n - 1); refreshCount();
    } else if (msg.type === "tags"){
      const fig = figStore[msg.id];
      if (fig){
        fig.tags = normalizeTags(msg.tags);
        const card = document.getElementById("fig-" + msg.id);
        if (card){ renderTags(card, fig); }
        applySearchFilter();
      }
    } else if (msg.type === "reset"){
      closeOverlay();
      closeCompare();
      closeLegendEditor();
      Object.keys(figStore).forEach(removeCard);
      list.innerHTML = "";
      n = 0;
      for (let i = 0; i < msg.figs.length; i++){
        list.appendChild(makeCard(msg.figs[i]));
        afterAttach(msg.figs[i]);
        n = n + 1;
      }
      refreshCount();
    }
  });

  document.getElementById("saveAll").addEventListener("click", function(){ vscodeApi.postMessage({ type: "saveAll" }); });
  document.getElementById("deleteAll").addEventListener("click", function(){ vscodeApi.postMessage({ type: "deleteAll" }); });
  if (searchInput){
    searchInput.addEventListener("input", function(e){
      searchQuery = e.target.value || "";
      applySearchFilter();
    });
  }
  const sortSelect = document.getElementById("sortSelect");
  if (sortSelect){
    sortSelect.addEventListener("change", function(e){
      sortMode = e.target.value || "arrival";
      applySort();
    });
  }
  document.getElementById("fitToggle").addEventListener("change", function(e){
    document.body.classList.toggle("no-fit", !e.target.checked);
    resizeListPlots();
  });

  document.getElementById("keepSelToggle").addEventListener("change", function(e){
    keepCompareSelection = !!e.target.checked;
  });

  refreshCount();
  updateCompareToolbar();
  vscodeApi.postMessage({ type: "ready" });
})();
