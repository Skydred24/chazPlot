<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data: blob:; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}' {{cspSource}};">
<script src="{{plotlyUri}}"></script>
<script src="{{errorMathUri}}"></script>
<script src="{{insetLayoutUri}}"></script>
<style>
  :root{
    color-scheme: light dark;
    --sp-plot-bg: #ffffff;
    /* surfaces & texte derives du theme */
    --sp-surface:    var(--vscode-editorWidget-background, #252526);
    --sp-surface-2:  var(--vscode-sideBar-background, #252526);
    --sp-border:     var(--vscode-panel-border, #3c3c3c);
    --sp-text:       var(--vscode-foreground, #cccccc);
    --sp-text-dim:   color-mix(in srgb, var(--vscode-foreground, #cccccc) 62%, transparent);
    /* accent unique */
    --sp-accent:     var(--vscode-focusBorder, var(--vscode-charts-blue, #3794ff));
    --sp-accent-soft: color-mix(in srgb, var(--sp-accent) 18%, transparent);
    /* elevation, espace, rayon */
    --sp-shadow-1: 0 1px 2px rgba(0,0,0,.16);
    --sp-shadow-2: 0 4px 12px rgba(0,0,0,.22);
    --sp-pad: 16px;
    --sp-gap: 20px;
    --sp-radius: 10px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: var(--vscode-font-family, sans-serif);
    font-size: 13px;
    color: var(--vscode-foreground, #cccccc);
    background: var(--vscode-editor-background, #1e1e1e);
  }

  /* ----- Barre d'outils ----- */
  .toolbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:8px 14px;
    background: var(--vscode-sideBar-background, #252526);
    border-bottom:1px solid var(--vscode-panel-border, #3c3c3c);
  }
  .toolbar .brand{ font-weight:600; letter-spacing:.2px; display:flex; align-items:center; gap:8px; }
  .toolbar .brand .dot{ width:9px; height:9px; border-radius:50%;
    background: var(--vscode-charts-blue, #3794ff); box-shadow:0 0 0 3px rgba(55,148,255,.25); }
  .toolbar .count{ font-size:12px; opacity:.7; }
  .toolbar .compare-status{ font-size:12px; opacity:.78; white-space:nowrap; }
  .toolbar .search{ min-width:180px; width:20vw; max-width:320px; padding:4px 8px; border-radius:5px;
    border:1px solid var(--vscode-input-border, transparent); background: var(--vscode-input-background);
    color: var(--vscode-input-foreground); font-family:inherit; font-size:12px; }
  .toolbar .spacer{ flex:1; }
  label.fit{ font-size:12px; display:flex; align-items:center; gap:6px; opacity:.85; user-select:none; cursor:pointer; }

  button{
    font-family:inherit; font-size:12px; cursor:pointer;
    border:1px solid var(--vscode-button-border, transparent);
    background: var(--vscode-button-secondaryBackground);
    color: var(--vscode-button-secondaryForeground);
    border-radius:6px; padding:5px 11px;
    transition: background .12s ease, transform .06s ease;
  }
  button:hover{ background: var(--vscode-button-secondaryHoverBackground); }
  button:active{ transform: translateY(1px); }
  button.primary{ background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
  button.primary:hover{ background: var(--vscode-button-hoverBackground); }
  button:disabled{ opacity:.4; cursor:default; }
  button.compact{ padding:4px 9px; }

  /* boutons icones */
  .iconbtn{
    display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; padding:0; border-radius:6px;
    border:1px solid transparent; background:transparent;
    color: var(--vscode-foreground); opacity:.8;
  }
  .iconbtn:hover{ background: var(--vscode-toolbar-hoverBackground, rgba(127,127,127,.18)); opacity:1; }
  .iconbtn.active{ background: rgba(55,148,255,.24); border-color: rgba(55,148,255,.55); opacity:1; }
  .iconbtn.has-inset{ color: var(--vscode-charts-blue, #3794ff); opacity:1; }
  .iconbtn svg{ width:15px; height:15px; fill: currentColor; }
  .textbtn{
    min-width:34px; height:28px; padding:0 8px; border-radius:6px;
    font-weight:700; letter-spacing:.3px;
  }

  /* ----- Liste de cartes ----- */
  #list{ padding:16px; display:flex; flex-direction:column; gap: var(--sp-gap); }
  .card{
    border:1px solid var(--vscode-panel-border, #3c3c3c);
    border-radius: var(--sp-radius);
    overflow:hidden;
    background: var(--vscode-editorWidget-background, #252526);
    box-shadow: 0 1px 3px rgba(0,0,0,.18);
  }
  .card-head{
    display:flex; align-items:center; gap:8px;
    padding:7px 10px 7px 12px;
    border-bottom:1px solid var(--vscode-panel-border, #3c3c3c);
  }
  .compare-check{ margin:0 2px 0 0; accent-color: var(--vscode-charts-blue, #3794ff); cursor:pointer; }
  .card-head .title{ font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-head .ts{ font-size:11px; opacity:.55; }
  .coords{
    font-family: var(--vscode-editor-font-family, monospace);
    font-size:11px; opacity:1; white-space:nowrap;
    padding:2px 8px; margin-right:2px; border-radius:6px;
    color: var(--sp-text);
    background: var(--sp-surface-2);
    border:1px solid var(--sp-border);
    box-shadow: var(--sp-shadow-1);
    min-width:0;
  }
  .coords:empty{ background:transparent; border-color:transparent; box-shadow:none; }
  .card-head .badge{
    font-size:10px; font-weight:700; letter-spacing:.4px;
    padding:2px 7px; border-radius:999px;
    background: var(--sp-accent-soft);
    color: var(--sp-text);
  }
  .card-head .spacer{ flex:1; }
  .tagrow{ display:none; gap:5px; flex-wrap:wrap; padding:6px 10px 7px 34px; border-bottom:1px solid var(--vscode-panel-border, #3c3c3c); }
  .tagrow.show{ display:flex; }
  .tag{ font-size:10.5px; padding:2px 7px; border-radius:999px; color: var(--sp-text); background: var(--sp-accent-soft); border:1px solid var(--sp-border); }
  .card.filtered{ display:none; }

  .imgwrap{ background: var(--sp-plot-bg); text-align:center; padding:10px; }
  .imgwrap img{ max-width:100%; height:auto; display:inline-block; border-radius:2px; }
  .imgwrap img.vector{ width:100%; }
  body.no-fit .imgwrap img{ max-width:none; }
  body.no-fit .imgwrap img.vector{ width:auto; }
  body.no-fit .imgwrap{ overflow-x:auto; }
  .plotwrap{ padding:4px; background: var(--sp-plot-bg); }
  .sp-inset-armed{ outline:2px dashed rgba(55,148,255,.85); outline-offset:-2px; }

  /* ----- Lecteur d'animation ----- */
  .player{ background: var(--sp-plot-bg); }
  .player .stage{ text-align:center; padding:10px; }
  .player .stage img{ max-width:100%; height:auto; display:inline-block; }
  body.no-fit .player .stage img{ max-width:none; }
  .player.large .stage{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding:14px; }
  .player.large .stage img{ max-width:100%; max-height:100%; object-fit:contain; }

  .controls{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:8px 12px;
    background: var(--vscode-sideBar-background, #252526);
    border-top:1px solid var(--vscode-panel-border, #3c3c3c);
    color: var(--vscode-foreground, #cccccc);
  }
  .controls .transport{ display:flex; align-items:center; gap:2px; }
  .controls .scrub{ flex:1; display:flex; align-items:center; }
  .controls input[type=range]{
    width:100%; margin:0; cursor:pointer;
    accent-color: var(--vscode-charts-blue, #3794ff);
  }
  .controls .framelabel{ font-size:11.5px; opacity:.8; min-width:78px; text-align:right; font-variant-numeric: tabular-nums; }
  .controls select{
    font-family:inherit; font-size:11.5px; padding:3px 5px; border-radius:5px;
    background: var(--vscode-dropdown-background); color: var(--vscode-dropdown-foreground);
    border:1px solid var(--vscode-dropdown-border, transparent);
  }

  /* ----- Etat vide ----- */
  .empty{ padding:64px 24px; text-align:center; opacity:.6; font-size:13px; line-height:1.6; }
  .empty code{ background: var(--vscode-textCodeBlock-background, rgba(127,127,127,.15)); padding:1px 6px; border-radius:4px; }

  /* ----- Overlay « agrandir » ----- */
  .overlay{
    position:fixed; inset:0; z-index:100;
    display:none; flex-direction:column;
    background: var(--vscode-editor-background, #1e1e1e);
  }
  .overlay.show{ display:flex; }
  .overlay .obar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:8px 14px; border-bottom:1px solid var(--vscode-panel-border, #3c3c3c);
    background: var(--vscode-sideBar-background, #252526);
  }
  .overlay .obar .otitle{ font-weight:600; font-size:13px; }
  .overlay .obar .spacer{ flex:1; }
  .overlay .obody{ flex:1; display:flex; min-height:0; }
  .overlay .obody > *{ flex:1; min-height:0; }
  .overlay .ov-plot{ width:100%; height:100%; background: var(--sp-plot-bg); }
  .overlay .ov-img{ width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background: var(--sp-plot-bg); padding:16px; }
  .overlay .ov-img img{ max-width:100%; max-height:100%; object-fit:contain; }
  .overlay .player{ width:100%; height:100%; display:flex; flex-direction:column; }

  /* ----- Comparaison ----- */
  .compare-body{ flex:1; min-height:0; display:flex; background: var(--sp-plot-bg); }
  .compare-grid{
    flex:1; min-width:0; min-height:0;
    display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    grid-auto-rows:minmax(280px, 1fr);
    gap:1px; background: var(--vscode-panel-border, #3c3c3c);
    overflow:auto; align-content:start;
  }
  .compare-pane{ min-width:0; min-height:0; display:flex; flex-direction:column; background: var(--sp-plot-bg); }
  .compare-pane-title{
    flex:0 0 auto; padding:7px 11px;
    color: var(--sp-text); background: var(--sp-surface-2);
    border-bottom:1px solid var(--sp-border);
    font-size:12px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .compare-slot{
    flex:1; min-height:0; min-width:0;
    display:flex; align-items:center; justify-content:center;
    overflow:auto; padding:12px; background: var(--sp-plot-bg);
  }
  .compare-slot img{ max-width:100%; max-height:100%; object-fit:contain; }
  .compare-slot .compare-plot{ width:100%; height:100%; min-height:320px; }
  .compare-slot .player{ width:100%; height:100%; display:flex; flex-direction:column; }
  .compare-stack{
    position:relative; flex:1; min-height:0; min-width:0;
    background: var(--sp-plot-bg); overflow:hidden;
  }
  .compare-layer{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    padding:18px; overflow:auto; background: transparent;
  }
  .compare-layer img{ max-width:100%; max-height:100%; object-fit:contain; }
  .compare-layer.secondary{ opacity:.55; mix-blend-mode:multiply; pointer-events:none; }
  .compare-stack .compare-plot{ width:100%; height:100%; }
  .opacity-control{ display:none; align-items:center; gap:8px; font-size:12px; opacity:.9; }
  .opacity-control input{ width:150px; accent-color: var(--vscode-charts-blue, #3794ff); }
  .error-panel{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:6px 14px; font-size:12px;
    background: var(--vscode-sideBar-background, #252526);
    border-bottom:1px solid var(--vscode-panel-border, #3c3c3c);
  }
  .error-panel .error-types{ display:flex; gap:10px; flex-wrap:wrap; }
  .error-panel select{ margin-left:4px; }
  .error-warn{ color: var(--vscode-charts-yellow, #cca700); font-size:11px; }
    .inset-overlay {
      position: absolute; box-sizing: border-box; z-index: 5;
      cursor: move; background: transparent; touch-action: none;
    }
    .inset-handle {
      position: absolute; width: 12px; height: 12px; box-sizing: border-box;
      background: #fff; border: 2px solid rgba(55,148,255,0.95);
      border-radius: 2px; touch-action: none;
    }
    .inset-handle-nw { left: -6px; top: -6px; cursor: nwse-resize; }
    .inset-handle-ne { right: -6px; top: -6px; cursor: nesw-resize; }
    .inset-handle-sw { left: -6px; bottom: -6px; cursor: nesw-resize; }
    .inset-handle-se { right: -6px; bottom: -6px; cursor: nwse-resize; }
</style>
</head>
<body class="fit">
  <div class="toolbar">
    <span class="brand"><span class="dot"></span>Graphes</span>
    <span class="count" id="count">0 graphe</span>
    <input class="search" id="searchInput" type="search" placeholder="Filtrer titre ou tag" title="Filtrer les graphes par titre ou tag">
    <span class="spacer"></span>
    <span class="compare-status" id="compareStatus">0 selectionne</span>
    <button class="compact" id="compareSide" disabled>Cote a cote</button>
    <button class="compact" id="compareStack" disabled>Superposer</button>
    <label class="fit"><input type="checkbox" id="fitToggle" checked> Ajuster à la largeur</label>
    <button class="primary" id="saveAll">Tout enregistrer</button>
    <button id="deleteAll">Tout supprimer</button>
  </div>

  <div id="list"></div>
  <div class="empty" id="empty">
    Aucun graphe pour l'instant.<br>
    Lancez un script avec <code>plt.show()</code> (ou une animation matplotlib) dans un nouveau terminal.
  </div>

  <!-- Overlay « agrandir » -->
  <div class="overlay" id="overlay">
    <div class="obar">
      <span class="otitle" id="ovTitle"></span>
      <span class="spacer"></span>
      <span class="coords" id="ovCoords"></span>
      <button id="ovClose">Fermer ✕</button>
    </div>
    <div class="obody" id="ovBody"></div>
  </div>

  <!-- Overlay comparaison -->
  <div class="overlay" id="compareOverlay">
    <div class="obar">
      <span class="otitle" id="compareTitle"></span>
      <span class="spacer"></span>
      <label class="opacity-control" id="compareOpacityWrap">
        Opacite autres
        <input type="range" id="compareOpacity" min="0" max="100" value="55">
      </label>
      <button id="compareClose">Fermer x</button>
      <button id="errorToggle" class="compact" disabled title="Disponible uniquement en superposition interactive (Plotly) avec au moins 2 courbes">Erreur</button>
      <span class="error-warn" id="errorWarn"></span>
    </div>
    <div class="error-panel" id="errorPanel" style="display:none">
      <label>Reference :
        <select id="errorRef"></select>
      </label>
      <span class="error-types">
        <label><input type="checkbox" class="error-type" value="signed"> Difference signee</label>
        <label><input type="checkbox" class="error-type" value="abs"> Erreur absolue</label>
        <label><input type="checkbox" class="error-type" value="rel"> Erreur relative</label>
        <label><input type="checkbox" class="error-type" value="relpct"> Erreur relative %</label>
      </span>
      <button id="errorApply" class="compact">Appliquer</button>
      <button id="errorHide" class="compact">Masquer</button>
    </div>
    <div class="compare-body" id="compareBody"></div>
  </div>

<script nonce="{{nonce}}">
(function(){
  "use strict";
  const vscodeApi = acquireVsCodeApi();
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");
  const searchInput = document.getElementById("searchInput");
  const compareStatus = document.getElementById("compareStatus");
  const compareSide = document.getElementById("compareSide");
  const compareStack = document.getElementById("compareStack");
  const compareOverlay = document.getElementById("compareOverlay");
  const compareBody = document.getElementById("compareBody");
  const compareTitle = document.getElementById("compareTitle");
  const compareOpacityWrap = document.getElementById("compareOpacityWrap");
  const compareOpacity = document.getElementById("compareOpacity");
  const errorToggle = document.getElementById("errorToggle");
  const errorPanel = document.getElementById("errorPanel");
  const errorRef = document.getElementById("errorRef");
  const errorApply = document.getElementById("errorApply");
  const errorHide = document.getElementById("errorHide");
  const errorWarn = document.getElementById("errorWarn");
  let errorState = { active: false, refKey: null, types: [] };
  const overlay = document.getElementById("overlay");
  const ovBody = document.getElementById("ovBody");
  const ovTitle = document.getElementById("ovTitle");

  const ICONS = {
    first: '<svg viewBox="0 0 16 16"><path d="M4 3.5h1.7v9H4zM12.5 3.5 6.2 8l6.3 4.5z"/></svg>',
    prev:  '<svg viewBox="0 0 16 16"><path d="M11.5 3.5 5.2 8l6.3 4.5z"/></svg>',
    play:  '<svg viewBox="0 0 16 16"><path d="M5 3.3v9.4l7.2-4.7z"/></svg>',
    pause: '<svg viewBox="0 0 16 16"><path d="M4.6 3h2.3v10H4.6zM9.1 3h2.3v10H9.1z"/></svg>',
    next:  '<svg viewBox="0 0 16 16"><path d="M4.5 3.5 10.8 8l-6.3 4.5z"/></svg>',
    last:  '<svg viewBox="0 0 16 16"><path d="M11.9 3.5h1.7v9h-1.7zM3.5 3.5 9.8 8l-6.3 4.5z"/></svg>',
    expand:'<svg viewBox="0 0 16 16"><path d="M2 2h5v1.7H3.7V7H2zM14 2v5h-1.7V3.7H9V2zM2 9h1.7v3.3H7V14H2zM12.3 9H14v5H9v-1.7h3.3z"/></svg>',
    save:  '<svg viewBox="0 0 16 16"><path d="M3 2h7.6L14 5.4V14H3zm2.2 0v4.2h5V2H8.4v2.8H7.2V2zM4.4 9.2V14h7.2V9.2z"/></svg>',
    trash: '<svg viewBox="0 0 16 16"><path d="M6 2h4l.7 1.3H14V5H2V3.3h3.3zM3.3 6h9.4l-.7 8H4z"/></svg>'
  };

  const figStore = {};   // id -> fig
  const compareChecks = {}; // id -> checkbox
  const selectedForCompare = [];
  let comparePlayers = [];
  let searchQuery = "";  // filtre courant (titre/tags)
  let n = 0;

  function refreshCount(){
    count.textContent = n + (n > 1 ? " graphes" : " graphe");
    empty.style.display = (n === 0) ? "block" : "none";
  }

  function normalizeTags(tags){
    if (!Array.isArray(tags)){ return []; }
    const seen = {};
    const out = [];
    tags.forEach(function(tag){
      const clean = String(tag).trim();
      const key = clean.toLowerCase();
      if (clean && !seen[key]){
        seen[key] = true;
        out.push(clean);
      }
    });
    return out;
  }

  function tagText(fig){
    return normalizeTags(fig.tags).join(" ");
  }

  function matchesSearch(fig){
    const q = searchQuery.trim().toLowerCase();
    if (!q){ return true; }
    return (fig.title + " " + tagText(fig)).toLowerCase().indexOf(q) !== -1;
  }

  function renderTags(card, fig){
    const row = card.querySelector(".tagrow");
    if (!row){ return; }
    row.innerHTML = "";
    const tags = normalizeTags(fig.tags);
    tags.forEach(function(tag){
      const item = document.createElement("span");
      item.className = "tag";
      item.textContent = tag;
      row.appendChild(item);
    });
    row.classList.toggle("show", tags.length > 0);
  }

  function applySearchFilter(){
    Object.keys(figStore).forEach(function(key){
      const fig = figStore[key];
      const card = document.getElementById("fig-" + key);
      if (card){ card.classList.toggle("filtered", !matchesSearch(fig)); }
    });
  }

  function editTags(fig){
    vscodeApi.postMessage({ type: "editTags", id: fig.id });
  }

  // Decodage base64 -> Blob (sans fetch, pour respecter la CSP du webview).
  function b64ToBlob(b64, mime){
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++){ arr[i] = bytes.charCodeAt(i); }
    return new Blob([arr], { type: mime || "image/png" });
  }
  function dataUrlToBlob(dataUrl){
    const comma = dataUrl.indexOf(",");
    const meta = dataUrl.slice(0, comma);
    const mimeMatch = meta.match(/data:([^;]+)/);
    return b64ToBlob(dataUrl.slice(comma + 1), mimeMatch ? mimeMatch[1] : "image/png");
  }

  // Image de la figure -> Blob PNG (Plotly rendu, sinon PNG/frame en base64).
  function blobFromFig(fig, frameIndex){
    if (fig.plotly && typeof Plotly !== "undefined"){
      const el = document.getElementById("plot-" + fig.id);
      if (el){
        return Plotly.toImage(el, { format: "png", scale: 2 })
          .then(function(url){ return dataUrlToBlob(url); });
      }
    }
    let b64 = fig.png;
    if (fig.frames && fig.frames.length){
      const idx = Math.min(Math.max(frameIndex || 0, 0), fig.frames.length - 1);
      b64 = fig.frames[idx];
    }
    if (!b64){ return Promise.reject(new Error("aucune image PNG disponible")); }
    return Promise.resolve(b64ToBlob(b64, "image/png"));
  }

  function copyFig(fig, frameIndex){
    blobFromFig(fig, frameIndex).then(function(blob){
      return navigator.clipboard.write([ new ClipboardItem({ "image/png": blob }) ]);
    }).then(function(){
      vscodeApi.postMessage({ type: "copied" });
    }).catch(function(err){
      vscodeApi.postMessage({ type: "copyFailed", error: String(err) });
    });
  }
  function syncCompareChecks(){
    Object.keys(compareChecks).forEach(function(key){
      const id = parseInt(key, 10);
      compareChecks[key].checked = selectedForCompare.indexOf(id) !== -1;
    });
  }

  function updateCompareToolbar(){
    const total = selectedForCompare.length;
    compareStatus.textContent = total + (total > 1 ? " selectionnes" : " selectionne");
    const ready = total >= 2;
    compareSide.disabled = !ready;
    compareStack.disabled = !ready;
  }

  function setCompareSelection(id, checked){
    const idx = selectedForCompare.indexOf(id);
    if (checked && idx === -1){
      selectedForCompare.push(id);
    } else if (!checked && idx !== -1){
      selectedForCompare.splice(idx, 1);
    }
    syncCompareChecks();
    updateCompareToolbar();
  }
  function removeCompareSelection(id){
    const idx = selectedForCompare.indexOf(id);
    if (idx !== -1){ selectedForCompare.splice(idx, 1); }
    delete compareChecks[id];
    updateCompareToolbar();
  }

  function iconBtn(name, title){
    const b = document.createElement("button");
    b.className = "iconbtn";
    b.title = title;
    b.innerHTML = ICONS[name] || "";
    return b;
  }

  // ----------------------------------------------------------
  // Lecteur d'animation
  // ----------------------------------------------------------
  function createPlayer(fig, large){
    const N = fig.frames.length;
    const interval = Math.max(Number(fig.interval) || 100, 20);
    let index = 0;
    let speed = 1;
    let timer = null;

    const root = document.createElement("div");
    root.className = "player" + (large ? " large" : "");

    const stage = document.createElement("div");
    stage.className = "stage";
    const img = document.createElement("img");
    img.alt = fig.title;
    stage.appendChild(img);

    const controls = document.createElement("div");
    controls.className = "controls";

    const transport = document.createElement("div");
    transport.className = "transport";
    const bFirst = iconBtn("first", "Première frame");
    const bPrev  = iconBtn("prev", "Frame précédente");
    const bPlay  = iconBtn("play", "Lecture / Pause");
    const bNext  = iconBtn("next", "Frame suivante");
    const bLast  = iconBtn("last", "Dernière frame");
    transport.append(bFirst, bPrev, bPlay, bNext, bLast);

    const scrub = document.createElement("div");
    scrub.className = "scrub";
    const slider = document.createElement("input");
    slider.type = "range";
    slider.min = "0"; slider.max = String(N - 1); slider.step = "1"; slider.value = "0";
    scrub.appendChild(slider);

    const label = document.createElement("span");
    label.className = "framelabel";

    const speedSel = document.createElement("select");
    speedSel.title = "Vitesse de lecture";
    [["0.25","0.25×"],["0.5","0.5×"],["1","1×"],["2","2×"],["4","4×"]].forEach(function(o){
      const opt = document.createElement("option");
      opt.value = o[0]; opt.textContent = o[1];
      if (o[0] === "1"){ opt.selected = true; }
      speedSel.appendChild(opt);
    });

    controls.append(transport, scrub, label, speedSel);
    root.append(stage, controls);

    function render(){
      img.src = "data:image/png;base64," + fig.frames[index];
      slider.value = String(index);
      label.textContent = (index + 1) + " / " + N;
      root.dataset.frame = String(index);
    }
    function setPlaying(p){
      if (p && timer === null){
        bPlay.innerHTML = ICONS.pause;
        timer = setInterval(function(){
          index = (index + 1) % N;
          render();
        }, interval / speed);
      } else if (!p && timer !== null){
        clearInterval(timer); timer = null;
        bPlay.innerHTML = ICONS.play;
      }
    }
    function go(i){ setPlaying(false); index = Math.max(0, Math.min(N - 1, i)); render(); }

    bFirst.addEventListener("click", function(){ go(0); });
    bPrev.addEventListener("click", function(){ go(index - 1); });
    bNext.addEventListener("click", function(){ go(index + 1); });
    bLast.addEventListener("click", function(){ go(N - 1); });
    bPlay.addEventListener("click", function(){ setPlaying(timer === null); });
    slider.addEventListener("input", function(){ go(parseInt(slider.value, 10)); });
    speedSel.addEventListener("change", function(){
      speed = parseFloat(speedSel.value) || 1;
      if (timer !== null){ setPlaying(false); setPlaying(true); }
    });

    render();
    return {
      root: root,
      getIndex: function(){ return index; },
      destroy: function(){ if (timer !== null){ clearInterval(timer); timer = null; } }
    };
  }

  // ----------------------------------------------------------
  // Rendu Plotly
  // ----------------------------------------------------------

  function axisKeyFromRef(ref, kind){
    ref = ref || kind;
    const suffix = ref === kind ? "" : String(ref).slice(1);
    return kind + "axis" + suffix;
  }

  function axisRefFromKey(key){
    const kind = key.charAt(0);
    const suffix = key.slice((kind + "axis").length);
    return kind + suffix;
  }

  function traceAxisRef(trace, kind){
    return trace && trace[kind + "axis"] ? trace[kind + "axis"] : kind;
  }

  function rangeNumber(value, axisLayout){
    if (value === null || value === undefined){ return null; }
    if (axisLayout && axisLayout.type === "date"){
      const t = Date.parse(value);
      return isNaN(t) ? null : t;
    }
    const n = Number(value);
    return isFinite(n) ? n : null;
  }

  function pointNumber(value, axisLayout){
    const n = rangeNumber(value, axisLayout);
    if (n === null){ return null; }
    if (axisLayout && axisLayout.type === "log"){
      return n > 0 ? Math.log(n) / Math.LN10 : null;
    }
    return n;
  }

  function axisRangeNumbers(axisLayout){
    const r = axisLayout && Array.isArray(axisLayout.range) ? axisLayout.range : null;
    if (!r || r.length < 2){ return null; }
    const a = rangeNumber(r[0], axisLayout);
    const b = rangeNumber(r[1], axisLayout);
    if (a === null || b === null || a === b){ return null; }
    return [a, b];
  }

  function matchingAxisTraces(data, xRef, yRef){
    return (data || []).filter(function(trace){
      return traceAxisRef(trace, "x") === xRef && traceAxisRef(trace, "y") === yRef;
    });
  }

  function rangeFromTraceData(traces, kind, axisLayout){
    let lo = Infinity;
    let hi = -Infinity;
    const key = kind === "x" ? "x" : "y";
    traces.forEach(function(trace){
      const values = Array.isArray(trace[key]) ? trace[key] : [];
      const step = Math.max(1, Math.floor(values.length / 1200));
      for (let i = 0; i < values.length; i += step){
        const n = pointNumber(values[i], axisLayout);
        if (n === null){ continue; }
        lo = Math.min(lo, n);
        hi = Math.max(hi, n);
      }
    });
    if (!isFinite(lo) || !isFinite(hi) || lo === hi){ return null; }
    return [lo, hi];
  }

  function fullAxisRange(baseLayout, traces, axisKey, kind){
    const axisLayout = baseLayout[axisKey] || {};
    return axisRangeNumbers(axisLayout) || rangeFromTraceData(traces, kind, axisLayout);
  }

  function valueToPaper(value, fullRange, domain){
    if (!fullRange || fullRange[0] === fullRange[1]){ return null; }
    const t = (value - fullRange[0]) / (fullRange[1] - fullRange[0]);
    return domain[0] + t * (domain[1] - domain[0]);
  }

  function rangeToPaperDomain(range, fullRange, domain, axisLayout){
    if (!range || !fullRange){ return null; }
    const a = rangeNumber(range[0], axisLayout);
    const b = rangeNumber(range[1], axisLayout);
    if (a === null || b === null){ return null; }
    const p0 = valueToPaper(a, fullRange, domain);
    const p1 = valueToPaper(b, fullRange, domain);
    if (p0 === null || p1 === null){ return null; }
    return [Math.min(p0, p1), Math.max(p0, p1)];
  }

  function normalizedRange(range, axisLayout){
    if (!range || range.length < 2){ return null; }
    const a = rangeNumber(range[0], axisLayout);
    const b = rangeNumber(range[1], axisLayout);
    if (a === null || b === null){ return null; }
    return [Math.min(a, b), Math.max(a, b)];
  }

  function valueInRange(value, range, axisLayout){
    const r = normalizedRange(range, axisLayout);
    const v = pointNumber(value, axisLayout);
    if (!r || v === null){ return false; }
    return v >= r[0] && v <= r[1];
  }

  function selectionPaperRect(baseLayout, selection, xFull, yFull, xDomain, yDomain, xAxis, yAxis){
    const fallback = { x0: xDomain[0], x1: xDomain[1], y0: yDomain[0], y1: yDomain[1] };
    const sx = rangeToPaperDomain(selection.xRange, xFull, xDomain, xAxis);
    const sy = rangeToPaperDomain(selection.yRange, yFull, yDomain, yAxis);
    if (!sx || !sy){ return fallback; }
    return { x0: sx[0], x1: sx[1], y0: sy[0], y1: sy[1] };
  }

  function annotationPaperRect(annotation, baseLayout, selection, xFull, yFull, xDomain, yDomain){
    if (!annotation){ return null; }
    const xref = annotation.xref || "x";
    const yref = annotation.yref || "y";
    let px = null;
    let py = null;
    if (xref === "paper"){
      px = Number(annotation.x);
    } else if (xref === selection.xRef){
      px = valueToPaper(pointNumber(annotation.x, baseLayout[selection.xaxisKey] || {}), xFull, xDomain);
    }
    if (yref === "paper"){
      py = Number(annotation.y);
    } else if (yref === selection.yRef){
      py = valueToPaper(pointNumber(annotation.y, baseLayout[selection.yaxisKey] || {}), yFull, yDomain);
    }
    if (!isFinite(px) || !isFinite(py)){ return null; }
    const text = String(annotation.text || "").replace(/<[^>]+>/g, "");
    const halfW = Math.min(0.16, Math.max(0.035, text.length * 0.004));
    const halfH = 0.035;
    return { x0: px - halfW, x1: px + halfW, y0: py - halfH, y1: py + halfH };
  }

  // Construit le contexte numerique (coordonnees paper, points convertis) et
  // delegue le choix de placement au module pur InsetLayout.
  function chooseInsetDomain(baseData, baseLayout, selection){
    const xAxis = baseLayout[selection.xaxisKey] || {};
    const yAxis = baseLayout[selection.yaxisKey] || {};
    const xDomain = Array.isArray(xAxis.domain) ? xAxis.domain : [0.08, 0.96];
    const yDomain = Array.isArray(yAxis.domain) ? yAxis.domain : [0.12, 0.94];
    const traces = matchingAxisTraces(baseData, selection.xRef, selection.yRef);
    const xFull = fullAxisRange(baseLayout, traces, selection.xaxisKey, "x");
    const yFull = fullAxisRange(baseLayout, traces, selection.yaxisKey, "y");
    if (!xFull || !yFull || traces.length === 0){
      const cands = InsetLayout.makeInsetCandidates(xDomain, yDomain);
      return cands.length ? { xDomain: cands[0].xDomain, yDomain: cands[0].yDomain }
                          : { xDomain: [0.62, 0.96], yDomain: [0.60, 0.94] };
    }
    const selectedPaper = selectionPaperRect(baseLayout, selection, xFull, yFull, xDomain, yDomain, xAxis, yAxis);
    const baseAnns = Array.isArray(baseLayout.annotations) ? baseLayout.annotations : [];
    const annotationRects = [];
    baseAnns.forEach(function(a){
      const r = annotationPaperRect(a, baseLayout, selection, xFull, yFull, xDomain, yDomain);
      if (r){ annotationRects.push(r); }
    });
    // points convertis en nombres (dates gerees par pointNumber)
    const numTraces = traces.map(function(t){
      const xs = Array.isArray(t.x) ? t.x : [];
      const ys = Array.isArray(t.y) ? t.y : [];
      const n = Math.min(xs.length, ys.length);
      const ox = new Array(n), oy = new Array(n);
      for (let i = 0; i < n; i++){ ox[i] = pointNumber(xs[i], xAxis); oy[i] = pointNumber(ys[i], yAxis); }
      return { x: ox, y: oy };
    });
    return InsetLayout.chooseInsetDomain({
      xDomain: xDomain, yDomain: yDomain, xFull: xFull, yFull: yFull,
      selectedPaper: selectedPaper, traces: numTraces, annotationRects: annotationRects
    });
  }

  function nextAxisIndex(layout){
    let max = 1;
    Object.keys(layout || {}).forEach(function(key){
      const m = key.match(/^[xy]axis(\d*)$/);
      if (!m){ return; }
      const n = m[1] ? parseInt(m[1], 10) : 1;
      if (isFinite(n)){ max = Math.max(max, n); }
    });
    return max + 1;
  }

  function baseLayoutForPlot(el){
    const layout = clone(el._spBaseLayout || {});
    if (el.layout && el.layout.height !== undefined){ layout.height = el.layout.height; }
    if (el.layout && el.layout.width !== undefined){ layout.width = el.layout.width; }
    return layout;
  }

  function parseZoomInsetSelection(update){
    const ranges = {};
    Object.keys(update || {}).forEach(function(key){
      const m = key.match(/^([xy]axis\d*)\.range\[(0|1)\]$/);
      if (!m){ return; }
      if (!ranges[m[1]]){ ranges[m[1]] = []; }
      ranges[m[1]][parseInt(m[2], 10)] = update[key];
    });
    function complete(r){
      return r && r[0] !== undefined && r[1] !== undefined && String(r[0]) !== String(r[1]);
    }
    const xKeys = Object.keys(ranges).filter(function(k){ return k.charAt(0) === "x" && complete(ranges[k]); });
    const yKeys = Object.keys(ranges).filter(function(k){ return k.charAt(0) === "y" && complete(ranges[k]); });
    if (xKeys.length === 0 || yKeys.length === 0){ return null; }
    const xKey = xKeys[0];
    const suffix = xKey.slice("xaxis".length);
    // Apparie le meme suffixe si dispo (multi-subplots), sinon le premier Y
    // complet : couvre le panneau d'erreur ou X="xaxis" est partage et Y="yaxis2".
    const yKey = yKeys.indexOf("yaxis" + suffix) >= 0 ? "yaxis" + suffix : yKeys[0];
    const xr = ranges[xKey], yr = ranges[yKey];
    return {
      xaxisKey: xKey,
      yaxisKey: yKey,
      xRef: axisRefFromKey(xKey),
      yRef: axisRefFromKey(yKey),
      xRange: [xr[0], xr[1]],
      yRange: [yr[0], yr[1]]
    };
  }

  function insetAxis(baseAxis, domain, anchor, range){
    const axis = Object.assign({}, baseAxis || {});
    axis.domain = domain;
    axis.anchor = anchor;
    axis.range = range;
    axis.title = { text: "" };
    axis.showgrid = false;
    axis.zeroline = false;
    axis.showline = true;
    axis.mirror = true;
    axis.ticks = "outside";
    axis.tickfont = Object.assign({}, axis.tickfont || {}, { size: 9 });
    axis.linecolor = axis.linecolor || "rgba(60,60,60,0.9)";
    delete axis.scaleanchor;
    delete axis.matches;
    delete axis.rangeslider;
    return axis;
  }

  function insetTraces(baseData, selection, xRef, yRef){
    return matchingAxisTraces(baseData, selection.xRef, selection.yRef).map(function(trace){
      const out = clone(trace);
      out.xaxis = xRef;
      out.yaxis = yRef;
      out.showlegend = false;
      out.legendgroup = undefined;
      return out;
    });
  }

  function mapPaperValue(value, fromRange, toRange){
    const n = Number(value);
    if (!isFinite(n) || !fromRange || fromRange[0] === fromRange[1]){ return null; }
    const t = (n - fromRange[0]) / (fromRange[1] - fromRange[0]);
    return toRange[0] + t * (toRange[1] - toRange[0]);
  }

  function cloneInsetAnnotation(annotation, selection, placement, insetXRef, insetYRef, baseLayout){
    const xAxis = baseLayout[selection.xaxisKey] || {};
    const yAxis = baseLayout[selection.yaxisKey] || {};
    const xref = annotation.xref || "x";
    const yref = annotation.yref || "y";
    const out = clone(annotation);

    if (xref === selection.xRef && yref === selection.yRef){
      if (!valueInRange(annotation.x, selection.xRange, xAxis) || !valueInRange(annotation.y, selection.yRange, yAxis)){
        return null;
      }
      const tailUsesData = out.axref === selection.xRef || out.ayref === selection.yRef;
      if (tailUsesData){
        const tailXOk = out.axref !== selection.xRef || valueInRange(out.ax, selection.xRange, xAxis);
        const tailYOk = out.ayref !== selection.yRef || valueInRange(out.ay, selection.yRange, yAxis);
        if (tailXOk && tailYOk){
          if (out.axref === selection.xRef){ out.axref = insetXRef; }
          if (out.ayref === selection.yRef){ out.ayref = insetYRef; }
        } else {
          delete out.ax;
          delete out.ay;
          delete out.axref;
          delete out.ayref;
        }
      }
      out.xref = insetXRef;
      out.yref = insetYRef;
    } else if (xref === "paper" && yref === "paper"){
      const xDomain = Array.isArray(xAxis.domain) ? xAxis.domain : [0.08, 0.96];
      const yDomain = Array.isArray(yAxis.domain) ? yAxis.domain : [0.12, 0.94];
      const xFull = axisRangeNumbers(xAxis);
      const yFull = axisRangeNumbers(yAxis);
      const selectedPaper = selectionPaperRect(baseLayout, selection, xFull, yFull, xDomain, yDomain, xAxis, yAxis);
      if (Number(annotation.x) < selectedPaper.x0 || Number(annotation.x) > selectedPaper.x1 ||
          Number(annotation.y) < selectedPaper.y0 || Number(annotation.y) > selectedPaper.y1){
        return null;
      }
      out.xref = "paper";
      out.yref = "paper";
      out.x = mapPaperValue(annotation.x, [selectedPaper.x0, selectedPaper.x1], placement.xDomain);
      out.y = mapPaperValue(annotation.y, [selectedPaper.y0, selectedPaper.y1], placement.yDomain);
      if (out.x === null || out.y === null){ return null; }
      out.showarrow = false;
      delete out.ax;
      delete out.ay;
      delete out.axref;
      delete out.ayref;
    } else {
      return null;
    }

    if (out.font && out.font.size){
      out.font = Object.assign({}, out.font, { size: Math.max(8, Math.min(Number(out.font.size) || 10, 11)) });
    }
    return out;
  }

  function insetAnnotations(baseLayout, selection, placement, insetXRef, insetYRef){
    const annotations = Array.isArray(baseLayout.annotations) ? baseLayout.annotations : [];
    const out = [];
    annotations.forEach(function(annotation){
      const cloned = cloneInsetAnnotation(annotation, selection, placement, insetXRef, insetYRef, baseLayout);
      if (cloned){ out.push(cloned); }
    });
    return out;
  }

  // ----------------------------------------------------------
  // Overlay HTML de l'encart : corps = deplacer, 4 coins = redimensionner.
  // C'est l'overlay (pas Plotly) qui capte les pointer events -> pas de
  // re-entrance plotly_relayout. La bordure visible reste une shape Plotly.
  // ----------------------------------------------------------
  const INSET_MIN_SIZE = 0.12;
  const INSET_CORNERS = ["nw", "ne", "sw", "se"];

  function mountInsetOverlay(el){
    if (el._spInsetOverlay){ return el._spInsetOverlay; }
    const wrap = el.parentElement;
    if (!wrap){ return null; }
    if (getComputedStyle(wrap).position === "static"){ wrap.style.position = "relative"; }
    const overlay = document.createElement("div");
    overlay.className = "inset-overlay";
    overlay.addEventListener("pointerdown", function(ev){
      if (ev.target !== overlay){ return; }      // une poignee gere son resize
      startInsetDrag(el, ev, InsetLayout.movePlacement);
    });
    // Clic droit sur l'encart = l'effacer.
    overlay.addEventListener("contextmenu", function(ev){
      ev.preventDefault();
      clearZoomInset(el);
    });
    INSET_CORNERS.forEach(function(corner){
      const h = document.createElement("div");
      h.className = "inset-handle inset-handle-" + corner;
      h.addEventListener("pointerdown", function(ev){
        startInsetDrag(el, ev, function(p, dx, dy){
          return InsetLayout.resizePlacement(p, corner, dx, dy, INSET_MIN_SIZE);
        });
      });
      overlay.appendChild(h);
    });
    wrap.appendChild(overlay);
    el._spInsetOverlay = overlay;
    return overlay;
  }

  function positionInsetOverlay(el){
    const overlay = el._spInsetOverlay;
    const placement = el._spInsetPlacement;
    const size = el._fullLayout && el._fullLayout._size;
    if (!overlay || !placement || !size){ return; }
    const box = InsetLayout.paperRectToPixels(placement, size);
    overlay.style.left = (el.offsetLeft + box.left) + "px";
    overlay.style.top = (el.offsetTop + box.top) + "px";
    overlay.style.width = box.width + "px";
    overlay.style.height = box.height + "px";
  }

  function unmountInsetOverlay(el){
    const overlay = el._spInsetOverlay;
    if (overlay && overlay.parentElement){ overlay.parentElement.removeChild(overlay); }
    el._spInsetOverlay = null;
  }

  // pointerdown -> drag : `transform(startPlacement, dxPaper, dyPaper)` produit
  // le placement brut, borne ensuite par clampPlacement.
  function startInsetDrag(el, ev, transform){
    const sel = el._spInsetSelection;
    const size = el._fullLayout && el._fullLayout._size;
    const startPlacement = el._spInsetPlacement;
    if (!sel || !size || !startPlacement){ return; }
    ev.preventDefault();
    ev.stopPropagation();
    const target = ev.currentTarget;
    try { target.setPointerCapture(ev.pointerId); } catch (e) {}
    const startX = ev.clientX, startY = ev.clientY;
    const baseLayout = el._spBaseLayout || {};
    const xDomain = (baseLayout[sel.xaxisKey] || {}).domain || [0.08, 0.96];
    const yDomain = (baseLayout[sel.yaxisKey] || {}).domain || [0.12, 0.94];
    let raf = null, pending = null;
    function onMove(e){
      pending = e;
      if (raf){ return; }
      raf = requestAnimationFrame(function(){
        raf = null;
        const d = InsetLayout.pixelDeltaToPaper(pending.clientX - startX, pending.clientY - startY, size);
        const next = transform(startPlacement, d.dx, d.dy);
        const placement = InsetLayout.clampPlacement(
          { x0: next.xDomain[0], x1: next.xDomain[1], y0: next.yDomain[0], y1: next.yDomain[1] },
          xDomain, yDomain, INSET_MIN_SIZE);
        applyZoomInset(el, sel, placement);
        positionInsetOverlay(el);
      });
    }
    function onUp(e){
      target.removeEventListener("pointermove", onMove);
      target.removeEventListener("pointerup", onUp);
      try { target.releasePointerCapture(e.pointerId); } catch (err) {}
      if (raf){ cancelAnimationFrame(raf); raf = null; }
    }
    target.addEventListener("pointermove", onMove);
    target.addEventListener("pointerup", onUp);
  }

  function applyZoomInset(el, selection, placementOverride){
    if (!el || !selection || typeof Plotly === "undefined"){ return; }
    const baseData = clone(el._spBaseData || []);
    const baseLayout = baseLayoutForPlot(el);
    const additions = insetTraces(baseData, selection, "x", "y");
    if (additions.length === 0){ return; }

    const placement = placementOverride || chooseInsetDomain(baseData, baseLayout, selection);
    el._spInsetSelection = selection;
    el._spInsetPlacement = placement;
    const axisIndex = nextAxisIndex(baseLayout);
    const insetXKey = "xaxis" + axisIndex;
    const insetYKey = "yaxis" + axisIndex;
    const insetXRef = "x" + axisIndex;
    const insetYRef = "y" + axisIndex;
    additions.forEach(function(trace){ trace.xaxis = insetXRef; trace.yaxis = insetYRef; });

    baseLayout[insetXKey] = insetAxis(baseLayout[selection.xaxisKey], placement.xDomain, insetYRef, selection.xRange);
    baseLayout[insetYKey] = insetAxis(baseLayout[selection.yaxisKey], placement.yDomain, insetXRef, selection.yRange);

    const shapes = Array.isArray(baseLayout.shapes) ? baseLayout.shapes.slice() : [];
    shapes.push({
      type: "rect", xref: selection.xRef, yref: selection.yRef,
      x0: selection.xRange[0], x1: selection.xRange[1],
      y0: selection.yRange[0], y1: selection.yRange[1],
      fillcolor: "rgba(55,148,255,0.08)",
      line: { color: "rgba(55,148,255,0.95)", width: 2, dash: "dash" },
      editable: false
    });
    shapes.push({
      type: "rect", xref: "paper", yref: "paper",
      x0: placement.xDomain[0], x1: placement.xDomain[1],
      y0: placement.yDomain[0], y1: placement.yDomain[1],
      fillcolor: "rgba(255,255,255,0)",
      line: { color: "rgba(55,148,255,0.95)", width: 2 },
      editable: false
    });
    baseLayout.shapes = shapes;
    const annotations = insetAnnotations(baseLayout, selection, placement, insetXRef, insetYRef);
    if (annotations.length){
      baseLayout.annotations = (Array.isArray(baseLayout.annotations) ? baseLayout.annotations.slice() : []).concat(annotations);
    }
    el._spHasInset = true;
    const baseConfig = el._spConfig || plotlyConfig(el._spFig || {});
    Plotly.react(el, baseData.concat(additions), baseLayout, baseConfig);
    mountInsetOverlay(el);
    requestAnimationFrame(function(){ positionInsetOverlay(el); });
  }

  function clearZoomInset(el){
    if (!el || typeof Plotly === "undefined"){ return; }
    if (!el._spHasInset){ return; }
    el._spHasInset = false;
    el._spInsetSelection = null;
    el._spInsetPlacement = null;
    unmountInsetOverlay(el);
    Plotly.react(el, clone(el._spBaseData || []), baseLayoutForPlot(el), el._spConfig || plotlyConfig(el._spFig || {}));
  }


  function plotlyConfig(fig){
    return {
      responsive: true,
      displaylogo: false,
      scrollZoom: false,
      modeBarButtonsToRemove: ["select2d", "lasso2d"],
      toImageButtonOptions: { format: "png", scale: 2, filename: fig.title }
    };
  }
  // Hauteur d'un graphe en vue liste : on conserve le ratio de la figure
  // matplotlib par rapport a la largeur disponible (donc plus haut en
  // plein ecran), borne pour rester raisonnable.
  function listPlotHeight(el, fig){
    const wIn = fig.plotly && fig.plotly.width_in;
    const hIn = fig.plotly && fig.plotly.height_in;
    const aspect = (wIn && hIn) ? (hIn / wIn) : 0.58;
    const w = el.clientWidth || (el.parentElement && el.parentElement.clientWidth) || 700;
    const maxH = Math.round(window.innerHeight * 0.92);
    return Math.max(300, Math.min(Math.round(w * aspect), maxH));
  }
  // Format compact d'un nombre pour l'affichage des coordonnees.
  function fmtNum(v){
    if (typeof v !== "number" || !isFinite(v)){ return String(v); }
    const a = Math.abs(v);
    if (a !== 0 && (a < 1e-3 || a >= 1e5)){ return v.toExponential(3); }
    return String(Math.round(v * 1000) / 1000);
  }
  function hoverText(pt){
    let s = "x " + fmtNum(pt.x) + "   y " + fmtNum(pt.y);
    if (pt.z !== undefined && pt.z !== null){ s += "   z " + fmtNum(pt.z); }
    return s;
  }
  const listPlots = [];   // { el, fig } pour le recalcul de hauteur au resize
  // Retour visuel du mode encart arme : contour sur le graphe (marche meme en
  // comparaison ou il n'y a pas de zone de coordonnees) + texte si dispo.
  function setInsetArmedFeedback(el, coordsEl){
    if (el.parentElement){ el.parentElement.classList.toggle("sp-inset-armed", !!el._spInsetArmed); }
    if (coordsEl){ coordsEl.textContent = el._spInsetArmed ? "Mode encart : trace une zone a agrandir" : ""; }
  }
  function renderPlotly(el, fig, fill, coordsEl){
    if (!fig.plotly || !el || typeof Plotly === "undefined"){ return; }
    const layout = JSON.parse(JSON.stringify(fig.plotly.layout || {}));
    // Coordonnees affichees en dehors du graphe : on coupe l'info-bulle
    // flottante sur le graphe et on garde seulement les evenements de survol.
    layout.hovermode = layout.hovermode || "closest";
    const data = fig.plotly.data.map(function(t){
      return (t.hoverinfo === undefined) ? Object.assign({}, t, { hoverinfo: "none" }) : t;
    });
    if (fill){
      delete layout.height; layout.autosize = true;
    } else {
      layout.height = listPlotHeight(el, fig);
      listPlots.push({ el: el, fig: fig });
    }
    const config = plotlyConfig(fig);
    // Bouton dedie dans la modebar Plotly : un clic (des)arme le mode encart
    // (contour pointille) ; tracer ensuite une zone cree l'encart. Robuste
    // (API Plotly officielle) et disponible aussi en mode comparaison.
    config.modeBarButtonsToAdd = [{
      name: "zoomInset",
      title: "Zoom encart : cliquer pour armer, puis tracer une zone (re-clic = desarmer)",
      icon: { width: 16, height: 16, path: "M6.4 2.2a4.2 4.2 0 1 0 2.5 7.6l3.2 3.2 1-1-3.2-3.2A4.2 4.2 0 0 0 6.4 2.2zm0 1.4a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6zM5.1 5h2.6v2.6H5.1z" },
      click: function(gd){
        gd._spInsetArmed = !gd._spInsetArmed;
        setInsetArmedFeedback(gd, coordsEl);
      }
    }];
    el._spFig = fig;
    el._spBaseData = clone(data);
    el._spBaseLayout = clone(layout);
    el._spConfig = config;
    el._spHasInset = false;
    Plotly.newPlot(el, data, layout, config);
    if (el.on){
      el.on("plotly_relayout", function(update){
        // Mode encart arme par Ctrl+clic sur la loupe : le trace de zoom
        // devient un encart au lieu d'un zoom normal.
        if (!el._spInsetArmed){ return; }
        const selection = parseZoomInsetSelection(update);
        if (!selection){ return; }
        el._spInsetArmed = false;
        setInsetArmedFeedback(el, coordsEl);
        applyZoomInset(el, selection);
      });
    }
    if (coordsEl && el.on){
      el.on("plotly_hover", function(ev){
        if (el._spInsetArmed){ return; }   // garde le message du mode encart
        const pt = ev && ev.points && ev.points[0];
        if (pt){ coordsEl.textContent = hoverText(pt); }
      });
      el.on("plotly_unhover", function(){ if (!el._spInsetArmed){ coordsEl.textContent = ""; } });
    }
  }
  let resizeTimer = null;
  window.addEventListener("resize", function(){
    if (resizeTimer){ clearTimeout(resizeTimer); }
    resizeTimer = setTimeout(function(){
      for (let i = listPlots.length - 1; i >= 0; i--){
        const p = listPlots[i];
        if (!document.body.contains(p.el)){ listPlots.splice(i, 1); continue; }
        try {
          Plotly.relayout(p.el, { height: listPlotHeight(p.el, p.fig) }).then(function(){
            if (p.el._spHasInset){ positionInsetOverlay(p.el); }
          }).catch(function(){});
        } catch (e) {}
      }
      if (compareOverlay.classList.contains("show")){ resizeComparePlots(); }
    }, 120);
  });

  // ----------------------------------------------------------
  // Carte
  // ----------------------------------------------------------
  function makeCard(fig){
    figStore[fig.id] = fig;
    const card = document.createElement("div");
    card.className = "card";
    card.id = "fig-" + fig.id;

    const head = document.createElement("div");
    head.className = "card-head";
    const compareCheck = document.createElement("input");
    compareCheck.type = "checkbox";
    compareCheck.className = "compare-check";
    compareCheck.title = "Selectionner pour comparer";
    compareCheck.addEventListener("change", function(){
      setCompareSelection(fig.id, compareCheck.checked);
    });
    compareChecks[fig.id] = compareCheck;
    head.appendChild(compareCheck);

    const title = document.createElement("span");
    title.className = "title";
    title.textContent = fig.title;
    head.appendChild(title);
    if (fig.frames){
      const badge = document.createElement("span");
      badge.className = "badge";
      badge.textContent = "ANIM · " + fig.frames.length + "f";
      head.appendChild(badge);
    }
    const ts = document.createElement("span");
    ts.className = "ts";
    ts.textContent = fig.ts;
    head.appendChild(ts);
    head.appendChild(Object.assign(document.createElement("span"), { className: "spacer" }));

    if (fig.plotly){
      const coords = document.createElement("span");
      coords.className = "coords";
      coords.id = "coords-" + fig.id;
      coords.title = "Coordonnées au survol";
      head.appendChild(coords);
    }

    const bTags = document.createElement("button");
    bTags.className = "textbtn";
    bTags.textContent = "Tags";
    bTags.title = "Modifier les tags";
    bTags.addEventListener("click", function(){ editTags(fig); });

    const bExpand = iconBtn("expand", "Agrandir");
    bExpand.addEventListener("click", function(){ openOverlay(fig.id); });
    if (fig.pgf) {
      const bPgf = document.createElement("button");
      bPgf.className = "textbtn";
      bPgf.textContent = "LaTeX";
      bPgf.title = "Copier le code LaTeX PGF/TikZ - clic droit pour enregistrer";
      bPgf.addEventListener("click", function(){
        vscodeApi.postMessage({ type: "copyPgf", id: fig.id });
      });
      bPgf.addEventListener("contextmenu", function(e){
        e.preventDefault();
        vscodeApi.postMessage({ type: "savePgf", id: fig.id });
      });
      head.appendChild(bPgf);
    }
    const bSave = iconBtn("save", "Enregistrer");
    bSave.addEventListener("click", function(){
      const player = card._player;
      vscodeApi.postMessage({
        type: "save", id: fig.id,
        frameIndex: player ? player.getIndex() : undefined
      });
    });
    const bCopy = document.createElement("button");
    bCopy.className = "textbtn";
    bCopy.textContent = "Copier";
    bCopy.title = "Copier l'image dans le presse-papiers";
    bCopy.addEventListener("click", function(){
      const player = card._player;
      copyFig(fig, player ? player.getIndex() : 0);
    });
    const bDel = iconBtn("trash", "Supprimer");
    bDel.addEventListener("click", function(){ vscodeApi.postMessage({ type: "delete", id: fig.id }); });
    const buttons = [bTags, bCopy];
    buttons.push(bExpand, bSave, bDel);
    head.append.apply(head, buttons);

    card.appendChild(head);
    const tagRow = document.createElement("div");
    tagRow.className = "tagrow";
    card.appendChild(tagRow);
    fig.tags = normalizeTags(fig.tags);
    renderTags(card, fig);

    if (fig.frames){
      const player = createPlayer(fig, false);
      card._player = player;
      card.appendChild(player.root);
    } else if (fig.plotly){
      const wrap = document.createElement("div");
      wrap.className = "plotwrap";
      const plotDiv = document.createElement("div");
      plotDiv.id = "plot-" + fig.id;
      wrap.appendChild(plotDiv);
      card.appendChild(wrap);
    } else {
      const wrap = document.createElement("div");
      wrap.className = "imgwrap";
      const img = document.createElement("img");
      if (fig.svg){
        img.src = "data:image/svg+xml;base64," + fig.svg;
        img.classList.add("vector");
      } else {
        img.src = "data:image/png;base64," + fig.png;
      }
      img.alt = fig.title;
      wrap.appendChild(img);
      card.appendChild(wrap);
    }
    return card;
  }

  function afterAttach(fig){
    if (fig.plotly){
      renderPlotly(document.getElementById("plot-" + fig.id), fig, false,
                   document.getElementById("coords-" + fig.id));
    }
  }

  // ----------------------------------------------------------
  // Comparaison de deux figures
  // ----------------------------------------------------------
  function clone(value){
    return JSON.parse(JSON.stringify(value || {}));
  }

  function figureImageSrc(fig){
    if (fig.frames && fig.frames.length > 0){
      return "data:image/png;base64," + fig.frames[0];
    }
    if (fig.svg){
      return "data:image/svg+xml;base64," + fig.svg;
    }
    if (fig.png){
      return "data:image/png;base64," + fig.png;
    }
    return null;
  }

  function appendFigureContent(slot, fig, pendingPlots){
    if (fig.frames){
      const player = createPlayer(fig, true);
      comparePlayers.push(player);
      slot.appendChild(player.root);
      return;
    }
    if (fig.plotly){
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      slot.appendChild(plot);
      pendingPlots.push(function(){ renderPlotly(plot, fig, true, null); });
      return;
    }
    const src = figureImageSrc(fig);
    if (src){
      const img = document.createElement("img");
      img.src = src;
      img.alt = fig.title;
      slot.appendChild(img);
    }
  }

  function makeComparePane(fig, pendingPlots){
    const pane = document.createElement("section");
    pane.className = "compare-pane";
    const title = document.createElement("div");
    title.className = "compare-pane-title";
    title.textContent = fig.title;
    const slot = document.createElement("div");
    slot.className = "compare-slot";
    pane.append(title, slot);
    appendFigureContent(slot, fig, pendingPlots);
    return pane;
  }

  function canMergePlotly(fig){
    const data = fig.plotly && Array.isArray(fig.plotly.data) ? fig.plotly.data : [];
    if (data.length === 0){ return false; }
    return data.every(function(trace){
      const type = trace.type || "scatter";
      const axesOk = (!trace.xaxis || trace.xaxis === "x") && (!trace.yaxis || trace.yaxis === "y");
      return axesOk && (type === "scatter" || type === "bar");
    });
  }

  function compareLabel(index){
    if (index < 26){ return String.fromCharCode(65 + index); }
    return "#" + String(index + 1);
  }

  // ----- Helpers d'aplatissement des courbes (pour le calcul d'erreur) -----

  function numericX(values){
    return values.map(function(v){
      if (typeof v === "number"){ return v; }
      const t = Date.parse(v);
      return isNaN(t) ? Number(v) : t;
    });
  }

  function flattenCurves(figs){
    const curves = [];
    let idx = 0;
    figs.forEach(function(fig){
      (fig.plotly && fig.plotly.data ? fig.plotly.data : []).forEach(function(trace){
        const type = trace.type || "scatter";
        if (type !== "scatter"){ return; } // barres exclues du calcul
        const x = numericX(trace.x || []);
        // Ecarte les lignes de reference (axvline : x constant) : ce sont des
        // Line2D mais pas des courbes y = f(x), donc hors sujet pour l'erreur.
        if (!ErrorMath.isInterpolableX(x)){ return; }
        const color = (trace.line && trace.line.color) ||
                      (trace.marker && trace.marker.color) || null;
        curves.push({
          key: "c" + idx,
          letter: compareLabel(idx),
          name: trace.name || ("courbe " + (idx + 1)),
          color: color,
          x: x,
          y: (trace.y || []).map(Number)
        });
        idx++;
      });
    });
    return curves;
  }

  function updateErrorButton(figs){
    const mergeable = figs.length >= 2 && figs.every(canMergePlotly);
    const enough = mergeable && flattenCurves(figs).length >= 2;
    errorToggle.disabled = !enough;
  }

  function populateErrorRef(curves){
    errorRef.innerHTML = "";
    curves.forEach(function(c){
      const opt = document.createElement("option");
      opt.value = c.key;
      opt.textContent = c.letter + " - " + c.name;
      errorRef.appendChild(opt);
    });
    if (curves.length){ errorRef.value = curves[0].key; }
  }

  function openErrorPanel(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    populateErrorRef(flattenCurves(figs));
    errorWarn.textContent = "";
    errorPanel.style.display = "flex";
  }

  errorToggle.addEventListener("click", function(){
    if (errorPanel.style.display === "none"){ openErrorPanel(); }
    else { errorPanel.style.display = "none"; }
  });

  function currentComparePlotEl(){
    return compareBody.querySelector(".compare-plot");
  }

  errorApply.addEventListener("click", function(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const types = Array.prototype.slice
      .call(document.querySelectorAll(".error-type:checked"))
      .map(function(cb){ return cb.value; });
    if (types.length === 0){ errorWarn.textContent = "Cochez au moins un type d'erreur."; return; }
    const el = currentComparePlotEl();
    if (!el){ return; }
    errorState = { active: true, refKey: errorRef.value, types: types };
    const merged = mergedPlotlyFigureWithErrors(figs, errorState.refKey, types);
    // Replie la barre de config AVANT de dimensionner : le graphe (et le
    // panneau d'erreur) prend toute la hauteur. Bouton « Erreur » pour rouvrir.
    errorPanel.style.display = "none";
    Plotly.purge(el);
    renderPlotly(el, merged, true, null);
    Plotly.Plots.resize(el);
    errorWarn.textContent = (merged._ignored && merged._ignored.length)
      ? "Sans recouvrement X, ignorees : " + merged._ignored.join(", ")
      : "";
  });

  errorHide.addEventListener("click", function(){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    const el = currentComparePlotEl();
    if (!el){ return; }
    errorState = { active: false, refKey: null, types: [] };
    errorWarn.textContent = "";
    const merged = mergedPlotlyFigure(figs);
    errorPanel.style.display = "none";
    Plotly.purge(el);
    renderPlotly(el, merged, true, null);
    Plotly.Plots.resize(el);
  });

  function overlayTrace(trace, label, index){
    const out = clone(trace);
    const secondary = index > 0;
    out.xaxis = "x";
    out.yaxis = "y";
    out.showlegend = true;
    out.name = label + (out.name ? " - " + out.name : "");
    if (secondary){
      out.opacity = Math.min(typeof out.opacity === "number" ? out.opacity : 1, 0.78);
      if (out.line){
        const dashes = ["dash", "dot", "dashdot"];
        out.line = Object.assign({}, out.line, { dash: out.line.dash || dashes[(index - 1) % dashes.length] });
      }
      if (out.marker){
        out.marker = Object.assign({}, out.marker, { opacity: 0.78 });
      }
    }
    return out;
  }

  function mergedPlotlyFigure(figs){
    const first = figs[0];
    const layout = clone((first.plotly && first.plotly.layout) || {});
    Object.keys(layout).forEach(function(key){
      if (/^(xaxis|yaxis)[0-9]+$/.test(key)){ delete layout[key]; }
    });
    layout.autosize = true;
    layout.showlegend = true;
    layout.hovermode = "closest";
    layout.barmode = "overlay";
    layout.annotations = [];
    delete layout.height;
    delete layout.title;
    layout.xaxis = Object.assign({}, layout.xaxis || {});
    layout.yaxis = Object.assign({}, layout.yaxis || {});
    delete layout.xaxis.domain;
    delete layout.yaxis.domain;
    delete layout.xaxis.range;
    delete layout.yaxis.range;

    const data = [];
    let widthIn = first.plotly.width_in || 7;
    let heightIn = first.plotly.height_in || 4;
    figs.forEach(function(fig, index){
      const label = compareLabel(index);
      widthIn = Math.max(widthIn, fig.plotly.width_in || 7);
      heightIn = Math.max(heightIn, fig.plotly.height_in || 4);
      fig.plotly.data.forEach(function(trace){ data.push(overlayTrace(trace, label, index)); });
    });
    return {
      id: "compare",
      title: "Superposition",
      plotly: { data: data, layout: layout, width_in: widthIn, height_in: heightIn }
    };
  }

  function allRelPct(typeIds){
    return typeIds.length > 0 && typeIds.every(function(t){ return t === "relpct"; });
  }

  function mergedPlotlyFigureWithErrors(figs, refKey, typeIds){
    const base = mergedPlotlyFigure(figs);      // superposition sur (x, y)
    const layout = base.plotly.layout;
    const curves = flattenCurves(figs);
    const ref = curves.filter(function(c){ return c.key === refKey; })[0] || curves[0];

    // Vrai sous-graphe empile : x partage, repartition ~45 / 48 (panneau
    // d'erreur agrandi) avec un ecart franc entre les deux panneaux. L'axe X
    // est ancre sous le panneau d'erreur (ticks en bas), le haut le partage.
    layout.yaxis = Object.assign({}, layout.yaxis, { domain: [0.55, 1.0] });
    layout.yaxis2 = {
      domain: [0, 0.48], anchor: "x",
      title: { text: allRelPct(typeIds) ? "erreur (%)" : "erreur" },
      zeroline: true, showgrid: true
    };
    layout.xaxis = Object.assign({}, layout.xaxis, { anchor: "y2" });
    layout.shapes = [{
      type: "line", xref: "paper", x0: 0, x1: 1,
      yref: "y2", y0: 0, y1: 0,
      line: { color: "rgba(150,150,150,0.6)", width: 1, dash: "dot" }
    }];

    const data = base.plotly.data;
    const ignored = [];
    curves.forEach(function(c){
      if (c.key === ref.key){ return; }
      // Compte le nombre de types ayant produit une trace pour cette courbe.
      let produced = 0;
      typeIds.forEach(function(typeId){
        const series = ErrorMath.buildErrorSeries(typeId, ref.x, ref.y, c.x, c.y);
        // Aucun recouvrement pour ce type : on passe au suivant sans tracer.
        if (series.y.every(function(v){ return v === null; })){ return; }
        const meta = ErrorMath.ERROR_TYPES[typeId];
        data.push({
          type: "scatter", mode: "lines",
          x: series.x, y: series.y,
          xaxis: "x", yaxis: "y2",
          connectgaps: false,
          line: c.color ? { color: c.color } : {},
          name: c.letter + "−" + ref.letter + " : " + c.name + " (" + meta.abbr + ")"
        });
        produced++;
      });
      // Une courbe est ignoree uniquement si AUCUN type n'a produit de trace.
      if (produced === 0 && ignored.indexOf(c.letter) === -1){ ignored.push(c.letter); }
    });
    base._ignored = ignored;
    return base;
  }

  function appendImageLayer(stack, fig, className){
    const layer = document.createElement("div");
    layer.className = className;
    const src = figureImageSrc(fig);
    if (src){
      const img = document.createElement("img");
      img.src = src;
      img.alt = fig.title;
      layer.appendChild(img);
    }
    stack.appendChild(layer);
    return layer;
  }

  function resizeComparePlots(){
    if (typeof Plotly === "undefined" || !Plotly.Plots){ return; }
    compareBody.querySelectorAll(".compare-plot").forEach(function(el){
      try { Plotly.Plots.resize(el); } catch (e) {}
      if (el._spHasInset){ requestAnimationFrame(function(){ positionInsetOverlay(el); }); }
    });
  }

  function clearCompare(){
    comparePlayers.forEach(function(player){ player.destroy(); });
    comparePlayers = [];
    compareBody.querySelectorAll(".compare-plot").forEach(function(el){
      try { Plotly.purge(el); } catch (e) {}
    });
    compareBody.innerHTML = "";
    compareOpacityWrap.style.display = "none";
  }

  function openCompare(mode){
    const figs = selectedForCompare.map(function(id){ return figStore[id]; }).filter(Boolean);
    if (figs.length < 2){ return; }

    clearCompare();
    const pendingPlots = [];
    const titleText = figs.map(function(fig){ return fig.title; }).join(" / ");
    compareTitle.textContent = (mode === "side" ? "Comparaison cote a cote : " : "Superposition : ") + titleText;

    if (mode === "side"){
      const grid = document.createElement("div");
      grid.className = "compare-grid";
      figs.forEach(function(fig){ grid.appendChild(makeComparePane(fig, pendingPlots)); });
      compareBody.appendChild(grid);
    } else if (figs.every(canMergePlotly)){
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      const plot = document.createElement("div");
      plot.className = "compare-plot";
      stack.appendChild(plot);
      compareBody.appendChild(stack);
      const merged = mergedPlotlyFigure(figs);
      pendingPlots.push(function(){ renderPlotly(plot, merged, true, null); });
      updateErrorButton(figs);
    } else {
      const stack = document.createElement("div");
      stack.className = "compare-stack";
      figs.forEach(function(fig, index){
        const layer = appendImageLayer(stack, fig, index === 0 ? "compare-layer" : "compare-layer secondary");
        if (index > 0){ layer.style.opacity = "0.55"; }
      });
      compareOpacity.value = "55";
      compareOpacityWrap.style.display = "flex";
      compareBody.appendChild(stack);
    }

    compareOverlay.classList.add("show");
    setTimeout(function(){
      pendingPlots.forEach(function(fn){ fn(); });
      resizeComparePlots();
    }, 30);
  }
  function closeCompare(){
    errorState = { active: false, refKey: null, types: [] };
    errorPanel.style.display = "none";
    errorToggle.disabled = true;
    compareOverlay.classList.remove("show");
    clearCompare();
  }

  // ----------------------------------------------------------
  // Overlay « agrandir »
  // ----------------------------------------------------------
  let ovPlayer = null;
  let ovResizeObserver = null;
  function clearOverlay(){
    const ovCoords = document.getElementById("ovCoords");
    if (ovCoords){ ovCoords.textContent = ""; }
    if (ovResizeObserver){ ovResizeObserver.disconnect(); ovResizeObserver = null; }
    if (ovPlayer){ ovPlayer.destroy(); ovPlayer = null; }
    if (ovBody.firstChild){
      try { Plotly.purge(ovBody.firstChild); } catch (e) {}
    }
    ovBody.innerHTML = "";
  }
  function openOverlay(id){
    const fig = figStore[id];
    if (!fig){ return; }
    clearOverlay();
    ovTitle.textContent = fig.title;

    if (fig.frames){
      ovPlayer = createPlayer(fig, true);
      ovBody.appendChild(ovPlayer.root);
    } else if (fig.plotly){
      const el = document.createElement("div");
      el.className = "ov-plot";
      ovBody.appendChild(el);
      const ovCoords = document.getElementById("ovCoords");
      ovCoords.textContent = "";
      renderPlotly(el, fig, true, ovCoords);
    } else {
      const box = document.createElement("div");
      box.className = "ov-img";
      const img = document.createElement("img");
      img.src = fig.svg ? ("data:image/svg+xml;base64," + fig.svg)
                        : ("data:image/png;base64," + fig.png);
      box.appendChild(img);
      ovBody.appendChild(box);
    }
    overlay.classList.add("show");
    if (fig.plotly){
      const plotEl = ovBody.firstChild;
      // Re-dimensionne des que le conteneur a une taille reelle (l'overlay
      // passe de display:none a flex) et a chaque changement de taille de la
      // fenetre tant qu'il est ouvert. Deterministe, contrairement a un
      // setTimeout fixe qui mesurait parfois une taille pas encore stabilisee.
      if (typeof ResizeObserver !== "undefined"){
        ovResizeObserver = new ResizeObserver(function(){
          try { Plotly.Plots.resize(plotEl); } catch (e) {}
        });
        ovResizeObserver.observe(plotEl);
      } else {
        setTimeout(function(){
          try { Plotly.Plots.resize(plotEl); } catch (e) {}
        }, 30);
      }
    }
  }
  function closeOverlay(){ overlay.classList.remove("show"); clearOverlay(); }

  document.getElementById("ovClose").addEventListener("click", closeOverlay);
  overlay.addEventListener("click", function(e){ if (e.target === overlay){ closeOverlay(); } });
  document.getElementById("compareClose").addEventListener("click", closeCompare);
  compareOverlay.addEventListener("click", function(e){ if (e.target === compareOverlay){ closeCompare(); } });
  compareSide.addEventListener("click", function(){ openCompare("side"); });
  compareStack.addEventListener("click", function(){ openCompare("stack"); });
  compareOpacity.addEventListener("input", function(){
    const value = String(Number(compareOpacity.value) / 100);
    compareBody.querySelectorAll(".compare-layer.secondary").forEach(function(layer){
      layer.style.opacity = value;
    });
  });
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape"){
      closeOverlay();
      closeCompare();
    }
  });

  // ----------------------------------------------------------
  // Export avance Plotly
  // ----------------------------------------------------------
  function postExportResult(requestId, ok, dataUrl, error){
    vscodeApi.postMessage({
      type: "exportResult",
      requestId: requestId,
      ok: ok,
      dataUrl: dataUrl || null,
      error: error || null
    });
  }

  function exportPlotly(msg){
    const fig = figStore[msg.id];
    const el = document.getElementById("plot-" + msg.id);
    if (!fig || !fig.plotly || !el || typeof Plotly === "undefined" || !Plotly.toImage){
      postExportResult(msg.requestId, false, null, "plot introuvable ou Plotly.toImage indisponible");
      return;
    }

    const options = msg.options || {};
    const format = options.format === "svg" ? "svg" : "png";
    const scale = Math.max(0.25, Number(options.scale) || 1);
    const width = Math.max(1, Math.round(el.clientWidth || (el.parentElement && el.parentElement.clientWidth) || 900));
    const height = Math.max(1, Math.round(el.clientHeight || listPlotHeight(el, fig) || 540));
    const layout = el.layout || {};
    const previous = {
      paper_bgcolor: layout.paper_bgcolor,
      plot_bgcolor: layout.plot_bgcolor
    };
    const bg = options.transparent ? "rgba(0,0,0,0)" : "#ffffff";

    Promise.resolve(Plotly.relayout(el, { paper_bgcolor: bg, plot_bgcolor: bg }))
      .then(function(){
        return Plotly.toImage(el, {
          format: format,
          width: width,
          height: height,
          scale: scale
        });
      })
      .then(function(dataUrl){
        return Promise.resolve(Plotly.relayout(el, previous)).then(function(){ return dataUrl; });
      })
      .then(function(dataUrl){
        postExportResult(msg.requestId, true, dataUrl, null);
      })
      .catch(function(err){
        try { Plotly.relayout(el, previous); } catch (e) {}
        postExportResult(msg.requestId, false, null, String(err));
      });
  }
  // ----------------------------------------------------------
  // Messages depuis l'extension
  // ----------------------------------------------------------
  function removeCard(id){
    const card = document.getElementById("fig-" + id);
    if (card){
      if (card._player){ card._player.destroy(); }
      if (figStore[id] && figStore[id].plotly){
        try { Plotly.purge(document.getElementById("plot-" + id)); } catch (e) {}
      }
      card.remove();
    }
    removeCompareSelection(id);
    delete figStore[id];
  }

  window.addEventListener("message", function(event){
    const msg = event.data;
    if (msg.type === "exportPlotly"){
      exportPlotly(msg);
    } else if (msg.type === "add"){
      list.appendChild(makeCard(msg.fig));
      afterAttach(msg.fig);
      n = n + 1; refreshCount();
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    } else if (msg.type === "remove"){
      removeCard(msg.id);
      n = Math.max(0, n - 1); refreshCount();
    } else if (msg.type === "tags"){
      const fig = figStore[msg.id];
      if (fig){
        fig.tags = normalizeTags(msg.tags);
        const card = document.getElementById("fig-" + msg.id);
        if (card){ renderTags(card, fig); }
        applySearchFilter();
      }
    } else if (msg.type === "reset"){
      closeOverlay();
      closeCompare();
      Object.keys(figStore).forEach(removeCard);
      list.innerHTML = "";
      n = 0;
      for (let i = 0; i < msg.figs.length; i++){
        list.appendChild(makeCard(msg.figs[i]));
        afterAttach(msg.figs[i]);
        n = n + 1;
      }
      refreshCount();
    }
  });

  document.getElementById("saveAll").addEventListener("click", function(){ vscodeApi.postMessage({ type: "saveAll" }); });
  document.getElementById("deleteAll").addEventListener("click", function(){ vscodeApi.postMessage({ type: "deleteAll" }); });
  if (searchInput){
    searchInput.addEventListener("input", function(e){
      searchQuery = e.target.value || "";
      applySearchFilter();
    });
  }
  document.getElementById("fitToggle").addEventListener("change", function(e){
    document.body.classList.toggle("no-fit", !e.target.checked);
  });

  refreshCount();
  updateCompareToolbar();
  vscodeApi.postMessage({ type: "ready" });
})();
</script>
