<script nonce="{{nonce}}">
// ============================================================================
// UI du webview « Graphes ». Recoit les figures depuis extension.js et les rend.
//
// Modele de donnees
//   figStore : { id -> fig }. Une `fig` = { id, title, ts, tags[], et UNE des
//   representations : plotly {data,layout} | svg | png | frames[] (animation) }.
//   Les figures arrivent par window 'message' (voir la section « Messages depuis
//   l'extension » en bas) ; protocole detaille dans CLAUDE.md.
//
// Trois surfaces de rendu (toutes passent par les memes briques) :
//   - Liste de cartes      : makeCard -> renderPlotly / createPlayer / <img>
//   - Overlay « agrandir » : openOverlay (re-rend en grand, vectoriel)
//   - Comparaison          : openCompare (grille cote-a-cote OU superposition,
//                            + sous-graphe d'erreur via mergedPlotlyFigureWithErrors)
//
// Modules purs charges a part (testes sous node, voir test/) :
//   - error_math.js  (ErrorMath)  : calcul des courbes d'erreur
//   - inset_layout.js (InsetLayout): placement/geometrie de l'encart de zoom
//   - plot_nav.js    (PlotNav)    : math du zoom molette / pan clic-milieu
//   Plotly.js est bundle (media/plotly.min.js).
//
// Fonctionnalites interactives -> ou regarder pour debugger :
//   - Zoom-encart : bouton dedie dans la modebar (config.modeBarButtonsToAdd)
//     arme `gd._spInsetArmed` ; le zoom suivant est capte dans plotly_relayout
//     -> parseZoomInsetSelection -> applyZoomInset. Deplacement/resize = overlay
//     HTML (startInsetDrag), pas Plotly.
//   - Courbes d'erreur : openErrorPanel -> mergedPlotlyFigureWithErrors.
//   - Zoom molette / pan clic-milieu : attachPlotNav.
//
// Pieges (lire avant de modifier) :
//   - On lit des internes Plotly : `el._fullLayout` (axes : _offset, _length,
//     range, r2l/l2r). Sensible a la version (Plotly 3.6.0 ici).
//   - Etat par-graphe stocke sur l'element DOM : `el._spFig`, `el._spBaseData`,
//     `el._spBaseLayout`, `el._spConfig`, `el._spHasInset`, `el._spInsetArmed`.
//   - CSP du webview : aucun reseau (pas de fetch). Tout est inline/bundle.
//   - Les icones custom de la modebar peuvent subir un flip vertical (quirk
//     Plotly) ; choisir des formes qui restent lisibles retournees.
// ============================================================================
(function(){
  "use strict";
  const vscodeApi = acquireVsCodeApi();
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");
  const searchInput = document.getElementById("searchInput");
  const compareStatus = document.getElementById("compareStatus");
  const compareSide = document.getElementById("compareSide");
  const compareStack = document.getElementById("compareStack");
  const compareOverlay = document.getElementById("compareOverlay");
  const compareBody = document.getElementById("compareBody");
  const compareTitle = document.getElementById("compareTitle");
  const compareOpacityWrap = document.getElementById("compareOpacityWrap");
  const compareOpacity = document.getElementById("compareOpacity");
  const errorToggle = document.getElementById("errorToggle");
  const errorPanel = document.getElementById("errorPanel");
  const errorApply = document.getElementById("errorApply");
  const errorHide = document.getElementById("errorHide");
  const errorWarn = document.getElementById("errorWarn");
  const errorReset = document.getElementById("errorReset");
  const errorSummary = document.getElementById("errorSummary");
  let errorState = { active: false, groups: [], types: [] };
  // Selection au clic (panneau ouvert, avant Appliquer). Liste de groupes :
  // chaque groupe { ref: cle, cmps: [cle...] } = une reference et les courbes
  // a comparer contre elle. Clic normal = ajoute une courbe au groupe courant ;
  // Ctrl/Cmd+clic = demarre un nouveau groupe (nouvelle reference).
  let errorSelect = { groups: [] };
  let compareCurrentTitle = "comparaison";
  const overlay = document.getElementById("overlay");
  const ovBody = document.getElementById("ovBody");
  const ovTitle = document.getElementById("ovTitle");

  // Icones inline facon Codicon (contours fins, viewBox 16, rendu en stroke
  // via .iconbtn svg). Memes cles : ne rien changer ailleurs.
  const ICONS = {
    first: '<svg viewBox="0 0 16 16"><path d="M4 4v8M12 4 6.5 8 12 12Z"/></svg>',
    prev:  '<svg viewBox="0 0 16 16"><path d="M10.5 4 5 8l5.5 4Z"/></svg>',
    play:  '<svg viewBox="0 0 16 16"><path d="M5.5 3.5 12 8l-6.5 4.5Z"/></svg>',
    pause: '<svg viewBox="0 0 16 16"><path d="M6 3.8v8.4M10 3.8v8.4"/></svg>',
    next:  '<svg viewBox="0 0 16 16"><path d="M5.5 4 11 8l-5.5 4Z"/></svg>',
    last:  '<svg viewBox="0 0 16 16"><path d="M4 4l5.5 4L4 12ZM12 4v8"/></svg>',
    expand:'<svg viewBox="0 0 16 16"><path d="M6 2.5H2.5V6M10 2.5H13.5V6M13.5 10V13.5H10M2.5 10V13.5H6"/></svg>',
    save:  '<svg viewBox="0 0 16 16"><path d="M8 2.5V9M5.3 6.7 8 9.4l2.7-2.7M3.5 11.3v1.9h9v-1.9"/></svg>',
    trash: '<svg viewBox="0 0 16 16"><path d="M3 4.5h10M6.3 4.5V3h3.4v1.5M4.6 4.5 5.3 13.3h5.4l.7-8.8M7 7v3.8M9 7v3.8"/></svg>'
  };

  const figStore = {};   // id -> fig
  const compareChecks = {}; // id -> checkbox
  const selectedForCompare = [];
  // Persistance de la selection de comparaison entre lancements de scripts.
  // Defaut OFF : la selection se vide a chaque nouvelle figure recue. La case
  // « Garder la selection » (keepSelToggle) la rend persistante.
  let keepCompareSelection = false;
  let comparePlayers = [];
  let searchQuery = "";  // filtre courant (titre/tags)
  let n = 0;

  function refreshCount(){
    count.textContent = n + (n > 1 ? " graphes" : " graphe");
    empty.style.display = (n === 0) ? "block" : "none";
  }

  function normalizeTags(tags){
    if (!Array.isArray(tags)){ return []; }
    const seen = {};
    const out = [];
    tags.forEach(function(tag){
      const clean = String(tag).trim();
      const key = clean.toLowerCase();
      if (clean && !seen[key]){
        seen[key] = true;
        out.push(clean);
      }
    });
    return out;
  }

  function tagText(fig){
    return normalizeTags(fig.tags).join(" ");
  }

  function matchesSearch(fig){
    // Recherche elargie (titre + tags + provenance) via le module pur.
    return FigureFilter.matchesQuery(fig, searchQuery);
  }

  // Clic sur un tag -> filtre sur ce tag (remplit la recherche).
  function filterByText(text){
    searchQuery = text;
    if (searchInput){ searchInput.value = text; }
    applySearchFilter();
  }

  function renderTags(card, fig){
    const row = card.querySelector(".tagrow");
    if (!row){ return; }
    row.innerHTML = "";
    const tags = normalizeTags(fig.tags);
    tags.forEach(function(tag){
      const item = document.createElement("span");
      item.className = "tag tag-click";
      item.textContent = tag;
      item.title = "Filtrer sur « " + tag + " »";
      item.addEventListener("click", function(){ filterByText(tag); });
      row.appendChild(item);
    });
    row.classList.toggle("show", tags.length > 0);
  }

  function applySearchFilter(){
    Object.keys(figStore).forEach(function(key){
      const fig = figStore[key];
      const card = document.getElementById("fig-" + key);
      if (card){ card.classList.toggle("filtered", !matchesSearch(fig)); }
    });
  }

  // Tri des cartes : reordonne les noeuds DOM selon FigureFilter.sortFigures.
  let sortMode = "arrival";
  function applySort(){
    const figs = Object.keys(figStore).map(function(key){ return figStore[key]; });
    FigureFilter.sortFigures(figs, sortMode).forEach(function(fig){
      const card = document.getElementById("fig-" + fig.id);
      if (card){ list.appendChild(card); }   // appendChild deplace = reordonne
    });
  }

  function editTags(fig){
    vscodeApi.postMessage({ type: "editTags", id: fig.id });
  }

  // Decodage base64 -> Blob (sans fetch, pour respecter la CSP du webview).
  function b64ToBlob(b64, mime){
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++){ arr[i] = bytes.charCodeAt(i); }
    return new Blob([arr], { type: mime || "image/png" });
  }
  function dataUrlToBlob(dataUrl){
    const comma = dataUrl.indexOf(",");
    const meta = dataUrl.slice(0, comma);
    const mimeMatch = meta.match(/data:([^;]+)/);
    return b64ToBlob(dataUrl.slice(comma + 1), mimeMatch ? mimeMatch[1] : "image/png");
  }

  // Image de la figure -> Blob PNG (Plotly rendu, sinon PNG/frame en base64).
  function blobFromFig(fig, frameIndex){
    if (fig.plotly && typeof Plotly !== "undefined"){
      const el = document.getElementById("plot-" + fig.id);
      if (el){
        return Plotly.toImage(el, { format: "png", scale: 2 })
          .then(function(url){ return dataUrlToBlob(url); });
      }
    }
    let b64 = fig.png;
    if (fig.frames && fig.frames.length){
      const idx = Math.min(Math.max(frameIndex || 0, 0), fig.frames.length - 1);
      b64 = fig.frames[idx];
    }
    if (!b64){ return Promise.reject(new Error("aucune image PNG disponible")); }
    return Promise.resolve(b64ToBlob(b64, "image/png"));
  }

  function copyFig(fig, frameIndex){
    blobFromFig(fig, frameIndex).then(function(blob){
      return navigator.clipboard.write([ new ClipboardItem({ "image/png": blob }) ]);
    }).then(function(){
      vscodeApi.postMessage({ type: "copied" });
    }).catch(function(err){
      vscodeApi.postMessage({ type: "copyFailed", error: String(err) });
    });
  }
  function syncCompareChecks(){
    Object.keys(compareChecks).forEach(function(key){
      const id = parseInt(key, 10);
      compareChecks[key].checked = selectedForCompare.indexOf(id) !== -1;
    });
  }

  function updateCompareToolbar(){
    const total = selectedForCompare.length;
    compareStatus.textContent = total + (total > 1 ? " selectionnes" : " selectionne");
    const ready = total >= 2;
    compareSide.disabled = !ready;
    compareStack.disabled = !ready;
  }

  function setCompareSelection(id, checked){
    const idx = selectedForCompare.indexOf(id);
    if (checked && idx === -1){
      selectedForCompare.push(id);
    } else if (!checked && idx !== -1){
      selectedForCompare.splice(idx, 1);
    }
    syncCompareChecks();
    updateCompareToolbar();
  }
  function removeCompareSelection(id){
    const idx = selectedForCompare.indexOf(id);
    if (idx !== -1){ selectedForCompare.splice(idx, 1); }
    delete compareChecks[id];
    updateCompareToolbar();
  }

  // Vide la selection de comparaison (sauf si l'utilisateur a coche « Garder
  // la selection »). Appelee a l'arrivee d'une nouvelle figure.
  function clearCompareSelectionUnlessKept(){
    if (keepCompareSelection || selectedForCompare.length === 0){ return; }
    selectedForCompare.length = 0;
    syncCompareChecks();
    updateCompareToolbar();
  }

  function iconBtn(name, title){
    const b = document.createElement("button");
    b.className = "iconbtn";
    b.title = title;
    b.innerHTML = ICONS[name] || "";
    return b;
  }

  // ----------------------------------------------------------
  // Lecteur d'animation
  // ----------------------------------------------------------
  function createPlayer(fig, large){
    const N = fig.frames.length;
    const interval = Math.max(Number(fig.interval) || 100, 20);
    let index = 0;
    let speed = 1;
    let timer = null;

    const root = document.createElement("div");
    root.className = "player" + (large ? " large" : "");

    const stage = document.createElement("div");
    stage.className = "stage";
    const img = document.createElement("img");
    img.alt = fig.title;
    stage.appendChild(img);

    const controls = document.createElement("div");
    controls.className = "controls";

    const transport = document.createElement("div");
    transport.className = "transport";
    const bFirst = iconBtn("first", "Première frame");
    const bPrev  = iconBtn("prev", "Frame précédente");
    const bPlay  = iconBtn("play", "Lecture / Pause");
    const bNext  = iconBtn("next", "Frame suivante");
    const bLast  = iconBtn("last", "Dernière frame");
    transport.append(bFirst, bPrev, bPlay, bNext, bLast);

    const scrub = document.createElement("div");
    scrub.className = "scrub";
    const slider = document.createElement("input");
    slider.type = "range";
    slider.min = "0"; slider.max = String(N - 1); slider.step = "1"; slider.value = "0";
    scrub.appendChild(slider);

    const label = document.createElement("span");
    label.className = "framelabel";

    const speedSel = document.createElement("select");
    speedSel.title = "Vitesse de lecture";
    [["0.25","0.25×"],["0.5","0.5×"],["1","1×"],["2","2×"],["4","4×"]].forEach(function(o){
      const opt = document.createElement("option");
      opt.value = o[0]; opt.textContent = o[1];
      if (o[0] === "1"){ opt.selected = true; }
      speedSel.appendChild(opt);
    });

    controls.append(transport, scrub, label, speedSel);
    root.append(stage, controls);

    function render(){
      img.src = "data:image/png;base64," + fig.frames[index];
      slider.value = String(index);
      label.textContent = (index + 1) + " / " + N;
      root.dataset.frame = String(index);
    }
    function setPlaying(p){
      if (p && timer === null){
        bPlay.innerHTML = ICONS.pause;
        timer = setInterval(function(){
          index = (index + 1) % N;
          render();
        }, interval / speed);
      } else if (!p && timer !== null){
        clearInterval(timer); timer = null;
        bPlay.innerHTML = ICONS.play;
      }
    }
    function go(i){ setPlaying(false); index = Math.max(0, Math.min(N - 1, i)); render(); }

    bFirst.addEventListener("click", function(){ go(0); });
    bPrev.addEventListener("click", function(){ go(index - 1); });
    bNext.addEventListener("click", function(){ go(index + 1); });
    bLast.addEventListener("click", function(){ go(N - 1); });
    bPlay.addEventListener("click", function(){ setPlaying(timer === null); });
    slider.addEventListener("input", function(){ go(parseInt(slider.value, 10)); });
    speedSel.addEventListener("change", function(){
      speed = parseFloat(speedSel.value) || 1;
      if (timer !== null){ setPlaying(false); setPlaying(true); }
    });

    render();
    return {
      root: root,
      getIndex: function(){ return index; },
      destroy: function(){ if (timer !== null){ clearInterval(timer); timer = null; } }
    };
  }

  // ----------------------------------------------------------
  // Rendu Plotly
  // ----------------------------------------------------------
  //
  // Vocabulaire commun aux helpers ci-dessous (zoom-encart) :
  //   - kind   : "x" ou "y".
  //   - ref    : reference d'axe cote trace, ex. "x", "y", "y2" (trace.xaxis).
  //   - key    : nom de l'axe cote layout, ex. "xaxis", "yaxis", "yaxis2".
  //              axisKeyFromRef / axisRefFromKey convertissent l'un en l'autre.
  //   - domain : place de l'axe dans la figure, en coords « paper » 0..1.
  //   - fullRange : etendue totale des donnees d'un axe (ou son range).
  //   - paper  : repere normalise 0..1 de la figure (sert a poser l'encart).
  //   - selection : zone tracee a agrandir { xaxisKey, yaxisKey, xRef, yRef,
  //                 xRange, yRange } produite par parseZoomInsetSelection.
  // Les dates passent par rangeNumber/pointNumber (ms) et les axes log par
  // pointNumber (log10), pour que toute la geometrie reste lineaire.

  function axisKeyFromRef(ref, kind){
    ref = ref || kind;
    const suffix = ref === kind ? "" : String(ref).slice(1);
    return kind + "axis" + suffix;
  }

  function axisRefFromKey(key){
    const kind = key.charAt(0);
    const suffix = key.slice((kind + "axis").length);
    return kind + suffix;
  }

  function traceAxisRef(trace, kind){
    return trace && trace[kind + "axis"] ? trace[kind + "axis"] : kind;
  }

  function rangeNumber(value, axisLayout){
    if (value === null || value === undefined){ return null; }
    if (axisLayout && axisLayout.type === "date"){
      const t = Date.parse(value);
      return isNaN(t) ? null : t;
    }
    const n = Number(value);
    return isFinite(n) ? n : null;
  }

  function pointNumber(value, axisLayout){
    const n = rangeNumber(value, axisLayout);
    if (n === null){ return null; }
    if (axisLayout && axisLayout.type === "log"){
      return n > 0 ? Math.log(n) / Math.LN10 : null;
    }
    return n;
  }

  function axisRangeNumbers(axisLayout){
    const r = axisLayout && Array.isArray(axisLayout.range) ? axisLayout.range : null;
    if (!r || r.length < 2){ return null; }
    const a = rangeNumber(r[0], axisLayout);
    const b = rangeNumber(r[1], axisLayout);
    if (a === null || b === null || a === b){ return null; }
    return [a, b];
  }

  function matchingAxisTraces(data, xRef, yRef){
    return (data || []).filter(function(trace){
      return traceAxisRef(trace, "x") === xRef && traceAxisRef(trace, "y") === yRef;
    });
  }

  function rangeFromTraceData(traces, kind, axisLayout){
    let lo = Infinity;
    let hi = -Infinity;
    const key = kind === "x" ? "x" : "y";
    traces.forEach(function(trace){
      const values = Array.isArray(trace[key]) ? trace[key] : [];
      const step = Math.max(1, Math.floor(values.length / 1200));
      for (let i = 0; i < values.length; i += step){
        const n = pointNumber(values[i], axisLayout);
        if (n === null){ continue; }
        lo = Math.min(lo, n);
        hi = Math.max(hi, n);
      }
    });
    if (!isFinite(lo) || !isFinite(hi) || lo === hi){ return null; }
    return [lo, hi];
  }

  function fullAxisRange(baseLayout, traces, axisKey, kind){
    const axisLayout = baseLayout[axisKey] || {};
    return axisRangeNumbers(axisLayout) || rangeFromTraceData(traces, kind, axisLayout);
  }

  function valueToPaper(value, fullRange, domain){
    if (!fullRange || fullRange[0] === fullRange[1]){ return null; }
    const t = (value - fullRange[0]) / (fullRange[1] - fullRange[0]);
    return domain[0] + t * (domain[1] - domain[0]);
  }

  function rangeToPaperDomain(range, fullRange, domain, axisLayout){
    if (!range || !fullRange){ return null; }
    const a = rangeNumber(range[0], axisLayout);
    const b = rangeNumber(range[1], axisLayout);
    if (a === null || b === null){ return null; }
    const p0 = valueToPaper(a, fullRange, domain);
    const p1 = valueToPaper(b, fullRange, domain);
    if (p0 === null || p1 === null){ return null; }
    return [Math.min(p0, p1), Math.max(p0, p1)];
  }

  function normalizedRange(range, axisLayout){
    if (!range || range.length < 2){ return null; }
    const a = rangeNumber(range[0], axisLayout);
    const b = rangeNumber(range[1], axisLayout);
    if (a === null || b === null){ return null; }
    return [Math.min(a, b), Math.max(a, b)];
  }

  function valueInRange(value, range, axisLayout){
    const r = normalizedRange(range, axisLayout);
    const v = pointNumber(value, axisLayout);
    if (!r || v === null){ return false; }
    return v >= r[0] && v <= r[1];
  }

  function selectionPaperRect(baseLayout, selection, xFull, yFull, xDomain, yDomain, xAxis, yAxis){
    const fallback = { x0: xDomain[0], x1: xDomain[1], y0: yDomain[0], y1: yDomain[1] };
    const sx = rangeToPaperDomain(selection.xRange, xFull, xDomain, xAxis);
    const sy = rangeToPaperDomain(selection.yRange, yFull, yDomain, yAxis);
    if (!sx || !sy){ return fallback; }
    return { x0: sx[0], x1: sx[1], y0: sy[0], y1: sy[1] };
  }

  function annotationPaperRect(annotation, baseLayout, selection, xFull, yFull, xDomain, yDomain){
    if (!annotation){ return null; }
    const xref = annotation.xref || "x";
    const yref = annotation.yref || "y";
    let px = null;
    let py = null;
    if (xref === "paper"){
      px = Number(annotation.x);
    } else if (xref === selection.xRef){
      px = valueToPaper(pointNumber(annotation.x, baseLayout[selection.xaxisKey] || {}), xFull, xDomain);
    }
    if (yref === "paper"){
      py = Number(annotation.y);
    } else if (yref === selection.yRef){
      py = valueToPaper(pointNumber(annotation.y, baseLayout[selection.yaxisKey] || {}), yFull, yDomain);
    }
    if (!isFinite(px) || !isFinite(py)){ return null; }
    const text = String(annotation.text || "").replace(/<[^>]+>/g, "");
    const halfW = Math.min(0.16, Math.max(0.035, text.length * 0.004));
    const halfH = 0.035;
    return { x0: px - halfW, x1: px + halfW, y0: py - halfH, y1: py + halfH };
  }

  // Construit le contexte numerique (coordonnees paper, points convertis) et
  // delegue le choix de placement au module pur InsetLayout.
  // Choisit l'emplacement de l'encart (domaine paper) : convertit donnees,
  // annotations et zone selectionnee en rectangles paper, puis delegue le
  // scoring a InsetLayout (prefere un coin vide). Repli sur un coin si la zone
  // ne contient pas de donnees exploitables.
  function chooseInsetDomain(baseData, baseLayout, selection){
    const xAxis = baseLayout[selection.xaxisKey] || {};
    const yAxis = baseLayout[selection.yaxisKey] || {};
    const xDomain = Array.isArray(xAxis.domain) ? xAxis.domain : [0.08, 0.96];
    const yDomain = Array.isArray(yAxis.domain) ? yAxis.domain : [0.12, 0.94];
    const traces = matchingAxisTraces(baseData, selection.xRef, selection.yRef);
    const xFull = fullAxisRange(baseLayout, traces, selection.xaxisKey, "x");
    const yFull = fullAxisRange(baseLayout, traces, selection.yaxisKey, "y");
    if (!xFull || !yFull || traces.length === 0){
      const cands = InsetLayout.makeInsetCandidates(xDomain, yDomain);
      return cands.length ? { xDomain: cands[0].xDomain, yDomain: cands[0].yDomain }
                          : { xDomain: [0.62, 0.96], yDomain: [0.60, 0.94] };
    }
    const selectedPaper = selectionPaperRect(baseLayout, selection, xFull, yFull, xDomain, yDomain, xAxis, yAxis);
    const baseAnns = Array.isArray(baseLayout.annotations) ? baseLayout.annotations : [];
    const annotationRects = [];
    baseAnns.forEach(function(a){
      const r = annotationPaperRect(a, baseLayout, selection, xFull, yFull, xDomain, yDomain);
      if (r){ annotationRects.push(r); }
    });
    // points convertis en nombres (dates gerees par pointNumber)
    const numTraces = traces.map(function(t){
      const xs = Array.isArray(t.x) ? t.x : [];
      const ys = Array.isArray(t.y) ? t.y : [];
      const n = Math.min(xs.length, ys.length);
      const ox = new Array(n), oy = new Array(n);
      for (let i = 0; i < n; i++){ ox[i] = pointNumber(xs[i], xAxis); oy[i] = pointNumber(ys[i], yAxis); }
      return { x: ox, y: oy };
    });
    return InsetLayout.chooseInsetDomain({
      xDomain: xDomain, yDomain: yDomain, xFull: xFull, yFull: yFull,
      selectedPaper: selectedPaper, traces: numTraces, annotationRects: annotationRects
    });
  }

  function nextAxisIndex(layout){
    let max = 1;
    Object.keys(layout || {}).forEach(function(key){
      const m = key.match(/^[xy]axis(\d*)$/);
      if (!m){ return; }
      const n = m[1] ? parseInt(m[1], 10) : 1;
      if (isFinite(n)){ max = Math.max(max, n); }
    });
    return max + 1;
  }

  function baseLayoutForPlot(el){
    const layout = clone(el._spBaseLayout || {});
    if (el.layout && el.layout.height !== undefined){ layout.height = el.layout.height; }
    if (el.layout && el.layout.width !== undefined){ layout.width = el.layout.width; }
    return layout;
  }

  // Lit un evenement plotly_relayout de zoom et en extrait la zone a agrandir
  // (axes + ranges). Renvoie null si ce n'est pas un vrai rectangle de zoom
  // (pan, autoscale, double-clic...). Voir l'appel dans renderPlotly.
  function parseZoomInsetSelection(update){
    const ranges = {};
    Object.keys(update || {}).forEach(function(key){
      const m = key.match(/^([xy]axis\d*)\.range\[(0|1)\]$/);
      if (!m){ return; }
      if (!ranges[m[1]]){ ranges[m[1]] = []; }
      ranges[m[1]][parseInt(m[2], 10)] = update[key];
    });
    function complete(r){
      return r && r[0] !== undefined && r[1] !== undefined && String(r[0]) !== String(r[1]);
    }
    const xKeys = Object.keys(ranges).filter(function(k){ return k.charAt(0) === "x" && complete(ranges[k]); });
    const yKeys = Object.keys(ranges).filter(function(k){ return k.charAt(0) === "y" && complete(ranges[k]); });
    if (xKeys.length === 0 || yKeys.length === 0){ return null; }
    const xKey = xKeys[0];
    const suffix = xKey.slice("xaxis".length);
    // Apparie le meme suffixe si dispo (multi-subplots), sinon le premier Y
    // complet : couvre le panneau d'erreur ou X="xaxis" est partage et Y="yaxis2".
    const yKey = yKeys.indexOf("yaxis" + suffix) >= 0 ? "yaxis" + suffix : yKeys[0];
    const xr = ranges[xKey], yr = ranges[yKey];
    return {
      xaxisKey: xKey,
      yaxisKey: yKey,
      xRef: axisRefFromKey(xKey),
      yRef: axisRefFromKey(yKey),
      xRange: [xr[0], xr[1]],
      yRange: [yr[0], yr[1]]
    };
  }

  // Config d'un axe d'encart derivee de l'axe de base : cadre net (showline +
  // mirror), sans grille, petits ticks, pour le domaine (place) et le range
  // (zone zoomee) donnes.
  function insetAxis(baseAxis, domain, anchor, range){
    const axis = Object.assign({}, baseAxis || {});
    axis.domain = domain;
    axis.anchor = anchor;
    axis.range = range;
    axis.title = { text: "" };
    axis.showgrid = false;
    axis.zeroline = false;
    axis.showline = true;
    axis.mirror = true;
    axis.ticks = "outside";
    axis.tickfont = Object.assign({}, axis.tickfont || {}, { size: 9 });
    axis.linecolor = axis.linecolor || "rgba(60,60,60,0.9)";
    delete axis.scaleanchor;
    delete axis.matches;
    delete axis.rangeslider;
    return axis;
  }

  // Copie les traces de la zone selectionnee et les reprojette sur les axes de
  // l'encart (xRef/yRef), sans legende.
  function insetTraces(baseData, selection, xRef, yRef){
    return matchingAxisTraces(baseData, selection.xRef, selection.yRef).map(function(trace){
      const out = clone(trace);
      out.xaxis = xRef;
      out.yaxis = yRef;
      out.showlegend = false;
      out.legendgroup = undefined;
      return out;
    });
  }

  function mapPaperValue(value, fromRange, toRange){
    const n = Number(value);
    if (!isFinite(n) || !fromRange || fromRange[0] === fromRange[1]){ return null; }
    const t = (n - fromRange[0]) / (fromRange[1] - fromRange[0]);
    return toRange[0] + t * (toRange[1] - toRange[0]);
  }

  function cloneInsetAnnotation(annotation, selection, placement, insetXRef, insetYRef, baseLayout){
    const xAxis = baseLayout[selection.xaxisKey] || {};
    const yAxis = baseLayout[selection.yaxisKey] || {};
    const xref = annotation.xref || "x";
    const yref = annotation.yref || "y";
    const out = clone(annotation);

    if (xref === selection.xRef && yref === selection.yRef){
      if (!valueInRange(annotation.x, selection.xRange, xAxis) || !valueInRange(annotation.y, selection.yRange, yAxis)){
        return null;
      }
      const tailUsesData = out.axref === selection.xRef || out.ayref === selection.yRef;
      if (tailUsesData){
        const tailXOk = out.axref !== selection.xRef || valueInRange(out.ax, selection.xRange, xAxis);
        const tailYOk = out.ayref !== selection.yRef || valueInRange(out.ay, selection.yRange, yAxis);
        if (tailXOk && tailYOk){
          if (out.axref === selection.xRef){ out.axref = insetXRef; }
          if (out.ayref === selection.yRef){ out.ayref = insetYRef; }
        } else {
          delete out.ax;
          delete out.ay;
          delete out.axref;
          delete out.ayref;
        }
      }
      out.xref = insetXRef;
      out.yref = insetYRef;
    } else if (xref === "paper" && yref === "paper"){
      const xDomain = Array.isArray(xAxis.domain) ? xAxis.domain : [0.08, 0.96];
      const yDomain = Array.isArray(yAxis.domain) ? yAxis.domain : [0.12, 0.94];
      const xFull = axisRangeNumbers(xAxis);
      const yFull = axisRangeNumbers(yAxis);
      const selectedPaper = selectionPaperRect(baseLayout, selection, xFull, yFull, xDomain, yDomain, xAxis, yAxis);
      if (Number(annotation.x) < selectedPaper.x0 || Number(annotation.x) > selectedPaper.x1 ||
          Number(annotation.y) < selectedPaper.y0 || Number(annotation.y) > selectedPaper.y1){
        return null;
      }
      out.xref = "paper";
      out.yref = "paper";
      out.x = mapPaperValue(annotation.x, [selectedPaper.x0, selectedPaper.x1], placement.xDomain);
      out.y = mapPaperValue(annotation.y, [selectedPaper.y0, selectedPaper.y1], placement.yDomain);
      if (out.x === null || out.y === null){ return null; }
      out.showarrow = false;
      delete out.ax;
      delete out.ay;
      delete out.axref;
      delete out.ayref;
    } else {
      return null;
    }

    if (out.font && out.font.size){
      out.font = Object.assign({}, out.font, { size: Math.max(8, Math.min(Number(out.font.size) || 10, 11)) });
    }
    return out;
  }

  function insetAnnotations(baseLayout, selection, placement, insetXRef, insetYRef){
    const annotations = Array.isArray(baseLayout.annotations) ? baseLayout.annotations : [];
    const out = [];
    annotations.forEach(function(annotation){
      const cloned = cloneInsetAnnotation(annotation, selection, placement, insetXRef, insetYRef, baseLayout);
      if (cloned){ out.push(cloned); }
    });
    return out;
  }

  // ----------------------------------------------------------
  // Overlay HTML de l'encart : corps = deplacer, 4 coins = redimensionner.
  // C'est l'overlay (pas Plotly) qui capte les pointer events -> pas de
  // re-entrance plotly_relayout. La bordure visible reste une shape Plotly.
  // ----------------------------------------------------------
  const INSET_MIN_SIZE = 0.12;
  const INSET_CORNERS = ["nw", "ne", "sw", "se"];

  function mountInsetOverlay(el){
    if (el._spInsetOverlay){ return el._spInsetOverlay; }
    const wrap = el.parentElement;
    if (!wrap){ return null; }
    if (getComputedStyle(wrap).position === "static"){ wrap.style.position = "relative"; }
    const overlay = document.createElement("div");
    overlay.className = "inset-overlay";
    overlay.addEventListener("pointerdown", function(ev){
      if (ev.target !== overlay){ return; }      // une poignee gere son resize
      startInsetDrag(el, ev, InsetLayout.movePlacement);
    });
    // Clic droit sur l'encart = l'effacer.
    overlay.addEventListener("contextmenu", function(ev){
      ev.preventDefault();
      clearZoomInset(el);
    });
    INSET_CORNERS.forEach(function(corner){
      const h = document.createElement("div");
      h.className = "inset-handle inset-handle-" + corner;
      h.addEventListener("pointerdown", function(ev){
        startInsetDrag(el, ev, function(p, dx, dy){
          return InsetLayout.resizePlacement(p, corner, dx, dy, INSET_MIN_SIZE);
        });
      });
      overlay.appendChild(h);
    });
    wrap.appendChild(overlay);
    el._spInsetOverlay = overlay;
    return overlay;
  }

  function positionInsetOverlay(el){
    const overlay = el._spInsetOverlay;
    const placement = el._spInsetPlacement;
    const size = el._fullLayout && el._fullLayout._size;
    if (!overlay || !placement || !size){ return; }
    const box = InsetLayout.paperRectToPixels(placement, size);
    overlay.style.left = (el.offsetLeft + box.left) + "px";
    overlay.style.top = (el.offsetTop + box.top) + "px";
    overlay.style.width = box.width + "px";
    overlay.style.height = box.height + "px";
  }

  function unmountInsetOverlay(el){
    const overlay = el._spInsetOverlay;
    if (overlay && overlay.parentElement){ overlay.parentElement.removeChild(overlay); }
    el._spInsetOverlay = null;
  }

  // pointerdown -> drag : `transform(startPlacement, dxPaper, dyPaper)` produit
  // le placement brut, borne ensuite par clampPlacement.
  function startInsetDrag(el, ev, transform){
    const sel = el._spInsetSelection;
    const size = el._fullLayout && el._fullLayout._size;
    const startPlacement = el._spInsetPlacement;
    if (!sel || !size || !startPlacement){ return; }
    ev.preventDefault();
    ev.stopPropagation();
    const target = ev.currentTarget;
    try { target.setPointerCapture(ev.pointerId); } catch (e) {}
    const startX = ev.clientX, startY = ev.clientY;
    const baseLayout = el._spBaseLayout || {};
    const xDomain = (baseLayout[sel.xaxisKey] || {}).domain || [0.08, 0.96];
    const yDomain = (baseLayout[sel.yaxisKey] || {}).domain || [0.12, 0.94];
    let raf = null, pending = null;
    function onMove(e){
      pending = e;
      if (raf){ return; }
      raf = requestAnimationFrame(function(){
        raf = null;
        const d = InsetLayout.pixelDeltaToPaper(pending.clientX - startX, pending.clientY - startY, size);
        const next = transform(startPlacement, d.dx, d.dy);
        const placement = InsetLayout.clampPlacement(
          { x0: next.xDomain[0], x1: next.xDomain[1], y0: next.yDomain[0], y1: next.yDomain[1] },
          xDomain, yDomain, INSET_MIN_SIZE);
        applyZoomInset(el, sel, placement);
        positionInsetOverlay(el);
      });
    }
    function onUp(e){
      target.removeEventListener("pointermove", onMove);
      target.removeEventListener("pointerup", onUp);
      try { target.releasePointerCapture(e.pointerId); } catch (err) {}
      if (raf){ cancelAnimationFrame(raf); raf = null; }
    }
    target.addEventListener("pointermove", onMove);
    target.addEventListener("pointerup", onUp);
  }

  // Cree (ou recree) l'encart : ajoute une paire d'axes + les traces zoomees +
  // deux rectangles (zone source en pointilles, bordure de l'encart), re-rend
  // via Plotly, puis monte l'overlay HTML de deplacement/resize. placementOverride
  // est fourni pendant un drag/resize manuel ; sinon chooseInsetDomain decide.
  function applyZoomInset(el, selection, placementOverride){
    if (!el || !selection || typeof Plotly === "undefined"){ return; }
    // L'encart reconstruit la liste des traces (Plotly.react) : on solde l'etat
    // de mesure pour ne pas garder un index de marqueur perime.
    resetMeasureState(el);
    const baseData = clone(el._spBaseData || []);
    const baseLayout = baseLayoutForPlot(el);
    const additions = insetTraces(baseData, selection, "x", "y");
    if (additions.length === 0){ return; }

    const placement = placementOverride || chooseInsetDomain(baseData, baseLayout, selection);
    el._spInsetSelection = selection;
    el._spInsetPlacement = placement;
    const axisIndex = nextAxisIndex(baseLayout);
    const insetXKey = "xaxis" + axisIndex;
    const insetYKey = "yaxis" + axisIndex;
    const insetXRef = "x" + axisIndex;
    const insetYRef = "y" + axisIndex;
    additions.forEach(function(trace){ trace.xaxis = insetXRef; trace.yaxis = insetYRef; });

    baseLayout[insetXKey] = insetAxis(baseLayout[selection.xaxisKey], placement.xDomain, insetYRef, selection.xRange);
    baseLayout[insetYKey] = insetAxis(baseLayout[selection.yaxisKey], placement.yDomain, insetXRef, selection.yRange);

    const shapes = Array.isArray(baseLayout.shapes) ? baseLayout.shapes.slice() : [];
    shapes.push({
      type: "rect", xref: selection.xRef, yref: selection.yRef,
      x0: selection.xRange[0], x1: selection.xRange[1],
      y0: selection.yRange[0], y1: selection.yRange[1],
      fillcolor: "rgba(55,148,255,0.08)",
      line: { color: "rgba(55,148,255,0.95)", width: 2, dash: "dash" },
      editable: false
    });
    shapes.push({
      type: "rect", xref: "paper", yref: "paper",
      x0: placement.xDomain[0], x1: placement.xDomain[1],
      y0: placement.yDomain[0], y1: placement.yDomain[1],
      fillcolor: "rgba(255,255,255,0)",
      line: { color: "rgba(55,148,255,0.95)", width: 2 },
      editable: false
    });
    baseLayout.shapes = shapes;
    const annotations = insetAnnotations(baseLayout, selection, placement, insetXRef, insetYRef);
    if (annotations.length){
      baseLayout.annotations = (Array.isArray(baseLayout.annotations) ? baseLayout.annotations.slice() : []).concat(annotations);
    }
    el._spHasInset = true;
    const baseConfig = el._spConfig || plotlyConfig(el._spFig || {});
    Plotly.react(el, baseData.concat(additions), baseLayout, baseConfig);
    mountInsetOverlay(el);
    requestAnimationFrame(function(){ positionInsetOverlay(el); });
  }

  function clearZoomInset(el){
    if (!el || typeof Plotly === "undefined"){ return; }
    if (!el._spHasInset){ return; }
    resetMeasureState(el);
    el._spHasInset = false;
    el._spInsetSelection = null;
    el._spInsetPlacement = null;
    unmountInsetOverlay(el);
    Plotly.react(el, clone(el._spBaseData || []), baseLayoutForPlot(el), el._spConfig || plotlyConfig(el._spFig || {}));
  }


  // ----------------------------------------------------------
  // Mode mesure : deux curseurs figes par clic -> Δx, Δy, pente, et (si les
  // deux points sont sur la meme courbe) aire sous la courbe + min/max/moyenne
  // sur la plage [xA, xB]. Maths pures dans measure_math.js (MeasureMath).
  // Le marqueur est une trace scatter dediee ajoutee en derniere position ; le
  // panneau de lecture est un overlay HTML sous le graphe. Mutuellement exclusif
  // avec le mode encart (qui reconstruit la trace via Plotly.react).
  // ----------------------------------------------------------
  const MEASURE_COLOR = "#ff5db1";
  function toNum(v){
    if (typeof v === "number"){ return v; }
    const t = Date.parse(v);
    return isNaN(t) ? Number(v) : t;
  }
  function ensureMeasureReadout(el){
    if (el._spReadout && el._spReadout.isConnected){ return el._spReadout; }
    const box = document.createElement("div");
    box.className = "measure-readout";
    box.style.display = "none";
    if (el.parentElement){ el.parentElement.appendChild(box); }
    el._spReadout = box;
    return box;
  }
  function resetMeasureState(el){
    el._spMeasure = null;
    el._spMeasureIdx = null;
    if (el._spReadout){ el._spReadout.style.display = "none"; }
  }
  function setMeasureArmedFeedback(el){
    if (el.parentElement){ el.parentElement.classList.toggle("sp-measure-armed", !!el._spMeasureArmed); }
    const hasPts = !!(el._spMeasure && el._spMeasure.points && el._spMeasure.points.length);
    const box = ensureMeasureReadout(el);
    if (hasPts){ return; }  // le panneau de lecture reste affiche tant qu'il y a des points
    if (el._spMeasureArmed){
      box.style.display = "block";
      box.innerHTML = "<span class='measure-hint'>Mode mesure : clique deux points (clic droit = effacer)</span>";
    } else {
      box.style.display = "none";
    }
  }
  function armMeasure(el){
    el._spMeasureArmed = !el._spMeasureArmed;
    if (el._spMeasureArmed && el._spInsetArmed){
      el._spInsetArmed = false;
      setInsetArmedFeedback(el, el._spCoordsEl || null);
    }
    if (el._spMeasureArmed && el._spLegendEditArmed){
      el._spLegendEditArmed = false;
      setLegendEditFeedback(el, el._spCoordsEl || null);
    }
    setMeasureArmedFeedback(el);
  }
  function measureTrace(points){
    return {
      type: "scatter", mode: "lines+markers+text",
      x: points.map(function(p){ return p.rawx; }),
      y: points.map(function(p){ return p.y; }),
      text: points.map(function(p, i){ return i === 0 ? "A" : "B"; }),
      textposition: "top center",
      textfont: { color: MEASURE_COLOR, size: 12 },
      marker: { size: 10, color: MEASURE_COLOR, symbol: "x-thin", line: { width: 2, color: MEASURE_COLOR } },
      line: { color: MEASURE_COLOR, width: 1, dash: "dot" },
      hoverinfo: "skip", showlegend: false,
      xaxis: "x", yaxis: "y", _spMeasure: true
    };
  }
  function drawMeasure(el){
    const pts = (el._spMeasure && el._spMeasure.points) || [];
    if (pts.length === 0){
      if (el._spMeasureIdx != null){ try { Plotly.deleteTraces(el, el._spMeasureIdx); } catch(e){} el._spMeasureIdx = null; }
      return;
    }
    const tr = measureTrace(pts);
    if (el._spMeasureIdx == null){
      // la trace de mesure occupe toujours la derniere position ; on fixe
      // l'index de facon synchrone pour eviter une course entre deux clics.
      el._spMeasureIdx = el.data.length;
      Plotly.addTraces(el, tr);
    } else {
      Plotly.restyle(el, { x: [tr.x], y: [tr.y], text: [tr.text] }, [el._spMeasureIdx]);
    }
  }
  function clearMeasure(el){
    if (el._spMeasureIdx != null){ try { Plotly.deleteTraces(el, el._spMeasureIdx); } catch(e){} }
    el._spMeasure = null;
    el._spMeasureIdx = null;
    setMeasureArmedFeedback(el);
  }
  function curveXY(el, cn){
    const tr = el.data && el.data[cn];
    if (!tr){ return null; }
    return { x: (tr.x || []).map(toNum), y: (tr.y || []).map(Number) };
  }
  function addMeasurePoint(el, pt){
    if (!pt || (pt.data && pt.data._spMeasure)){ return; }  // ignore un clic sur le marqueur
    let pts = (el._spMeasure && el._spMeasure.points) || [];
    if (pts.length >= 2){ pts = []; }   // un 3e clic repart d'un nouveau A
    pts = pts.concat([{ rawx: pt.x, x: toNum(pt.x), y: Number(pt.y), cn: pt.curveNumber,
                        name: (pt.data && pt.data.name) || null }]);
    el._spMeasure = { points: pts };
    drawMeasure(el);
    updateMeasureReadout(el);
  }
  function updateMeasureReadout(el){
    const box = ensureMeasureReadout(el);
    const pts = (el._spMeasure && el._spMeasure.points) || [];
    if (pts.length === 0){ setMeasureArmedFeedback(el); return; }
    box.style.display = "block";
    const a = pts[0];
    let html = "<div class='measure-row'><b>A</b>  x " + fmtNum(a.x) + "   y " + fmtNum(a.y) + "</div>";
    if (pts.length === 1){
      box.innerHTML = html + "<div class='measure-hint'>clique un second point</div>";
      return;
    }
    const b = pts[1];
    html += "<div class='measure-row'><b>B</b>  x " + fmtNum(b.x) + "   y " + fmtNum(b.y) + "</div>";
    const m = MeasureMath.segmentMetrics(a.x, a.y, b.x, b.y);
    html += "<div class='measure-row'>Δx " + fmtNum(m.dx) + "   Δy " + fmtNum(m.dy) +
            "   pente " + (m.slope == null ? "∞" : fmtNum(m.slope)) + "</div>";
    if (a.cn === b.cn){
      const xy = curveXY(el, a.cn);
      if (xy){
        const area = MeasureMath.areaUnderCurve(xy.x, xy.y, a.x, b.x);
        const st = MeasureMath.rangeStats(xy.x, xy.y, a.x, b.x);
        html += "<div class='measure-row'>aire ∫ " + fmtNum(area) + "</div>";
        if (st.count){
          html += "<div class='measure-row'>min " + fmtNum(st.min) + "   max " + fmtNum(st.max) +
                  "   moy " + fmtNum(st.mean) + "   (n=" + st.count + ")</div>";
        }
      }
    } else {
      html += "<div class='measure-hint'>aire/stats : choisis deux points sur la meme courbe</div>";
    }
    box.innerHTML = html;
  }

  function attachMeasure(el){
    if (!el || el._spMeasureBound){ return; }
    el._spMeasureBound = true;
    if (el.on){
      el.on("plotly_click", function(ev){
        if (!el._spMeasureArmed){ return; }
        const pt = ev && ev.points && ev.points[0];
        if (pt){ addMeasurePoint(el, pt); }
      });
    }
    // Clic droit : efface les curseurs de mesure (n'intercepte que s'il y en a).
    el.addEventListener("contextmenu", function(e){
      if (el._spMeasure && el._spMeasure.points && el._spMeasure.points.length){
        e.preventDefault();
        clearMeasure(el);
      }
    });
  }

  // ----------------------------------------------------------
  // Export CSV des donnees visibles. On lit les traces vivantes du graphe
  // (el.data, qui reflete zoom/visibilite), on construit un CSV tidy via
  // CsvExport, puis on delegue l'ecriture a l'extension (message saveCsv).
  // ----------------------------------------------------------
  // Plage X visible utilisable comme filtre : seulement si le graphe a un
  // unique axe X numerique (sinon subplots/twin/date -> pas de filtre fiable).
  function plotXRange(el){
    const fl = el && el._fullLayout;
    if (!fl){ return null; }
    const xKeys = Object.keys(fl).filter(function(k){ return /^xaxis\d*$/.test(k); });
    if (xKeys.length !== 1){ return null; }
    const ax = fl[xKeys[0]];
    if (!ax || !ax.range){ return null; }
    const r0 = toNum(ax.range[0]), r1 = toNum(ax.range[1]);
    if (!isFinite(r0) || !isFinite(r1)){ return null; }
    return [r0, r1];
  }
  // Series exportables a partir des traces Plotly vivantes (hors marqueur de
  // mesure). scatter/bar -> xy ; scatterpolar -> theta/r ; heatmap -> grille z.
  function plotSeriesForCsv(el){
    const out = [];
    (el.data || []).forEach(function(tr, i){
      if (tr._spMeasure){ return; }
      const type = tr.type || "scatter";
      const name = tr.name || ("courbe " + (i + 1));
      if (type === "heatmap" && Array.isArray(tr.z)){
        out.push({ name: name, x: tr.x || [], y: tr.y || [], z: tr.z });
      } else if (type === "scatterpolar" && Array.isArray(tr.theta) && Array.isArray(tr.r)){
        out.push({ name: name, x: tr.theta, y: tr.r });
      } else if ((type === "scatter" || type === "bar") && Array.isArray(tr.x) && Array.isArray(tr.y)){
        out.push({ name: name, x: tr.x, y: tr.y });
      }
    });
    return out;
  }
  function exportCsv(el, fig){
    if (!el || !el.data){ return; }
    const series = plotSeriesForCsv(el);
    if (series.length === 0){
      vscodeApi.postMessage({ type: "notify", level: "warn",
        text: "Chaz Plots : aucune donnee exportable en CSV pour cette figure." });
      return;
    }
    const csv = CsvExport.buildCsv(series, { xRange: plotXRange(el) });
    vscodeApi.postMessage({ type: "saveCsv", id: fig.id, csv: csv });
  }

  // ----------------------------------------------------------
  // Bundle publication : un dossier figure.png + figure.svg + metadata.json
  // + figure.tex (\includegraphics). Pour les figures Plotly, on rend les
  // images via Plotly.toImage (le webview detient la figure vivante) ; sinon
  // on reutilise les SVG/PNG deja recus. L'ecriture est faite par l'extension.
  // ----------------------------------------------------------
  async function exportBundle(el, fig){
    const base = BundleMeta.sanitizeBase(fig.title, fig.id);
    const files = [];
    const formats = [];
    try {
      if (fig.plotly && el){
        const png = await Plotly.toImage(el, { format: "png", scale: 2 });
        files.push({ name: "figure.png", dataUrl: png }); formats.push("png");
        const svg = await Plotly.toImage(el, { format: "svg" });
        files.push({ name: "figure.svg", dataUrl: svg }); formats.push("svg");
      } else {
        if (fig.png){ files.push({ name: "figure.png", dataUrl: "data:image/png;base64," + fig.png }); formats.push("png"); }
        if (fig.svg){ files.push({ name: "figure.svg", dataUrl: "data:image/svg+xml;base64," + fig.svg }); formats.push("svg"); }
      }
      // PDF : natif matplotlib si disponible (figure simple), sinon raster
      // depuis l'element vivant (comparaison / encart / erreurs).
      if (fig.pdf && fig.pdf !== "__webview__"){
        files.push({ name: "figure.pdf", dataUrl: "data:application/pdf;base64," + fig.pdf }); formats.push("pdf");
      } else if (fig.plotly && el){
        try {
          const pdfUrl = await buildRasterPdfDataUrl(el);
          files.push({ name: "figure.pdf", dataUrl: pdfUrl }); formats.push("pdf");
        } catch (e) { /* PDF best-effort : on continue sans */ }
      }
    } catch (e){
      vscodeApi.postMessage({ type: "notify", level: "error",
        text: "Chaz Plots : echec de la generation des images du bundle (" + e + ")" });
      return;
    }
    if (files.length === 0){
      vscodeApi.postMessage({ type: "notify", level: "warn",
        text: "Chaz Plots : aucune image a empaqueter pour cette figure." });
      return;
    }
    files.push({ name: "metadata.json", kind: "text", text: BundleMeta.buildMetadata(fig, { formats: formats }) });
    files.push({ name: "figure.tex", kind: "text", text: BundleMeta.buildTex(base, fig.title || base) });
    vscodeApi.postMessage({ type: "saveBundle", base: base, files: files });
  }

  // ----------------------------------------------------------
  // Edition de legende : bouton modebar -> clic entree de legende -> patch.
  // En vue liste, le patch est persiste via extension.js ; en comparaison il
  // reste de session.
  // ----------------------------------------------------------
  let legendEditTarget = { mode: "trace", el: null, idx: -1, textKey: "", fontSizeKey: "" };

  function normalizedTitleText(value){
    if (typeof LegendEdit === "undefined"){ return value == null ? "" : String(value); }
    return LegendEdit.latexToPlainText(LegendEdit.titleText(value));
  }

  function normalizeLayoutTitles(layout){
    if (!layout || typeof LegendEdit === "undefined"){ return; }
    if (layout.title !== undefined){
      if (layout.title && typeof layout.title === "object") { layout.title.text = normalizedTitleText(layout.title); }
      else { layout.title = { text: normalizedTitleText(layout.title) }; }
    }
    Object.keys(layout).forEach(function(key){
      if (!/^[xy]axis\d*$/.test(key)){ return; }
      const axis = layout[key];
      if (axis && axis.title !== undefined){
        if (axis.title && typeof axis.title === "object") { axis.title.text = normalizedTitleText(axis.title); }
        else { axis.title = { text: normalizedTitleText(axis.title) }; }
      }
    });
    if (Array.isArray(layout.annotations)){
      layout.annotations.forEach(function(annotation){
        if (annotation && annotation.text !== undefined){ annotation.text = normalizedTitleText(annotation.text); }
      });
    }
  }

  function textFontSize(layout, key, fallback){
    const fontKey = textFontSizeKey(key);
    const parts = fontKey.split(".");
    let target = layout || {};
    for (let i = 0; i < parts.length; i++){
      const m = /^(\w+)\[(\d+)\]$/.exec(parts[i]);
      target = m ? ((target[m[1]] || [])[Number(m[2])]) : target[parts[i]];
      if (target == null){ return fallback || 14; }
    }
    return Number(target) || fallback || 14;
  }

  function textFontSizeKey(key){
    if (/^annotations\[\d+\]\.text$/.test(key)){ return key.replace(/\.text$/, ".font.size"); }
    if (key === "title.text"){ return "title.font.size"; }
    return key.replace(/\.title\.text$/, ".title.font.size");
  }

  function fillLegendSelect(select, options){
    if (!select || !options){ return; }
    select.innerHTML = "";
    options.forEach(function(opt){
      const o = document.createElement("option");
      o.value = opt.value;
      o.textContent = opt.label;
      select.appendChild(o);
    });
  }

  function setLegendColor(color){
    const input = document.getElementById("leColor");
    if (input && typeof LegendEdit !== "undefined"){
      input.value = LegendEdit.toHexColor(color, input.value || "#1f77b4");
    }
  }

  // ---- Selecteur de couleur 2D (mode avance) ----
  let pickerHsv = { h: 0, s: 1, v: 1 };

  // Restyle la trace ciblee en direct, SANS persister (apercu pendant le drag).
  function livePreviewColor(hex){
    const t = legendEditTarget;
    if (t.mode !== "trace" || !t.el || t.idx < 0 || typeof LegendEdit === "undefined"){ return; }
    try { Plotly.restyle(t.el, LegendEdit.buildRestyle({ color: hex }), [t.idx]); } catch (e) {}
  }

  function renderPicker(){
    if (typeof LegendEdit === "undefined"){ return; }
    const sv = document.getElementById("leSvSquare");
    const svThumb = document.getElementById("leSvThumb");
    const hueThumb = document.getElementById("leHueThumb");
    const hex = LegendEdit.hsvToHex(pickerHsv.h, pickerHsv.s, pickerHsv.v);
    if (sv){ sv.style.backgroundColor = LegendEdit.hsvToHex(pickerHsv.h, 1, 1); }
    if (svThumb){
      svThumb.style.left = (pickerHsv.s * 100) + "%";
      svThumb.style.top = ((1 - pickerHsv.v) * 100) + "%";
    }
    if (hueThumb){ hueThumb.style.top = ((pickerHsv.h / 360) * 100) + "%"; }
    const hexInput = document.getElementById("leHex");
    if (hexInput){ hexInput.value = hex; }
    setLegendColor(hex);
    return hex;
  }

  // Initialise le selecteur depuis une couleur hex (ex. a l'ouverture).
  function setPickerFromHex(hex){
    if (typeof LegendEdit === "undefined"){ return; }
    pickerHsv = LegendEdit.hexToHsv(hex);
    renderPicker();
  }

  function clamp01(x){ return x < 0 ? 0 : (x > 1 ? 1 : x); }

  // Drag generique : appelle update(fraction) puis apercu live ; persiste au relacher.
  function bindPickerDrag(el, update){
    if (!el){ return; }
    function move(ev){
      const r = el.getBoundingClientRect();
      update(clamp01((ev.clientX - r.left) / r.width), clamp01((ev.clientY - r.top) / r.height));
      livePreviewColor(renderPicker());
    }
    el.addEventListener("pointerdown", function(ev){
      el.setPointerCapture(ev.pointerId);
      move(ev);
      ev.preventDefault();
    });
    el.addEventListener("pointermove", function(ev){
      if (el.hasPointerCapture(ev.pointerId)){ move(ev); }
    });
    el.addEventListener("pointerup", function(ev){
      try { el.releasePointerCapture(ev.pointerId); } catch (e) {}
      // Persiste l'edition (couleur courante) une seule fois.
      const t = legendEditTarget;
      const hex = LegendEdit.hsvToHex(pickerHsv.h, pickerHsv.s, pickerHsv.v);
      if (t.el && t.idx >= 0){ persistLegendPatch(t.el, t.idx, LegendEdit.buildRestyle({ color: hex })); }
    });
  }

  (function initColorPicker(){
    bindPickerDrag(document.getElementById("leSvSquare"), function(fx, fy){
      pickerHsv.s = fx;
      pickerHsv.v = 1 - fy;
    });
    bindPickerDrag(document.getElementById("leHueStrip"), function(fx, fy){
      pickerHsv.h = fy * 360;
    });
    const hexInput = document.getElementById("leHex");
    if (hexInput){
      hexInput.addEventListener("change", function(){
        setPickerFromHex(hexInput.value);
        livePreviewColor(LegendEdit.hsvToHex(pickerHsv.h, pickerHsv.s, pickerHsv.v));
      });
    }
    const colorInput = document.getElementById("leColor");
    if (colorInput){
      colorInput.addEventListener("input", function(){ setPickerFromHex(colorInput.value); });
    }
  })();

  function renderColorSwatches(container, colors){
    if (!container || !colors){ return; }
    container.innerHTML = "";
    colors.forEach(function(item){
      const color = typeof item === "string" ? item : item.value;
      const label = typeof item === "string" ? item : item.label;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "le-swatch";
      btn.title = label;
      btn.setAttribute("aria-label", label);
      btn.style.background = color;
      btn.addEventListener("click", function(){ setLegendColor(color); });
      container.appendChild(btn);
    });
  }

  (function initLegendEditor(){
    if (typeof LegendEdit === "undefined"){ return; }
    fillLegendSelect(document.getElementById("leDash"), LegendEdit.LINE_DASHES);
    fillLegendSelect(document.getElementById("leSymbol"), LegendEdit.MARKER_SYMBOLS);
    renderColorSwatches(document.getElementById("leBaseColors"), LegendEdit.BASE_COLORS);
  })();

  function closeLegendEditor(){
    const box = document.getElementById("legendEditor");
    if (box){ box.style.display = "none"; }
    legendEditTarget = { mode: "trace", el: null, idx: -1, textKey: "", fontSizeKey: "" };
  }

  function showLegendEditor(mode){
    const box = document.getElementById("legendEditor");
    if (!box){ return; }
    box.dataset.mode = mode;
    box.style.display = "flex";
  }

  function openLegendEditor(el, idx){
    if (!el || !el.data || !el.data[idx] || typeof LegendEdit === "undefined"){ return; }
    closePublicationEditor();
    legendEditTarget = { mode: "trace", el: el, idx: idx, textKey: "", fontSizeKey: "" };
    const v = LegendEdit.readTrace(el.data[idx]);
    document.getElementById("leName").value = v.name;
    document.getElementById("leColor").value = LegendEdit.toHexColor(v.color, "#1f77b4");
    setPickerFromHex(LegendEdit.toHexColor(v.color, "#1f77b4"));
    document.getElementById("leDash").value = v.dash;
    document.getElementById("leWidth").value = String(v.width);
    document.getElementById("leSymbol").value = v.symbol;
    document.getElementById("leMarkerSize").value = String(v.markerSize);
    showLegendEditor("trace");
  }

  function openTextEditor(el, target){
    if (!el || !target || !target.key || typeof LegendEdit === "undefined"){ return; }
    closePublicationEditor();
    const style = LegendEdit.textStyle(target.text);
    legendEditTarget = { mode: "text", el: el, idx: -1, textKey: target.key, fontSizeKey: textFontSizeKey(target.key) };
    document.getElementById("leTextValue").value = LegendEdit.latexToPlainText(style.text);
    document.getElementById("leFontSize").value = String(textFontSize(el.layout || el._spBaseLayout || {}, target.key, target.defaultSize || 14));
    document.getElementById("leBold").checked = !!style.bold;
    document.getElementById("leItalic").checked = !!style.italic;
    showLegendEditor("text");
  }

  function setLegendEditFeedback(el, coordsEl){
    if (el.parentElement){ el.parentElement.classList.toggle("sp-legend-armed", !!el._spLegendEditArmed); }
    if (coordsEl){ coordsEl.textContent = el._spLegendEditArmed ? "Mode edition : cliquez une entree de legende, un titre ou un axe" : ""; }
  }

  function persistLegendPatch(el, idx, patch){
    if (el._spBaseData && el._spBaseData[idx]){ LegendEdit.applyPatch(el._spBaseData[idx], patch); }
    const tr = el.data && el.data[idx];
    // Vue comparaison/erreur : la trace porte sa figure + index source. On
    // ecrit l'edition dans la figure source (sauf le nom : il est prefixe par
    // le label de comparaison, on ne le repercute pas) pour qu'elle survive aux
    // re-renders (Appliquer erreur, zoom, resize).
    if (tr && tr._srcFigId !== undefined && tr._srcFigId !== null){
      const srcFig = figStore[tr._srcFigId];
      const ti = tr._srcTraceIndex;
      if (srcFig && srcFig.plotly && srcFig.plotly.data && srcFig.plotly.data[ti]){
        const safe = {};
        Object.keys(patch).forEach(function(k){ if (k !== "name"){ safe[k] = patch[k]; } });
        if (Object.keys(safe).length){
          LegendEdit.applyPatch(srcFig.plotly.data[ti], safe);
          vscodeApi.postMessage({ type: "updateFigure", id: tr._srcFigId, traceIndex: ti, patch: safe });
        }
      }
      return;
    }
    const m = /^plot-(\d+)$/.exec(el.id || "");
    if (!m){ return; }
    const id = parseInt(m[1], 10);
    const fig = figStore[id];
    if (fig && fig.plotly && fig.plotly.data && fig.plotly.data[idx]){
      LegendEdit.applyPatch(fig.plotly.data[idx], patch);
      vscodeApi.postMessage({ type: "updateFigure", id: id, traceIndex: idx, patch: patch });
    }
  }

  function restyleLegendTrace(el, idx, patch){
    try { Plotly.restyle(el, patch, [idx]); } catch (e) {}
    persistLegendPatch(el, idx, patch);
  }

  // Edition de titre / labels d'axes : le panneau de legende produit des
  // patches Plotly a cles pointees. On accepte aussi les relayout directs
  // residuels, mais le mode Plotly editable est desactive dans la config.
  function persistLayoutPatch(el, patch){
    if (!patch || !Object.keys(patch).length || typeof LegendEdit === "undefined"){ return; }
    if (el._spBaseLayout){ LegendEdit.applyPatch(el._spBaseLayout, patch); }
    const m = /^plot-(\d+)$/.exec(el.id || "");
    if (!m){ return; }
    const id = parseInt(m[1], 10);
    const fig = figStore[id];
    if (!fig || !fig.plotly){ return; }
    if (!fig.plotly.layout){ fig.plotly.layout = {}; }
    LegendEdit.applyPatch(fig.plotly.layout, patch);
    fig.edited = true;
    vscodeApi.postMessage({ type: "updateFigureLayout", id: id, patch: patch });
  }

  function persistLayoutEdits(el, update){
    if (el._spApplyingLegendLayout){ return; }
    const patch = {};
    Object.keys(update || {}).forEach(function(k){
      if (k === "title.text" || /^[xy]axis\d*\.title\.text$/.test(k)){
        patch[k] = typeof LegendEdit !== "undefined" ? LegendEdit.latexToPlainText(update[k]) : update[k];
      }
    });
    persistLayoutPatch(el, patch);
  }

  function buildTextLayoutPatch(){
    if (typeof LegendEdit === "undefined" || legendEditTarget.mode !== "text"){ return {}; }
    const t = legendEditTarget;
    const patch = {};
    patch[t.textKey] = LegendEdit.styledText(
      document.getElementById("leTextValue").value,
      document.getElementById("leBold").checked,
      document.getElementById("leItalic").checked
    );
    const size = Number(document.getElementById("leFontSize").value);
    if (isFinite(size) && size > 0){ patch[t.fontSizeKey] = size; }
    return patch;
  }

  function applyLegendLayoutPatch(el, patch){
    if (!patch || !Object.keys(patch).length){ return; }
    persistLayoutPatch(el, patch);
    try {
      el._spApplyingLegendLayout = true;
      Promise.resolve(Plotly.relayout(el, patch)).finally(function(){ el._spApplyingLegendLayout = false; });
    } catch (e) {
      el._spApplyingLegendLayout = false;
    }
  }

  const PUBLICATION_PRESETS = {
    article: { title: 20, axis: 16, tick: 12, legend: 12, line: 2, marker: 6, grid: "light", bg: "white", palette: "tab10", bold: false },
    presentation: { title: 26, axis: 20, tick: 15, legend: 15, line: 3, marker: 8, grid: "light", bg: "white", palette: "tab10", bold: true },
    rapport: { title: 22, axis: 17, tick: 13, legend: 13, line: 2.4, marker: 7, grid: "light", bg: "white", palette: "tab10", bold: true },
    colorblind: { title: 20, axis: 16, tick: 12, legend: 12, line: 2.2, marker: 7, grid: "light", bg: "white", palette: "okabe", bold: false }
  };
  let publicationTarget = null;
  let publicationPreview = null;
  let publicationPreviewSeq = 0;

  function readPublicationValues(){
    const preset = document.getElementById("pubPreset");
    return PUBLICATION_PRESETS[(preset && preset.value) || "article"] || PUBLICATION_PRESETS.article;
  }

  function capturePublicationState(el){
    return {
      data: clone(el.data || []),
      layout: clone(el.layout || {}),
      baseData: clone(el._spBaseData || []),
      baseLayout: clone(el._spBaseLayout || {})
    };
  }

  function restorePublicationPreview(){
    if (!publicationTarget || !publicationPreview || typeof Plotly === "undefined"){ return Promise.resolve(); }
    const el = publicationTarget;
    el._spBaseData = clone(publicationPreview.baseData || []);
    el._spBaseLayout = clone(publicationPreview.baseLayout || {});
    return Promise.resolve(Plotly.react(el, clone(publicationPreview.data || []), clone(publicationPreview.layout || {}), el._spConfig || plotlyConfig(el._spFig || {})))
      .catch(function(){});
  }

  function closePublicationEditor(keepPreview){
    const box = document.getElementById("publicationEditor");
    if (box){ box.style.display = "none"; }
    const shouldRestore = !keepPreview && publicationTarget && publicationPreview;
    publicationPreviewSeq += 1;
    const done = shouldRestore ? restorePublicationPreview() : Promise.resolve();
    publicationTarget = null;
    publicationPreview = null;
    return done;
  }

  function openPublicationEditor(el){
    if (!el || typeof LegendEdit === "undefined"){ return; }
    closeLegendEditor();
    closePublicationEditor(false);
    publicationTarget = el;
    publicationPreview = capturePublicationState(el);
    publicationPreviewSeq += 1;
    const preset = document.getElementById("pubPreset");
    if (preset){ preset.value = "article"; }
    document.getElementById("publicationEditor").style.display = "flex";
    previewPublicationStyle();
  }

  function gridPatch(axisKey, gridMode){
    const light = gridMode === "light";
    const full = gridMode === "full";
    const patch = {};
    patch[axisKey + ".showgrid"] = light || full;
    patch[axisKey + ".gridcolor"] = light ? "rgba(0,0,0,0.12)" : "rgba(0,0,0,0.18)";
    patch[axisKey + ".gridwidth"] = light ? 1 : 1.2;
    patch[axisKey + ".zeroline"] = full;
    patch[axisKey + ".linecolor"] = "rgba(0,0,0,0.72)";
    patch[axisKey + ".tickcolor"] = "rgba(0,0,0,0.72)";
    return patch;
  }

  function buildPublicationLayoutPatch(el, values){
    const layout = el.layout || el._spBaseLayout || {};
    const patch = {
      "paper_bgcolor": values.bg === "transparent" ? "rgba(0,0,0,0)" : "#ffffff",
      "plot_bgcolor": values.bg === "transparent" ? "rgba(0,0,0,0)" : "#ffffff",
      "font.size": values.tick,
      "title.font.size": values.title,
      "legend.font.size": values.legend
    };
    if (values.bold && layout.title && layout.title.text){
      patch["title.text"] = LegendEdit.styledText(layout.title.text, true, false);
    }
    Object.keys(layout).forEach(function(key){
      if (!/^[xy]axis\d*$/.test(key)){ return; }
      Object.assign(patch, gridPatch(key, values.grid));
      patch[key + ".title.font.size"] = values.axis;
      patch[key + ".tickfont.size"] = values.tick;
      if (values.bold && layout[key] && layout[key].title && layout[key].title.text){
        patch[key + ".title.text"] = LegendEdit.styledText(layout[key].title.text, true, false);
      }
    });
    (layout.annotations || []).forEach(function(annotation, i){
      patch["annotations[" + i + "].font.size"] = values.title;
      if (values.bold && annotation && annotation.text){
        patch["annotations[" + i + "].text"] = LegendEdit.styledText(annotation.text, true, false);
      }
    });
    return patch;
  }

  function publicationTracePatch(trace, color, values){
    const patch = {};
    const mode = String((trace && trace.mode) || "");
    const type = trace ? String(trace.type || "") : "";
    if (trace && (trace.line !== undefined || /lines/.test(mode) || type === "scatter")){
      patch["line.width"] = values.line;
      if (color){ patch["line.color"] = color; }
    }
    if (trace && (trace.marker !== undefined || /markers/.test(mode) || type === "bar")){
      patch["marker.size"] = values.marker;
      if (color){ patch["marker.color"] = color; }
    }
    if (trace && trace.fill && trace.fill !== "none" && color){ patch["fillcolor"] = LegendEdit.hexToRgba(color, 0.22); }
    return patch;
  }

  function applyPublicationPatchToGraph(el, values, persist){
    if (!el || typeof Plotly === "undefined" || typeof LegendEdit === "undefined"){ return Promise.resolve(); }
    const colors = LegendEdit.paletteColors(values.palette);
    const layoutPatch = buildPublicationLayoutPatch(el, values);
    if (persist){ persistLayoutPatch(el, layoutPatch); }
    else if (el._spBaseLayout){ LegendEdit.applyPatch(el._spBaseLayout, layoutPatch); }
    const promises = [Promise.resolve(Plotly.relayout(el, layoutPatch))];
    (el.data || []).forEach(function(trace, i){
      const patch = publicationTracePatch(trace, colors[i % colors.length], values);
      if (!Object.keys(patch).length){ return; }
      if (el._spBaseData && el._spBaseData[i]){ LegendEdit.applyPatch(el._spBaseData[i], patch); }
      if (persist){ persistLegendPatch(el, i, patch); }
      promises.push(Promise.resolve(Plotly.restyle(el, patch, [i])));
    });
    return Promise.all(promises).catch(function(){});

  function previewPublicationStyle(){
    if (!publicationTarget || !publicationPreview){ return; }

      .then(function(){

        return applyPublicationPatchToGraph(el, values, false);
      })
      .catch(function(){});
  }

  function commitPublicationStyle(){

    el._spBaseLayout = clone(original.baseLayout || {});

    publicationPreviewSeq += 1;
    Promise.resolve(Plotly.react(el, clone(original.data || []), clone(original.layout || {}), el._spConfig || plotlyConfig(el._spFig || {})))

  function textFromDom(node){
    return LegendEdit.latexToPlainText(LegendEdit.stripTextMarkup(node ? (node.textContent || "") : ""));
  }

  function layoutTextCandidate(layout, key){
    if (key === "title.text"){ return LegendEdit.titleText((layout || {}).title); }
    const axisMatch = /^([xy]axis\d*)\.title\.text$/.exec(key);
    if (axisMatch){ return LegendEdit.titleText(((layout || {})[axisMatch[1]] || {}).title); }
    const annMatch = /^annotations\[(\d+)\]\.text$/.exec(key);
    if (annMatch){ return (((layout || {}).annotations || [])[Number(annMatch[1])] || {}).text || ""; }
    return "";
  }

  function findAxisTextKey(layout, letter, clickedText){
    const keys = Object.keys(layout || {}).filter(function(key){ return new RegExp("^" + letter + "axis\\d*$").test(key); });
    const exact = keys.filter(function(key){ return textFromDom({ textContent: LegendEdit.titleText(layout[key].title) }) === clickedText; });
    const picked = (exact[0] || keys[0] || (letter + "axis"));
    return picked + ".title.text";
  }

  function findAnnotationTextKey(el, textEl, clickedText){
    const nodes = Array.prototype.slice.call(el.querySelectorAll("g.annotation text, .annotation text, .annotation-text"));
    let idx = nodes.indexOf(textEl);
    const annotations = ((el.layout || {}).annotations || []);
    if (idx < 0){
      idx = annotations.findIndex(function(a){ return textFromDom({ textContent: a && a.text }) === clickedText; });
    }
    return idx >= 0 ? "annotations[" + idx + "].text" : "";
  }

  function editableTextNodes(el){
    return Array.prototype.slice.call(el.querySelectorAll(
      ".gtitle, .xtitle, .ytitle, g.annotation text, .annotation text, .annotation-text"
    )).filter(function(node){ return node && !node.closest(".legend") && textFromDom(node); });
  }

  function textNodeAtPoint(el, x, y){
    const pad = 5;
    const nodes = editableTextNodes(el);
    let best = null;
    let bestScore = Infinity;
    nodes.forEach(function(node){
      let r;
      try { r = node.getBoundingClientRect(); } catch (e) { return; }
      if (!r || r.width <= 0 || r.height <= 0){ return; }
      const inside = x >= r.left - pad && x <= r.right + pad && y >= r.top - pad && y <= r.bottom + pad;
      if (!inside){ return; }
      const cx = (r.left + r.right) / 2;
      const cy = (r.top + r.bottom) / 2;
      const score = Math.abs(x - cx) + Math.abs(y - cy);
      if (score < bestScore){ best = node; bestScore = score; }
    });
    return best;
  }

  function classifyEditableTextTarget(el, textEl){
    if (!textEl || !el.contains(textEl) || textEl.closest(".legend")){ return null; }
    const layout = el.layout || el._spBaseLayout || {};
    const cls = textEl.getAttribute("class") || "";
    const clickedText = textFromDom(textEl);
    let key = "";
    if (textEl.closest("g.annotation") || cls.indexOf("annotation") >= 0){ key = findAnnotationTextKey(el, textEl, clickedText); }
    else if (cls.indexOf("gtitle") >= 0){ key = "title.text"; }
    else if (cls.indexOf("xtitle") >= 0){ key = findAxisTextKey(layout, "x", clickedText); }
    else if (cls.indexOf("ytitle") >= 0){ key = findAxisTextKey(layout, "y", clickedText); }
    if (!key){ return null; }
    return {
      key: key,
      text: layoutTextCandidate(layout, key) || clickedText,
      defaultSize: textFontSize(layout, key, 14)
    };
  }

  function findEditableTextTarget(el, node, ev){
    if (!el || typeof LegendEdit === "undefined"){ return null; }
    let textEl = node && node.closest ? node.closest("text") : null;
    if (!textEl || !el.contains(textEl) || textEl.closest(".legend")){
      textEl = ev ? textNodeAtPoint(el, ev.clientX, ev.clientY) : null;
    }
    return classifyEditableTextTarget(el, textEl);
  }

  function attachLegendTextEditor(el){
